body:
  text: 魏散騎常侍劉邵撰凉儒林祭酒劉昞注材能五利害六接識七英雄八八觀九材能第五材能大小其凖不同量力而授所任乃濟或曰人材有能大而不能小猶凾牛之鼎不可以烹雞愚以爲此非名也夫人材猶噐大小異或者以大鼎不能烹雞喻大材不能治小失其名也夫能之爲言巳定之稱先有定質而後能名生焉豈有能大而不能小乎凡所謂能大而不能小其語出於性有寛急寛者弘􅁉急者急切性有寛急故宜有大小寛弘宜治大急切宜治小寛弘之人宜爲郡國使下得施其功而總成其事急切則煩碎事不成急小之人宜理百里使事辦於巳弘􅁉則網漏庶事荒矣然則郡之與縣異體之大小者也明能治大郡則能治小郡能治大縣亦能治小縣以實理寛急論辨之則當言大小異宜不當言能大不能小也􅀂能大而不能小仲尼豈不爲季氏臣􅀂夫雞之與牛亦異體之小大也鼎能烹牛亦能烹雞銚能烹雞亦能烹犢故鼎亦宜有大小􅀂以烹犢則豈不能烹雞乎但有宜與不宜豈有能與不能故能治大郡則亦能治小郡矣推此論之人材各有所宜非獨大小之謂也文者理百官武者治軍旅夫人材不同能各有異有自任之能脩巳潔身總禦百官有立法使人從之之能法懸人懼無敢犯也有消息辨護之能智意辨護周旋得節有徳教師人之能道術深明動爲物教有行事使人譴讓之能云爲得理義和於時有司察紏摘之能督察是非無不區别有權竒之能務以竒計成事立功有威猛之能猛毅昭著振威敵國夫能岀於材材不同量材能既殊任政亦異是故自任之能清節之材也故在朝也則冡宰之任爲國則矯􅀡之政其身正故掌天官而總百揆立法之能治家之材也故在朝也則司冦之任爲國則公正之政法無私故掌秋官而詰姦􅁀計䇿之能術家之材也故在朝也則三孤之任爲國則變化之政計慮明故輔三槐而助論道人事之能智意之材也故在朝也則冡宰之佐爲國則諧合之政智意審故佐天官而諧内外行事之能譴讓之材也故在朝也則司冦之任爲國則督責之政辨衆事故佐秋官而督傲慢權竒之能􅇊俩之材也故在朝也則司空之任爲國則藝事之政􅇊能巧故任冬官而成藝事司察之能臧否之材也故在朝也則師氏之佐爲國則刻削之政是非章故佐師氏而察善否威猛之能豪傑之材也故在朝也則將帥之任爲國則嚴厲之政體果毅故總六師而振威武凡偏材之人皆一味之羙譬飴以甘爲名酒以苦爲實故長於辦一官􅃓工揉材而有餘力而短於爲一國兼掌陶冶噐不成矣何者夫一官之任以一味恊五味䀋人調䀋醯人調醯則五味成矣譬梓里治材土官治墻則厦屋成一國之政以無味和五味水以無味故五味得其和猶君體平淡則百官施其用又國有俗化民有劇易五方不同風俗各異土有剛柔民有劇易而人材不同故政有得失以簡治易則得治煩則失是以王化之政宜於統大易簡而天下之理得矣以之治小則迂網踈而吞舟之姦漏辨護之政宜於治煩事皆辨護煩亂乃理以之治易則無易甚於督促民不便也䇿術之政宜於治難權畧無方觧釋患難以之治平則無竒術數煩衆民不安矣矯抗之政宜於治侈矯枉過正以厲侈靡以之治弊則殘俗弊治嚴則民殘矣諧和之政宜於治新國新禮殺苟合而巳以之治舊則虚苟合之教非禮實也公刻之政宜於紏姦刻削不深姦亂不止以之治􅁁則失衆衆民憚法易迯叛矣威猛之政宜於討亂亂民桀逆非威不服以之治善則􅍊政猛民殘濫良善矣􅇊倆之政宜於治富以國彊民以使以之治貧則勞而下困易貨改鑄民失業矣故量能授官不可不審也凡此之能皆偏材之人也故或能言而不能行或能行而不能言智勝則能言材勝則能行至於國體之人能言能行故爲衆材之雋也人君之能異於此平淡無爲以任衆能故臣以自任爲能竭力致功以取爵位君以用人爲能任賢使能國家自理臣以能言爲能各言其能而受其官君以能聽爲能聽言觀行而授其官臣以能行爲能必行其所言君以能賞罰爲能必當其功過也所能不同君無爲而臣有事故能君衆材也􅀂君以有爲代大匠斵則衆能失巧功不成矣利害第六建法陳術以利國家及其弊也害歸於巳葢人業之流各有利害流漸失源故利害生夫節清之業著于儀容􅀤於徳行心清意正則徳容外著未用而章其道順而有化徳輝昭著故不試而效效理於人故物無不化故其未逹也爲衆人之所進理順則衆人樂進之既逹也爲上下之所敬徳和理順誰能慢之其功足以激濁􅀭清師範僚友其爲業也無弊而常顯非徒不弊存而有顯故爲世之所貴徳信有常人不能賤法家之業本于制度待乎成功而效法以禁姦姦止乃效其道前苦而後治嚴而爲衆􅀄布威嚴是以勞苦終以道化是以民治故其未逹也爲衆人之所忌姦黨樂亂忌法者衆巳試也爲上下之所憚憲防肅然内外振悚其功足以立法成治民不爲非治道乃成其弊也爲群枉之所讐法行寵貴終受其害其爲業也有敝而不常用明君乃能用之彊明不繼世故法不常用故功大而不終是以商君車裂吳起攴觧術家之業出於聦思待於謀得而章斷於未行人無信者功成事效而後乃彰也其道先㣲而後著精而且玄計謀㣲妙其始至精終始合符是以道著其未逹也爲衆人之所不識謀在功前衆何由識其用也爲明主之所珎暗主昧然豈能貴之其功足以運籌通變變以求通故能成其功其退也藏於隱㣲計出㣲宻是以不露其爲業也竒而希用主計神竒用之者希也故或沈㣲而不章世希能用道何由章智意之業本于原度其道順而不忤將順時宜何忤之有故其未逹也爲衆人之所容矣庶事不逆善者來親巳逹也爲寵愛之所嘉與衆同和内外羙之其功足以讃明計慮媚順於時言計是信也其敝也知進而不退不見忌害是以慕進也或離正以自全用心多媚故違於正其爲業也諝而難持韜情諝智非雅正之倫也故或先利而後害知進忘退取悔之道臧否之業本乎是非其道廉而且砭清而混雜砭去纎芥故其未逹也爲衆人之所識清潔不汙在幽而明巳逹也爲衆人之所稱業常明白出則受譽其功足以變察是非理清道潔是非不亂其敝也爲詆訶之所怨詆訶之徒不樂聞過其爲業也峭而不􅁉峭察於物何能寛􅁉故或先得而後離衆清亮爲時所稱理峭爲衆所憚􅇊倆之業本于事能其道辨而且速􅇊計如神是以速辨其未逹也爲衆人之所異伎能出衆故雖㣲而顯巳逹也爲官司之所任遂事成功政之所務其功足以理煩紏邪釋煩理邪亦須伎倆其敝也民勞而下困上不端而下困其爲業也細而不㤗故爲治之末也道不平弘其能太乎接識第七推巳接物俱識同體兼能之士乃逹羣材夫人􅀄甚難知貌厚情深難得知也而士無衆寡皆自以爲知人故以巳觀人則以爲可知也巳尚清節則凡清節者皆巳之所知觀人之察人則以爲不識也夫何哉由巳之所尚在於清節人之所好在於利欲曲􅀡不同於他便謂人不識物也是故能識同體之善性長思謀則善䇿畧之士而或失異量之羙遵法者雖羙乃思謀之所不取何以論其然夫清節之人以正􅀡爲度故其歷衆材也能識性行之常度在正􅀡故恱有􅁪之人而或疑法術之詭謂守正足以致治何以法術爲也法制之人以分數爲度故能識較方􅀡之量度在法分故恱方􅀡之人而不貴變化之術謂法分足以濟業何以術謀爲也術謀之人以思謨爲度故能成䇿畧之竒度在思謀故貴䇿畧之人而不識遵法之良謂思謨足以化民何以法制爲也器能之人以辨護爲度故能識方畧之規度在辨護故恱方計之人而不知制度之原謂方計足以立功何以制度爲也智意之人以原意爲度故能識韜諝之權度在原意故恱韜諝之人而不貴法教之常謂原意足以爲正何以法理爲也伎倆之人以邀功爲度故能識進趣之功度在邀功故恱功能之人而不通道徳之化謂伎能足以成事何以道徳爲也臧否之人以伺察爲度故能識訶砭之明度在伺察故悅譴訶之人而不暢倜儻之異謂譴訶乃成教何以寛弘爲也言語之人以辨析爲度故能識捷給之惠度在剖析故恱敏給之人而不知含章之羙謂辨論事乃理何以含章爲也是以互相非駮莫肯相是人皆自以爲是誰肯道人之是取同體也則接論而相得性能苟同則雖胡越接響而情通取異體也雖歷乆而不知性能苟異則雖比肩歷年而逾踈矣凡此之􅀋皆謂一流之材也故同體則親異體則踈􅀂二至巳上亦隨其所兼以及異數法家兼術故能以術輔法故一流之人能識一流之善以法治者所以舉不過法二流之人能識二流之羙體法術者法術兼行盡有諸流則亦能兼逹衆材體通八流則八材當位物無不理故兼材之人與國體同謂八材之人始進陳言冡宰之官察其所以欲觀其一隅則終朝足以識之將究其詳則三日而後足何謂三日而後足夫國體之人兼有三材故談不三日不足以盡之一以論道徳二以論法制三以論䇿術然後乃能竭其所長而舉之不疑在上者兼明八材然後乃能盡其所進用而無疑矣然則何以知其兼偏而與之言乎察言之時何以識其偏材何以識其兼材也其爲人也務以流數杼人之所長而爲之名目如是兼也每因事􅀋杼盡人之所能爲之名目言不容口如陳以羙欲人稱之巳之有善因事自􅀃又欲令人言常稱巳不欲知人之所有如是者偏也人之有善耳不樂聞人􅁛之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深􅀃淺益深益異淺者意近故聞深理而心逾衒是以商君􅀃帝王之道不入則以彊兵之義示之異則相返反則相非聞深則心衒焉得而相是是以李兌塞而不聽蘇秦之􅀃是故多陳處􅀡則以爲見美以其多方疑似見羙也静聽不言則以爲虚空待時來語疑其無實抗爲髙談則爲不遜辭護理髙疑其凌巳遜讓不盡則以爲淺陋卑言寡氣疑其淺薄言稱一善則以爲不􅀶未敢多陳疑其陋狹歷􅀤衆竒則以爲多端偏舉事􅀋則欲以釋之復以爲多端先意而言則以爲分羙言合其意疑分巳羙因失難之則以爲不喻欲􅀘其失反不喻也􅀃以對反則以爲較已欲反其事而明言乃疑其較也􅀶以異雜則以爲無要控盡所懐謂之無要論以同體然後乃恱弟兄忿肆爲陳管蔡之事則欣暢而和恱於是乎有親愛之情稱舉之譽苟言之同非徒親愛而巳乃至譽而舉之此偏材之常失意常婟護欲人同巳巳不必得何由暫得英雄第八自非平淡能各有名英爲文昌雄爲武稱夫草之精秀者爲英獸之特群者爲雄物尚有之况於人乎故人之文武茂異取名於此文以英爲名武以雄爲號是故聰明秀岀謂之英膽力過人謂之雄此其大體之别名也􅀂校其分數則牙則須英得雄分然後成章雄得英分然後成剛各以二分取彼一分然後乃成膽者雄之分智者英之分英有聦明須膽而後成䧺有膽力須知而後立何以論其然夫聦明者英之分也不得雄之膽則􅀃不行智而無膽不能正言膽力者雄之分也不得英之智則事不立勇而無謀不能立事是故英以其聦謀始以其明見機智以謀事之始明以見事之機待雄之膽行之不决則不能行雄以其力服衆以其勇排難非力衆不服非勇難不排待英之智成之智以制冝巧乃可成然後乃能各濟其所長也譬金待水而成利功物得水然後成養功􅀂聦能謀始而明不見機乃可以坐論而不可以處事智能坐論而明不見機何事務之能處聦能謀始明能見機而勇不能行可以循常而不可以慮變明能循常勇不能行何應變之能爲􅀂力能過人而勇不能行可以爲力人未可以爲先登力雖絶群膽雄不决何先鋒之能爲力能過人勇能行之而智不能斷事可以爲先登未足以爲將帥力能先登臨事無謀何將帥之能爲必聦能謀始明能見機膽能决之然後可以爲英張良是也氣力過人勇能行之智足斷事乃可以爲雄韓信是也體分不同以多爲目故英雄異名張良英智多韓信雄膽勝然皆偏至之材人臣之任也故英可以爲相制勝于近雄可以爲將􅀭威于逺􅀂一人之身兼有英雄則能長世高祖項羽是也然英之分以多於雄而英不可以少也英以致智智能役雄何可少也英分少則智者去之故項羽氣力葢世明能合變膽烈無前濟江焚糧而不能聽采竒異有一范增不用是以陳平之徒皆亡歸高祖英分多故群雄服之英材歸之兩得其用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄材不服也内無主於中外物何由入徒雄而不英則智者不歸徃也無名以接之智者何由徃故雄能得雄不能得英兕虎自成群也英能得英不能得雄鸞鳳自相親也故一人之身兼有英雄乃能役英與雄能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九群材異品志各異歸觀其通否所格者八八觀者一曰觀其奪救以明間雜或慈欲濟恤而恡奪某人或救濟廣厚而乞醯爲惠二曰觀其感變以審常度觀其愠怍則常度可審三曰觀其志質以知其名徴質相應覩色知名四曰觀其所由以辨依似依訐似􅀡倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知所長訐刺雖短而長於爲􅀡八曰觀其聦明以知所逹雖體衆材而材不聦明事事蔽塞其何能逹何謂觀其奪救以明間雜夫質有至有違剛質無欲所以爲至貪情或勝所以爲違􅀂至勝違則惡情奪正􅀂然而不然以欲勝剛以此似剛而不剛故仁岀於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者􅀂夫見可憐則流涕慈心發於中將分與則恡嗇是慈而不仁者爲仁者必濟恤覩危急則惻隱仁情動於内將赴救則畏患是仁而不恤者爲恤者必赴危處虚義則色厲精厲見於貌顧利慾則内荏是厲而不剛者爲剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇怯損於仁厲而不剛者則慾奪之也利慾害於剛故曰􅄌不能勝恡無必其能仁也愛則不施何於仁之爲能仁不能勝懼無必其能恤也畏懦不果何恤之能行厲不能勝慾無必其能剛也情存利慾何剛之能成是故不仁之質勝則􅇊力爲害噐仁質既弱而有􅇊力此害巳之噐也貪悖之性勝則彊猛爲禍梯廉質既􅀒而性強猛此禍巳之梯也亦有善情救惡不至爲害惡物宜翦而除純善之人憐而救之此稠厚之人非大害也愛惠分篤雖傲狎不離平生結交情厚分深雖原壤夷俟而不相棄無大過也助善著明雖疾惡無害也如殺無道以就有道疾惡雖甚無大非也救濟過厚雖取人不貪也取人之物以有救濟雖譏在乞醯非大貪也是故觀其奪救而明間雜之情可得知也或畏恡奪慈仁或救過濟其分而平淡之主順而恕何謂觀其感變以審常度夫人厚貌深情將欲求之必觀其辭㫖察其應賛視發言之㫖趣觀應和之當否夫觀其辭㫖猶聽音之善醜音唱而善醜别察其應賛猶視智之能否也聲和而能否别故觀辭察應足以互相别識彼唱此和是非相舉然則論顯􅀭正白也辭顯唱正是曰明白不善言應玄也黙而識之是曰玄也經緯玄白通也明辨是非可謂通理移易無正雜也理不一㨿言意渾雜先識未然聖也追思玄事叡也見事過人明也以明爲晦智也心雖明之常􅀂不足㣲忽必粗白粗赤憤憤在面及其動作葢並言辭色既􅀤揚言亦從之是故其言甚懌而精色不從者中有違也心恨而言強和色貌終不相從其言有違而精色可信者辭不敏也言不自盡故辭雖違而色貌可信言未􅀤而怒色先見者意憤溢也憤怒填􅎍者未言而色貌巳作言將􅀤而怒氣送之者彊所不然也欲強行不然之事故怒氣助言凡此之􅀋徴見於外不可􅍕違心懽而怒容意恨而和貌雖欲違之精色不從心動貌從感愕以明雖變可知情雖在内感愕發外千形萬貌粗可知矣是故觀其感變而常度之情可知觀人辭色而知其心物有常度然後審矣何謂觀其至質以知其名凡偏材之性二至以上則至質相􅀤而令名生矣二至質氣之謂也質􅀡氣清則善名生矣是故骨􅀡氣清則休名生焉骨氣相應名是以羙氣清力勁則烈名生焉氣既清矣力勁則烈勁智精理則能名生焉智既勁矣精理則能稱智􅀡彊慤則任名生焉􅀡而又羙是以見任集于端質則令徳濟焉質徴端和善徳乃成加之學則文理灼焉圭玉有質瑩則成文是故觀其所至之多少而異名之所生可知也尋其質氣覽其清濁雖有多少之異異狀之名斷可知之何謂觀其所由以辨依似夫純訐性違不能公正質氣俱訐何正之有依訐似􅀡以訐訐善以􅀡之訐計及良善純宕似流不能通道質氣俱宕何道能通依宕似通行傲過節似通之宕容傲無節故曰􅀡者亦訐訐者亦訐其訐則同其所以爲訐則異􅀡人之訐訐惡憚非純訐爲訐訐善刺是通者亦宕宕者亦宕其宕則同其所以爲宕則異通人之宕簡而逹道純宕傲僻以自恣然則何以别之􅀡而能温者徳也温和爲􅀡所以爲徳􅀡而好訐者偏也性􅀡過訐所以爲偏訐而不􅀡者依也純訐似􅀡所以爲依道而能節者通也以道自節所以爲通通而時過者偏也性通時過所以爲偏宕而不節者依也純宕自通所以爲依偏之與依志同質違所謂似是而非也質同通􅀡或偏或依是故輕諾似烈而寡信不量巳力輕許死人臨難畏怯不能殉命多易似能而無效不顧材能日謂能辦受事猖獗作無效驗進銳似精而去速精躁之人不能乆任訶者似察而事煩譴訶之人每多煩亂訐施似惠而無成當時似給終無所成面從似忠而退違阿順目前􅁍則自是此似是而非者也紫色亂朱聖人惡之亦有似非而是者事同於非其功實則是大權似姦而有功伊去太甲以成其功大智似愚而内明終日不違内實分别􅀶愛似虚而實厚汎愛無私似虚而實正言似訐而情忠譬帝桀紂至誠忠愛夫察似明非御情之反欲察似􅀋審則是非御取人情反覆明之有似理訟其實難别也故聖人參訊廣訪與衆共之非天下之至精其孰能得其實􅀂其實可得何憂乎驩兠何迁乎有苗是以昧旦晨興􅀭明仄陋語之三槐詢之九􅁄故聽言信貌或失其真言訥貌惡仲尼失之子羽詭情御反或失其賢疑非人情公孫失之卜式賢否之察實在所依雖其難知即當尋其所依而察之是故觀其所依而似之誠方在哺乳愛敬生矣則與道徳同體動􅀗人心而道無不通也體道脩徳故物順理通然愛不可少於敬少於敬則廉節者歸之廉人好敬是以歸之而衆人不與衆人樂愛愛少是以不與愛多於敬則雖廉節者不恱而愛接者死之廉人寡常人衆衆人樂愛致其死則事成業濟是故愛之爲道不可少矣何則敬之爲道也嚴而相離其􅀔難乆動必肅容過之不乆逆旅之人不及温和而歸也愛之爲道也情親意厚深而感物煦渝篤宻感物深感是以翳桑之人倒戈報徳是故觀其愛敬之誠而通塞之理可得而知也篤於慈愛則温和而上下之情通務在禮敬則嚴肅而外内之情塞然必愛敬相須不可一時而無然行其二義者常當務令愛多敬少然後肅穆之風可得希矣何謂觀其情機以辨恕惑夫人之情有六機杼其所欲則喜爲有力者譽烏􅀗其心莫不忻焉不杼其所能則怨爲辨給者稱三緘其心莫不忿然以自伐歷之則惡抗巳所能以歷衆人衆人所惡以謙損下之則恱卑損下人人皆喜恱犯其所乏則婟人皆恱巳所長惡巳所短故稱其所短則婟戾忿肆以惡犯婟則妬自伐其能人所惡也稱人之短人所婟也今伐其所能犯人所婟則妬害生也此人性之六機也夫人情莫不欲遂其志志之所欲欲遂巳成故烈士樂奮力之功遭難而力士奮善士樂督政之訓政脩而善士用能士樂治亂之事治亂而求賢能術士樂計䇿之謀廣筭而求其䇿辨士樂陵訊之辭賔賛而求辨給貪者樂貨財之積貨財積則貪者容其求幸者樂權􅀔之尤權􅀔之尤則幸者竊其柄苟賛其志則莫不欣然是所謂杼其所欲則喜也所欲之心杼盡復何怨乎􅀂不杼其所能則不􅀗其志不􅀗其志則戚憂巳才之不展是故功力不建則烈士奮奮憤不能盡其材也徳行不訓則正人哀哀哀不得行其化政亂不治則能者歎歎歎不得用其能敵能未弭則術人思思思不得運其竒貨財不積則貪者憂憂憂無所收其利權􅀔不尤則幸者悲悲不得弄其權是所謂不杼其能則怨也所怨不杼其能恱也人情莫不欲處前故惡人之自伐皆欲居物先故惡人之自伐也自伐皆欲勝之􅀋也是故自伐其善則莫不惡也惡其有勝巳之心是所謂自伐歷之則惡也是以逹者終不自伐人情皆欲求勝故恱人之謙謙所以下之下有推與之意是故人無賢愚接之以謙則無不色懌不問能否皆欲勝人是所謂以謙下之則恱也是以君子終日謙謙人情皆欲掩其所短見其所長稱其所長則恱稱其所短則愠是故人駮其所短似􅀂物冐之情之憤悶有􅀂覆冐是所謂駮其所乏則婟也覆冐純塞其心婟戾人情陵上者也見人勝巳皆欲陵之陵犯其所惡雖見憎未害也雖惡我自伐未甚疾害也􅀂以長駮短是所謂以惡犯婟則妬惡生矣以巳之長駮人之短而取其害是以逹者不爲之也凡此六機其歸皆欲處上物之自大人人皆爾是以君子接物犯而不校知物情好勝雖或以小犯巳終不校拒也不校則無不敬下所以避其害也務行謙敬誰害之哉小人則不然既不見機不逹妬害之機而欲人之順巳謂欲人無違巳以􅹝愛敬爲見異孔光逡巡董賢欣喜以偶邀㑹爲輕謂非本心忿其輕巳苟犯其機則深以爲怨小人易恱而難事是故觀其情機而賢鄙之志可得而知也賢明志在退下鄙劣志在陵上是以平淡之主御之以正訓貪者之所憂戒幸者之所悲然後物不自伐下不陵上賢否當位治道有序何謂觀其所短以知所長夫偏材之人皆有所短智不能周也故􅀡之失也訐刺訐傷於義故其父攘羊其子證之剛之失也厲剛切傷於理故諌君不從承之以劒和之失也愞愞弱不及道故宫之竒爲人撓不能強諫介之失也拘拘愚不逹事尾生守信死於橋下夫􅀡者不訐無以成其􅀡既恱其􅀡不可非其訐用人之􅀡恕其訐也訐也者􅀡之徴也非訐不能爲直剛者不厲無以濟其剛既恱其剛不可非其厲用人之剛恕其厲也厲也者剛之徴也非厲不能爲剛和者不愞無以保其和既恱其和不可非其懦用人之和恕其愞也愞也者和之徴也非懦不能爲和介者不拘無以守其介既恱其介不可非其拘用人之介恕其拘也拘也者介之徴也非拘不能爲介然有短者未必能長也純訐之人未能正􅀡有長者必以短爲徴純和之人徴必愞弱是故觀其徴之所短而其材之所長可知也欲用其剛必采之於厲何謂觀其聦明以知所逹夫仁者徳之基也載徳而行義者徳之節也制徳之所宜也禮者徳之文也禮徳之文理也信者徳之固也固徳之所執也智者徳之帥也非智不成徳夫智出於明明逹乃成智明之於人猶晝之待白日夜之待燭火火日所以照晝夜智逹所以明物理其明益盛者所見及遠火日愈明所照愈遠智逹彌明理通彌深及遠之明難聖人猶有不及是故守業勤學未必及材生知者上學能者次材藝精巧未必及理因習成巧淺於至理理義辨給未必及智理成事業昧于玄智智能經事未必及道役智經務去道遠矣道思玄遠然後乃周道無不載故無不周是謂學不及材材不及理理不及智智不及道道智玄㣲故四變而後及道也者囘復變通理不繫一故變通之是故别而論之各自獨行則仁爲勝仁者濟物之資明者見理而巳合而俱用則明爲將仁者待明其功乃成故以明將仁則無不懐威以使之仁以恤之以明將義則無不勝示以㫁割之宜以明將理則無不通理􅀂明練萬事乃逹然則茍無聦明無以能遂暗者昧時何能成務成遂故好聲而實不克則恢恢迂遠於實好辯而理不至則煩辭煩而無正理好法而思不深則刻刻過於理好術而計不足則僞詭誣詐也是故鈞材而好學明者爲師比力而爭智者爲雄等徳而齊逹者稱聖聖之爲稱明智之極明也是以動而爲天下法言而爲萬世範居上位而不亢任下位而不悶是以觀其聦明而所逹之材可知也
