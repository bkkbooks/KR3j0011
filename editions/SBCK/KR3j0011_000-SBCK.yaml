front:
  text: 序人物志後余嘗三復人物志而竊有感焉夫人徳性資之繼成􅀄未始有異也而終之相去懸絶者醇駁較於材隆汚判諸習曰三品曰五儀胥是焉而賢不肖殊途矣是以知人之哲古人難之言貌而取人者聖人弗是也茲劉邵氏之有以志人物也乎修巳者得之以自觀用人者持之以照物烏可廢諸然用舎之際人材之趋向由之可弗慎乎精於擇而庸適其能篤於任而弗貳以私則真材􅀗用大猷􅁢升矣其或偏聽昡志而用不以道動曰才難吾恐蕭艾弗擇魚目混珍也左馮翊王三省識
  hash: sha256:b25138084666d1213744c937ffafe67cc36e54b514dd406a0b6e110d9994b873
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0011_SBCK_000-1a}
body:
  text: 人物志目録上卷九徴一體别二流業三材理四中卷材能五利害六接識七英雄八八觀九下卷七繆十效難十一釋爭十二
  hash: sha256:a2df7e0754d8c7e4d179f5b8d84be07165b8359b8d0da4a3ddf4dceb94d7efb8
