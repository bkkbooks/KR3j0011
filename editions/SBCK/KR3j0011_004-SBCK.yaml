body:
  text: 右人物志三卷十二篇魏劉邵撰案惰唐經籍志篇第皆與今同列于名家十六國時燉煌劉昞重其書始作注解然世所傳本多謬誤今合官􅀻書校之去其􅃨重附益之文爲定本内或疑字無書可證者今㨿衆本皆相承傳疑難輙意改云邵之叙五行曰簡暘而明砭火之徳也徧檢書傳無明砭之證案字書砭者以石刺病此外更無他訓然自魏晋以後轉相傳冩豕亥之變莫能究知不爾則邵當别有異聞今則亡矣愚謂明砭都無意義自東晋諸公草書啓字爲然疑爲簡暢而明啓耳文寛夫題劉邵字孔才廣平邯鄲人也㨿今官書魏志作勉劭之劭從力他本或從邑者晋邑之名案字書此二訓外無他釋然俱不恊孔才之意􅀃文則爲邵音同上但召旁從阝耳訓髙也李舟切韻訓羙也髙羙又與孔才義符􅀭子法言日周公之才之邵是也今俗罵法言亦作邑旁邵葢力阝文近易訛讀者又昧偏傍之别今定從邵云建安中爲計吏詣許太史上言正旦當日蝕邵時在尚書令荀彧所坐者數十人或云當廢朝或云宜却㑹邵曰梓慎禆竈古之良史猶占水火錯失天時禮記曰諸侯旅見天子及門不得終禮者四日蝕在一然則聖人埀訓不爲變豫廢朝禮者或災消異伏或推衍謬誤也彧善其言敕朝㑹如舊日亦不蝕魏黄􅀄中爲尚書郎散騎侍郎受詔集五更群書以􅀋相從作皇覽後與議郎􅁃嶷荀詢等定科令作新律十八篇著律畧論遷散騎常侍嘗作趙都賦明帝羙之詔邵作許都洛都賦時外興軍旅内營宫室邵作二賦皆諷諌焉景􅀄中受詔爲都官考課邵作七十二條及畧􅀃一篇又以謂冝制禮作樂以移風俗著洛論十四篇正始中執經講學賜爵􅀜内侯凡所撰述法論人物志之􅀋百餘篇卒追贈光禄勲詔書􅀶求衆賢散􅀐侍郎夏侯惠上䟽盛稱邵才史臣陳壽亦曰邵該覽學籍文質周洽云劉昞字延明燉煌人也年十四就􅀶士郭瑀瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂别設一席謂弟子曰吾有一女欲覔快女婿誰坐此席者吾當婚焉昞遂奮坐神志湛然曰昞其人也瑀遂以女妻之昞後隱居酒泉不應州郡命弟子受業者五百餘人李暠㨿凉州徴爲儒林祭酒從事郎暠好尚文典書史穿落者親自􅀘葺昞時侍側請代其事暠曰躬自執者欲人重此典籍吾與卿相遇何異孔明之㑹玄徳遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱言昞何人斯敢不如此昞以三史文繁著畧記百三十篇八十四卷燉煌實録二十卷方言三卷靖恭堂銘一卷注周易韓子人物志黄石公三畧行於世沮渠䝉遜平酒泉拜秘書郎專管注記築陸沈觀於西苑躬徃禮焉號玄處先生學徒數百月致羊酒牧犍尊爲國師親自致拜命官屬以下皆北面爲業魏太武平凉州士庶東遷夙聞其名拜樂平王從事中郎後思歸道病卒以上並案邵昞本傳刪取其要云廣平宋庠記
