body:
  text: 右人物志三卷十二篇魏劉卲撰案隋唐經籍志篇第皆與今同列於名家十六國時燉煌劉昞重其書始作注解然世所傳本多謬誤今合官私書校之去其複重附益之文為定本内或疑字無書可證者今據衆本皆相承傳疑難輒意改云卲之叙五行曰簡暢而明砭火之徳也徧檢書傳無明砭之證案字書砭者以石刺病此外更無他訓然自魏晉以後轉相傳寫豕亥之變莫能究知不爾則卲當别有異聞今則亡矣愚謂明砭都無意義自東晉諸公草書啟字為然疑為簡暢而明啟耳文寛夫題
