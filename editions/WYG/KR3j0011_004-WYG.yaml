body:
  text: 後序余嘗三復人物志而竊有感焉夫人徳性資之繼成初未始有異也而終之相去懸絶者醇駁較於材隆汚判諸習曰三品曰五儀胥是焉而賢不肖殊途矣是以知人之哲古人難之言貌而取人者聖人弗是也兹劉卲氏之所以志人物也乎脩己者得之以自觀用人者持之以照物焉可廢諸然用舎之際人材之趨向由之可不慎乎精於擇而庸適其能篤於任而弗貳以私則真材獲用大猷允升矣其或偏聴眩志而用不以道動曰才難吾恐蕭艾弗擇魚目混珠也左馮翊王三省識
