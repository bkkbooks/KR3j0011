body:
  text: 魏散騎常侍劉邵撰凉儒林祭酒劉昞注七繆十效難十一釋爭十二七繆第十人物之理妙而難明以情鑒察繆猶有七七繆一曰察譽有偏頗之繆徴質不明故聽有偏頗也二曰接物有愛惡之惑或情同忘其惡或意異違其善也三曰度心有小大之誤或小知而大無成或小暗而大無明四曰品質有早晚之疑有早智而速成者有晩智而晩成者五曰變類有同體之嫌材同勢均則相競材同勢傾則相敬六曰論材有申壓之詭藉富貴則惠施而名申處貧賤則乞求而名壓七曰觀竒有二尤之失妙尤含藏直尤虛瑰故察難中也夫采訪之要不在多少事無巨細要在得正然徴質不明者信耳而不敢信目目不能察而信於耳故人以爲是則心隨而明之人以爲非則意轉而化之信人毀譽故向之所是化而爲非雖無所嫌意若不疑信毀譽者心雖無嫌意固疑矣且人察物亦自有誤愛憎兼之其情萬原明既不察加之愛惡是非是疑豈可勝計不暢其本胡可必信去愛憎之情則實理得矣是故知人者以目正耳雖聽人言常正之以目不知人者以耳敗目親見其誠猶信毀而棄之故州閭之士皆譽皆毀未可爲正也或衆附阿黨或獨立不群交遊之人譽不三周未必信是也交結致譽不三周色貌取人而行違之夫實厚之士交遊之間必每所在肩稱言忠信行篤敬雖蠻貊之邦行矣上等援之下等推之蠻貊推之况州里乎苟不能周必有咎毀行不篤敬者或謟䛕得上而失於下或阿黨得下而失於上故偏上失下則其終有毀非之者多故不能終偏下失上則其進不傑衆雖推之上不信異故誠能三周則爲國所利此正直之交也由其正直故名有利故皆合而是亦有違比或違正阿黨故合而是之皆合而非或在其中或特立不群故合而非之若有竒異之材則非衆所見竒逸絶衆衆何由識而耳所聽采以多爲信不能審查其材但信衆人言也是繆於察譽者也信言察物必多繆失是以聖人如有所譽必有所試夫愛善疾惡人情所常不問賢愚情皆同之也茍不明質或踈善善非非者見善善者見踈豈故然哉由意不明何以論之夫善非者雖非猶有所是既有百非必有一是以其所是順巳所長惡人一是與巳所長同也則不自覺情通意親忽忘其惡以與巳同忘其百非謂矯駕爲至孝殘桃爲至忠善人雖善猶有所乏雖有百善或有一短以其所乏不明巳長善人一短與巳所長異也以其所長輕巳所短則不自知志乖氣違忽忘其善以與巳異百善皆棄謂曲杖爲七首葬楯爲反具耶是惑於愛惡者也徴質暗昧者其於接物常以愛惡惑異其正夫精欲深㣲質欲懿重志欲弘大心欲嗛小精㣲所以入神妙也麄則失神懿重所以崇徳宇也躁則失身志大所以戡物任也小則不勝心小所以慎咎悔也大則驕陵故詩詠文王小心翼翼不大聲以色小心也言不貪求大名聲見於顔色王赫斯怒以對于天下志大也故能誅紂定天下以致太平由此論之心小志大者聖賢之倫也心小故以服事殷志大故三分天下有其二心大志大者豪傑之雋也志大而心又大故名豪雋心大志小者傲蕩之類也志小而心闊逺故爲傲蕩之流也心小志小者拘愞之人也心近志短豈能弘大衆人之察或陋其心小見沛公燒絶棧道謂其不能定天下或壯其志大見項羽號稱強楚便謂足以匡諸侯是誤於小大者也由智不能察其度心常誤於小大夫人材不同成有早晚有早智而速成者質清氣朗生則秀異故童烏蒼舒總角曜竒也有晩智而晚成者質重氣遲則乆乃成噐故公孫含道老而後章有少無智而終無所成者質濁氣暗終老無成故原壞年老聖人叩脛而不能化有少有令材遂爲雋噐者㓜而通理長則愈明故常材發竒於應賔效徳於公相四者之理不可不察當察其早晚隨時而用之夫㓜智之人材智精逹然其在童髦皆有端緒仲尼戯言爼豆鄧艾指圖軍旅故文本辭繁𥘉辭繁者長必文麗辯始給口㓜給口者長必辯論也仁岀慈恤㓜慈恤者長必矜人施發過與㓜過與者長必好施慎生畏懼㓜多畏者長必謹慎廉起不取㓜不妄取長必清廉早智者淺惠而見速見小事則逹其形容晩成者竒識而舒遲智雖舒緩能識其妙終暗者並困於不足事務難易意皆昧然遂務者周逹而有餘事無大小皆能極之而衆人之察不慮其變常以一㮣責於終始是疑於早晩者也或以早成而疑晚智或以晚智而疑早成故於品質常有妙失也夫人情莫不趣名利避損害名利之路在於是得是得在巳名利與之損害之源在於非失非失在巳損害攻之故人無賢愚皆欲使是得在巳賢者尚然况愚者乎能明巳是莫過同體體同於我則能明巳是以偏材之人交遊進趨之類皆親愛同體而譽之同體能明巳是以親而譽之憎惡對反而毀之與巳體反是以惡而踈之序異雜而不尚也不與巳同不與巳異則雖不憎亦不尚之推而論之無他故焉夫譽同體毀對反所以証彼非而著巳是也由與巳同體故証彼非而著巳是也至于異雜之人於彼無益於巳無害則序而不尚不以彼爲是不以巳爲非都無損益何所尚之是故同體之人常患於過譽譬俱爲力人則力小者慕大力大者提小故其相譽常失其實也及其名敵則尠能相下若俱能負鼎則爭勝之心生故不能相下是故直者性奮好人行直於人見人正直則心好之而不能受人之訐刺巳之非則訐而不受盡者情露好人行盡於人見人頴露則心好之而不能納人之徑說巳徑盡則違之不納務名者樂人之進趨過人見人乘人則恱其進趨而不能岀陵巳之後人陵於巳則忿而不服是故性同而材傾則相援而相頼也並有旅力則大能奬小性同而勢均則相競而相害也恐彼勝巳則妬善之心生此又同體之變也故或助直而毀直人直過於巳直則非毀之心生或與明而毀損益守常之智申壓在時故勢來則益勢去則損是故藉富貴則貨財充於内施惠周於外貲財有餘恣意周濟見贍者求可稱而譽之感其恩紀匡救其惡是以朱建受金而爲食其畫計見援者闡小美而大之感其引援將順其美是以曹丘見接爲季布揚名雖無異材猶行成而名立夫富與貴可不欣哉乃至無善而行成無智而名立是以富貴妻嫂恭况他人乎處貧賤則欲施而無財欲援而無勢有慈心而無以拯識竒材而不能援親戚不能恤朋友不見濟内無𬞞食之饋外無緼袍之贈分義不復立恩愛浸以離意氣皆空薄分意何由立怨望者並至歸非者日多非徒薄巳遂生怨謗之言雖無罪尤猶無故而廢也夫貧與賤可不懾哉乃至無由而生謗無罪而見廢是故貧賤妻子慢况他人乎故世有侈儉名由進退行雖在我而名稱在世是以良農能稼未必能穡天下皆富則清貧者雖苦必無委頓之憂家給人足路人皆饋之且有辭施之髙以獲榮名之利得辭施之髙名受餘光之善利皆貧則求假無所告家貧戶乏粟成珠玉而有窮乏之患且生鄙吝之訟乞假無遺與嫂叔爭糟糠是故鈞材而進有與之者則體益而茂遂巳既自足復湏給賜則名羙行成所爲遂逹私理卑抑有累之者巳既不足親戚並困則㣲降而稍退上等不援下等不推而衆人之觀不理其本各指其所在謂申逹者爲材能壓屈者爲愚短是疑於申壓者也材智雖鈞貴賤殊塗申壓之變在乎貧富夫清雅之羙著乎形質察之寡失形色外著故可得而察之失繆之由恒在二尤二尤之生與物異列是故非常人之所見故尤妙之人含精於内外無飾姿譬金氷内明而不外朗故馮唐白首屈於郎署尤虛之人碩言瑰姿内實乖反猶燭火外照灰燼内暗故主父偃辭麗一歲四遷而人之求竒不可以精㣲測其玄機明異希其尤竒異非精不察或以貌少爲不足覩鬷蔑貌惡便疑其淺陋或以瑰姿爲巨偉見江充貌麗便謂其巨偉或以直露爲虛華以其欵盡疑無厚實或以巧飾爲真實巧言如流恱而覩之是以早㧞多誤不如順次或以甘羅爲早成而用之於早歲或訣復欲順次也夫順次常度也茍不察其實亦焉徃而不失徴質不明不能識竒故使順次亦不能得故遺賢而賢有濟則恨在不早㧞故鄭伯謝之於燭武㧞竒而竒有敗則患在不素别故光武悔之於朱浮任意而獨繆則悔在不廣問秦穆不從蹇叔雖追誓而無及廣問而誤巳則怨巳不自信隗囂心存於漢而爲王元所誤是以驥子發足衆士乃誤韓信立功淮隂乃震夫豈惡竒而好疑哉乃尤物不世見而竒逸羙異也故非常人之所識也是以張良體弱而精彊爲衆智之雋也不以質弱而傷於智荆叔色平而神勇爲衆勇之傑也不以色和而傷於勇然則雋傑者衆人之尤也竒逸過於衆人故衆人不能及聖人者衆尤之尤也通逹過於衆竒故衆竒不能逮其尤彌出者其道彌遠非天下之至精其孰能與於此故一國之雋於州爲輩未得爲第也郡國之所雋異比於州郡未及其第目一州之第於天下爲椳州郡之所第目以比天下之雋椳而不可及椳一囘反樞也天下之椳世有優劣英人不世繼是以伊召管齊應運乃出是故衆人之所貴各貴其出巳之尤智材勝巳則以爲貴而不貴尤之所尤尤之尤者非衆人之所識是故衆人之明能知輩士之數衆人明者粗知郡國出輩之士而巳而不能知第目之度乃未識郡國品第之雋輩士之明能知第目之度出軰明者粗知郡國第目之良不能識出尤之良也未識出尤竒異之理出尤之人能知聖人之教瞻之在前忽焉在後不能究之入室之奥也如有所立卓爾雖欲從之未由也巳由是論之人物之理妙不可得而窮巳爲當擬諸形容象其物宜觀其㑹通舉其一隅而巳效難第十一人材精㣲實自難知知之難審效薦之難葢知人之效有二難有難知之難尤竒遊雜是以難知有知之而無由得效之難巳雖知之無由得薦何謂難知之難人物精㣲智無形狀竒逸精妙能神而明欲入其神而明其智其道甚難固難知之難也知人則哲惟帝難之况常人乎是以衆人之察不能盡備各守其一方而巳故各自立度以相觀采以巳所能歷觀衆才或相其形容以貌狀取人或候其動作以進趨取人或揆其終始以發正取人或揆其儗象以㫖意取人或推其細㣲以情理取人或恐其過誤以簡恕取人或循其所言以辭㫖取人或稽其行事以功効取人八者遊雜各以意之所可爲准是以雜而無紀故其得者少所失者多但取其同於巳而失其異於巳巳不必兼故失者多是故必有草創信形之誤或色貌取人而行違又有居止變化之謬或身在江海心存魏闕故其接遇觀人也隨行信名失其中情是以聖人聽言觀行如有所譽必有所試故淺美揚露則以爲有異智淺易見狀似異羙深明沉漠則以爲空虛智深内明狀似無實分别妙理則以爲離婁研精至理狀似離婁口傳甲乙則以爲義理強指物類狀似有理好說是非則以爲臧否妄說是非似明善否講日成名則以爲人物强議賢愚似明人物平道政事則以爲國體妄論時事似識國體猶聽有聲之類名隨其音七者不能明物皆隨行而爲之名猶聽猫音而謂之猫聽雀音而謂之雀不知二蟲竟謂何名也世之疑惑皆此類也是以魯國儒服者衆人皆謂之儒立而問之一人而己夫名非實用之不效南箕不可以簸揚北斗不可挹酒漿故曰名猶口進而實從事退衆覩形而名之故用而不驗也中情之人名不副實用之有效真智在中衆不能見故無外名而有内實故名由衆退而實從事章效立則名章此草創之常失也淺智無終深智無始故衆人之察物常失之於𥘉故必待居止然後識之視其所止觀其所居而焉不知故居視其所安安其舊者敦於仁逹視其所舉舉剛直者厚於義富視其所與與嚴壯者明於禮窮視其所爲爲經術者勤於智貧視其所取取其分者存於信然後乃能知賢否行此者賢反此者否此又巳試非始相也試而知之豈相也哉所以知質未足以知其畧畧在變通不可常准且天下之人不可得皆與遊處故視其外狀可以得一未足盡知或志趣變易隨物而化是以世祖失之龎萌曹公失之董卓或未至而懸欲或巳至而易顧李軼始專心於光武終改顧於聖公或窮約而力行或得志而從欲王莾𥘉則布衣折節卒則窮奢極侈此又居止之所失也情變如此誰能定之由是論之能兩得其要是難知之難既知其情又察其變故非常人之所審何謂無由得效之難上材巳莫知巳難識知或所識者在㓜賤之中未逹而䘮未及進逹其人巳䘮或所識者未㧞而先沒未及㧞舉巳先沒世或曲髙和寡唱不見讃公叔座薦商鞅而魏王不能用或身卑力㣲言不見亮禽息舉百里奚首足皆碎或噐非時好不見信貴竇后方好黄老儒者何由見進或不在其位無由得㧞卞和非因匠所以抱璞泣或在其位以有所屈迫何武舉公孫録而爲王氏所推是以良材識真萬不一遇也材能雖良當遇知巳知巳雖遇當值明王三者之遭萬不一會湏識真在位識百不一有也雖識巳真或不在位以位勢値可薦致之宜十不一合也識巳湏在位智逹復湏宜或明足識真有所妨奪不欲貢薦雖識辨賢愚而屈於妨奪故有不欲或好貢薦而不能識真在位之人雖心好賢善而明不能識是故知與不知相與分亂於總猥之中或好賢而不識或知賢而心妬故用與不用同於衆總紛然淆亂實知者患於不得逹效身無位次無由效逹不知者亦自以爲未識身雖在位而不能識所謂無由得效之難也故曰知人之效有二難是以人主常當運其聦智廣其視聽明揚側陋旁求俊乂舉能不避仇讐㧞賢不棄幽隱然後國家可得而治功業可得而濟也釋爭第十二賢善不伐况小事乎釋忿去爭必荷榮福葢善以不伐爲大爲善而自伐其能衆人之所小賢以自矜爲損行賢而去自賢之心何徃而不益哉是故舜讓于徳而顯義登聞湯降不遲而聖敬日躋彼二帝雖天挺聖徳生而上哲猶懐勞謙疾行退下然後信義登聞光宅天位郄至上人而抑下滋甚王叔好爭而終于出犇此二大夫矜功陵物或宗移族㓕或迯禍出奔由此觀之爭讓之道豈不懸歟然則卑讓降下者茂進之遂路也江海所以爲百谷王以其處下也矜奮侵陵者毀塞之險途也兕虎所以攖牢檻以其性獷噬也是以君子舉不敢越儀凖志不敢凌軌等足不茍蹈常懷退下内勤巳以自濟外謙讓以敬懼獨處不敢爲非出門如見大賔是以怨難不在於身而榮福通於長乆也外物不見傷子孫頼以免彼小人則不然矜功伐能好以陵人𥘉無巨細心發揚以陵物是以在前者人害之矜能奔縱人情所害有功者人毀之恃功驕盈人情所毀毀敗者人幸之及其覆敗人情所幸是故並轡爭先而不能相奪小人競進智不相過並驅爭險更相蹈籍兩頓俱折而爲後者所趨中道而斃後者乘之譬兔殛犬疲而田父收其功由是論之爭讓之途其别明矣君子尚讓故渉萬里而途清小人好爭足未動而路塞然好勝之人猶謂不然貪則好勝雖聞徳讓之風意猶昧然乃云古人讓以得今人讓以失心之所是起而爭之以在前爲速銳以處後爲畱滯故行坐汲汲不睱脂車以下衆爲卑屈以躡等爲異傑苟矜起等不羞負乘以讓敵爲廻辱以陵上爲高厲故趙穿不顧元帥彘子以偏師䧟是故抗奮遂徃不能自反也譬虎狼食生物遂有殺人之怒夫以抗遇賢必見遜下相如爲廉頗逡廵兩得其利以抗遇暴必搆敵難灌夫不爲田蚡持下兩得其尤敵難既搆則是非之理必溷而難明俱自是而非彼誰明之耶溷而難明則其與自毀何以異哉兩虎共闘小者死大者傷焉得而兩全且人之毀巳皆發怨憾而變生舋也若本無憾恨遭事際㑹亦不致毀害必依託於事􅎖成端末凡相毀謗必因事類而飾成之其於聽者雖不盡信猶半以爲然也由言有端角故信之者半巳之校報亦又如之復當報謗爲生翅尾終其所歸亦各有半信著於遠近也俱有形狀不知其實是以近逺之聽皆半信於此半信於彼然則交氣疾爭者爲易口而自毀也巳說人之瑕人亦說巳之穢雖詈人自取其詈也並辭競說者爲貸手以自毆辭忿則力爭巳既毆人人亦毆巳此其爲借乎以自毆爲惑繆豈不甚哉借手自毆借口自詈非惑如何然原其所由豈有躬自厚責以致變訟者乎巳能自責人亦自責兩不言競變訟何由生哉皆由内恕不足外望不巳所以争者由内不能恕巳自責而外望於人不巳也或怨彼輕我或疾彼勝巳是故心争終無休巳夫我薄而彼輕之則由我曲而彼直也曲而見輕固其宜矣我賢而彼不知則見輕非我咎也親反傷也固其宜矣若彼賢而處我前則我徳之未至也徳輕在彼固所宜也若徳鈞而彼先我則我徳之近次也徳鈞年次固其常矣夫何怨哉且兩賢未别則能讓者爲雋矣材均而不争優劣衆人善其讓爭雋未别則用力者爲憊矣雋等而名未别衆人惡其闘是故藺相如以廻車决勝於廉頗冦恂以不闘取賢於賈復此二賢者知争途不可由故囘車退避或酒炙迎送故廉賈肉袒争尚泯矣物勢之反乃君子所謂道也龍蛇之蟄以存身尺蠖之屈以求伸蟲㣲物耳尚知蟠屈况於人乎是故君子知屈之可以爲伸故含辱而不辭韓信屈於跨下之辱知卑讓之可以勝敵故下之而不疑展喜犒齊師之謂也及其終極乃轉禍而爲福晋文避楚三舍而有城濮之勲屈讐而爲友相如下廉頗而爲刎頸之交使怨讐不延於後嗣而羙名宣於無窮子孫荷其榮䕃竹帛紀其高義君子之道豈不𥙿乎若偏急好爭則身危當年何後來之能福且君子能受纎㣲之小嫌故無變闘之大訟大訟起於纎芥故君子愼其小小人不能忍小忿之故終有赫赫之敗辱小人以小惡爲無傷而不去故罪大不可觧惡積不可救怨在㣲而下之猶可以爲謙徳也怨在纎㣲則謙徳可以除之變在萌而爭之則禍成而不救矣㳙㳙不息遂成江河水漏覆舟胡可救哉是故陳餘以張耳之變卒受離身之害思復須臾之忿忘終身之惡是以身㓕而嗣絶也彭寵以朱浮之郄終有覆亡之禍恨督責之小故違終始之大計是以宗夷而族覆也禍福之機可不慎哉二女爭桑吳楚之難作季郈闘雞魯國之釁作可不畏歟可不畏歟是故君子之求勝也以推讓爲利銳推讓所徃前無堅敵以自修爲棚櫓修巳以敬物無害者静則閉嘿泯之玄門動則由恭順之通路時可以静則重閉而玄嘿時可以動則履正而後進是以戰勝而爭不形動静得節故勝無與争争不以力故勝功見耳敵服而怨不搆干戈不用何怨搆之有若然者悔􅪟不存于聲色夫何顯爭之有哉色貌猶不動况力争乎彼顯爭者必自以爲賢人而人以爲險詖者以巳爲賢專固自是是巳非人人得不争乎實無險徳則無可毀之義若信有險徳又何可與訟乎險而與之訟是柙兕而攖虎其可乎怒而害人亦必矣易曰險而違者訟訟必有衆起言險而行違必起衆而成訟矣老子曰夫惟不爭故天下莫能與之爭以謙讓爲務者所徃而無争是故君子以爭途之不可由也由於争途者必覆輪而致禍是以越俗乘高獨行於三等之上何謂三等大無功而自矜一等空虚自矜故爲下等也有功而伐之二等自伐其能故爲中等功大而不伐三等推功於物故爲上等愚而好勝一等不自量度故爲下等賢而尚人二等自羙其能故爲中等賢而能讓三等歸善於物故爲上等緩巳急人一等性不恕人故爲下等急巳急人二等𥚹戾峭刻故爲中等急巳寛人三等謹身恕物故爲上等凡此數者皆道之竒物之變也心不純一是爲竒變三變而後得之故人莫能遠也小人安其下等何由能及哉夫唯知道通變者然後能處之處上等而不失者也是故孟之反以不伐獲聖人之譽不伐其功美譽自生管叔以辭賞受嘉重之賜不貪其賞嘉賜自致夫豈詭遇以求之哉乃純徳自然之所合也豈故不伐辭賞詭情求名耶乃至直發於中自與理㑹也彼君子知自損之爲益故功一而羙二自損而行成名立小人不知自益之爲損故一伐而並失自伐而行毀名䘮由此論之則不伐者伐之也不爭者爭之也不伐而名章不争而理得讓敵者勝之也下衆者上之也退讓而敵服謙尊而徳光君子誠能覩爭途之名險獨乘高於玄路則光暉焕而日新徳聲倫於古人矣避忿肆之險途獨逍遥於上等遠燕雀於啁啾疋鳴鳳於玄曠然後徳輝耀於來今清光侔於徃代人物志卷下
