body:
  text: 重刻人物志跋劉邵人物志凡十二篇辨性質而凖之中庸甄材品以程其職任事核詞章三代而下善評人品者莫或能踰之矣邵生漢末乃其著論體裁纚然有荀卿韓非風致而亹亹自成一家言即九徴八則之論質之孔孟觀人之法唐虞九徳之㫖自有發所未發者後世欲辨官論材惡可以不知也顧其書獲見者少又脫落難讀大中丞真定梁公持節鉞拊鎮中州熊車所莅吏稱民安爰覔善本加訂正刻之宋郡用以傳之人人授簡屬吏旻綴一言于末簡旻得卒業反復流業篇國體器能之說深有味乎其言之也今中丞公厲風俗正天下謀廟勝三材允兼至其振䇿群吏惟器所適靡不奮力展采兢兢罔敢怠遑總逹衆材至矣異日秉鈞當軸將使官不易方而太平用成知人安民之道拭目身親見之邵之志何幸獲酬於公哉刻成輙忘固陋僣書識刻之歲月覽者當知言之非佞云隆慶六年壬申仲夏之吉歸徳府知府掲陽鄭旻謹書
