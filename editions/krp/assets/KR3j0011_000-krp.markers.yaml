  - {type: variant, offset: 49, length: 0, content: '', WYG: 臣等謹案人物志三卷魏劉卲撰卲字孔才邯鄲人黄初中官散騎常侍正始中賜爵闗内侯事迹具三國魏志别本或作劉劭或作劉邵此書末有宋庠跋云據今官書魏志作勉劭之劭從力他本或從邑者晉邑之名案字書此二訓外别無他釋然俱不協孔才之義説文則為卲音同上但召旁從卩耳訓高也李舟切韻訓美也高美又與孔才義符揚子法言曰周公之才之卲是也所辨精核今從之其註為劉昞所作昞字延明燉煌人舊本名上結銜題凉儒林祭酒盖李暠時嘗授是官然十六國春秋稱沮渠蒙遜平酒泉以昞為秘書郎専管注記魏太武時又以昞為樂平王從事中郎則昞歴事三主惟署凉官者誤矣卲書凡十二篇首尾完具晁公武讀書志作十六篇疑傳冩之誤其書主于論辨人才以外見之符驗内藏之器分别流品研析疑似故隋志以下皆著録于名家然所言究悉物情而精覈近理視尹文之説兼陳黄老申韓公孫龍之説惟析堅白同異者迥乎不同盖其學雖出於名家其理則弗乖于儒者也昞註不涉訓詁惟疏通大意而文詞簡古猶有魏晉之遺漢魏叢書所載僅每篇之首存其觧題十六字而盡刪注釋且卷首訛題晉人殊為疏舛此本為萬厯甲申河間劉用霖所刋盖用隆慶壬申鄭旻舊板而修之猶古本云乾隆四十一年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序夫聖賢之所美莫美乎聰明天以三光著其象人以聰明昭其度聰明之所貴莫貴乎知人聰於書計者六藝之一術明於人物者官材之總司知人誠智則衆材得其序而庶績之業興矣是以聖人著爻象則立君子小人之辭君子者小人之師小人者君子之資師資相成其來尚矣叙詩志則别風俗雅正之業九土殊風五方異俗是以聖人立其教不易其方制其政不改其俗制禮樂則考六藝祗庸之德雖不易其方常以詩禮為首雖不改其俗常以孝友為本躬南面則援俊逸輔相之材皆所以逹衆善而成天功也繼天成物其任至重故求賢舉善常若不及天功既成則並受名譽忠臣竭力而効能明君得賢而髙枕上下忠愛謗毁何從生哉是以堯以克明俊德為稱舜以登庸二八為功湯以㧞有莘之賢為名文以舉渭濵之叟為貴由此論之聖人興德孰不勞聰明於求人獲安逸於任使者哉采士飯牛秦穆所以霸西戎一相仲父齊桓所以成九合是故仲尼不試無所援升猶序門人以為四科泛論衆材以辨三等舉德行為四科之首叙生知為三等之上明德行者道義之門質志氣者材智之根也又歎中庸以殊聖人之德中庸之德其至矣乎人鮮乆矣唯聖人能之也尚德以勸庶幾之論顔氏之子其殆庶幾乎三月不違仁乃窺德行之門若非志士仁人希邁之性日月至焉者豈能終之訓六蔽以戒偏材之失仁者愛物蔽在無斷信者露誠蔽在無隠此偏材之常失也思狂獧以通拘抗之材或進趨於道義或㓗已而無為在上者兩順其所能則拘抗並用疾悾悾而無信以明為似之難保厚貎深情聖人難之聽其言而觀其所為則似託不得逃矣又曰察其所安觀其所由以知居止之行言必契始以要終行必覩初以求卒則中外之精粗可見矣人物之察也如此其詳不詳察則官材失其序而庶政之業荒矣是以敢依聖訓志序人物庶以補綴遺忘惟博識君子裁覽其義焉魏劉卲序}
