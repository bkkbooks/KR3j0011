  - {type: variant, offset: 0, length: 193, content: 序人物志後余嘗三復人物志而竊有感焉夫人徳性資之繼成𥘉未始有異也而終之相去懸絶者醇駁較於材隆汚判諸習曰三品曰五儀胥是焉而賢不肖殊途矣是以知人之哲古人難之言貌而取人者聖人弗是也茲劉邵氏之有以志人物也乎修巳者得之以自觀用人者持之以照物烏可廢諸然用舎之際人材之趋向由之可弗慎乎精於擇而庸適其能篤於任而弗貳以私則真材獲用大猷允升矣其或偏聽昡志而用不以道動曰才難吾恐蕭艾弗擇魚目混珍也左馮翊王三省識, WYG: 欽定四庫全書子部十}
