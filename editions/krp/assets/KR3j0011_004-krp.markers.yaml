  - {type: variant, offset: 641, length: 224, content: 年十四就博士郭瑀瑀弟子五百餘人通經業者八十餘人瑀有女始笄妙選良偶有心於昞遂别設一席謂弟子曰吾有一女欲覔快女婿誰坐此席者吾當婚焉昞遂奮坐神志湛然曰昞其人也瑀遂以女妻之昞後隱居酒泉不應州郡命弟子受業者五百餘人李暠㨿凉州徴爲儒林祭酒從事郎暠好尚文典書史穿落者親自𥙷葺昞時侍側請代其事暠曰躬自執者欲人重此典籍吾與卿相遇何異孔明之㑹玄徳遷撫夷護軍雖有政務手不釋卷暠曰卿注記篇籍以燭繼晝白日且然夜可休息昞曰朝聞道夕死可矣不知老之將至孔聖稱言昞何人斯敢不如此昞以, WYG: 左馮翊王}
