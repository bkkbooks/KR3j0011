body:
  text: 卷上九徵第一人物情性志氣不同徵神見貌形驗有九九徵第一蓋人物之本出乎情性性質稟之自然情變由於染習是以觀人察物當尋其性質也情性之理甚微而玄非聖人之察其孰能究之哉知無形狀故常人不能覩惟聖人目擊而照之凡有血氣者莫不含元一以為質質不至則不能涉寒暑歷四時稟陰陽以立性性資於陰陽故剛柔之意別矣體五行而著形骨徑筋柔皆稟精於金木苟有形質猶可即而求之由氣色外著故相者得其情素也凡人之質量中和最貴矣質白受采味甘受和中和者百行之根本人情之良田也中和之質必平淡無味惟淡也故五味得和焉若苦則不能甘矣若酸則不能醎矣故能調成五材變化應節平淡無偏群材必御致用有宜通變無滯是故觀人察質必先察其平淡而後求其聰明譬之驥騄雖超逸絶群若氣性不和必有毀銜碎首決胸之禍也聰明者陰陽之精離目坎耳視聽之所由也陰陽清和則中睿外明聖人淳耀能兼二美知微知章耳目兼察通幽達微官材授方舉無遺失自非聖人莫能兩遂雖得之於目或失之於耳故明白之士達動之機而暗於玄慮達於進趨而暗於止靜以之進趨則欲速而成疾以之深慮則抗奪而不入也玄慮之人識靜之原而困於速捷性安沉默而智乏應機以之間靜則玄微之道搆以之濟世則徑捷而無成猶火日外照不能內見金水內映不能外光人各有能物各有性是以聖人任明白以進趨委守成於玄慮然後動止得節出處應宜矣二者之義蓋陰陽之別也陽動陰靜乃天地之定性況人物乎若量其材質稽諸五物五物之徵亦各著於厥體矣䈥勇色青血勇色赤中動外形豈可匿也其在體也木骨金䈥火氣土肌水血五物之象也五性者成形之具五物為母故氣色從之而具五物之實各有所濟五性不同各有所稟稟性多者則偏性生也是故骨植而柔者謂之弘毅弘毅也者仁之質也木則垂蔭為仁之質質不弘毅不能成仁氣清而朗者謂之文理文理也者禮之本也火則照察為禮之本本無文理不能成禮體端而實者謂之貞固貞固也者信之基也土必吐生為信之基基不貞固不能成信䈥徑而精者謂之勇敢勇敢也者義之決也金能斷割為義之決決不勇敢不能成義色平而暢者謂之通微通微也者智之原也水流疏達為智之原原不通微不能成智五質恆性故謂之五常矣五物天地之常氣五德人物之常行五常之別列為五德是故溫直而擾毅木之德也溫而不直則懦擾而不毅則銼剛塞而弘毅金之德也剛而不塞則決弘而不毅則缺願恭而理敬水之德也願而不恭則悖理而不敬則亂寬栗而柔立土之德也寬而不栗則慢柔而不立則散簡暢而明砭火之德也簡而不暢則滯明而不砭則翳雖體變無窮猶依乎五質人情萬化不可勝極尋常竟源常在於五故其剛柔明暢貞固之徵著乎形容見乎聲色發乎情味各如其象自然之理神動形色誠發於中德輝外耀故心質亮直其儀徑固心質休決其儀進猛心質平理其儀安間夫儀動成容各有態度直容之動矯矯行行休容之動業業蹌蹌德容之動顒顒卬卬夫容之動作發乎心氣心氣於內容見於外心氣之徵則聲變是也心不繫一聲和乃變夫氣合成聲聲應律呂清而亮者律和而平者呂有和平之聲有清暢之聲有回衍之聲心氣不同故聲發亦異也夫聲暢於氣則實存貌色非氣無以成聲聲成則貌應故誠仁必有溫柔之色誠勇必有矜奮之色誠智必有明達之色聲既殊管故色亦異狀夫色見於貌所謂徵神貌色徐疾為神之徵驗徵神見貌則情發於目目為心候故應心而發故仁目之精愨然以端心不傾倚則視不回邪勇膽之精曄然以彊志不怯懦則視不衰悴然皆偏至之材以勝體為質者也未能不厲而威不怒而嚴故勝質不精則其事不遂能勇而不能怯動必悔吝隨之是故直而不柔則木木彊徼訐失其正直徑而不精則力負鼎絶臏失其正徑固而不端則愚專己自是陷於愚戇氣而不清則越辭不清順發越無成暢而不平則蕩好智無涯蕩然失絶是故中庸之質異於此類勇而能怯仁而能決其體兩兼故為衆材之主五常既備包以淡味既體鹹酸之量而以無味為御五質內充五精外章五質淡凝淳耀外麗是以目彩五暉之光也心清目朗粲然自耀故曰物生有形形有神精不問賢愚皆受氣質之稟性陰陽但智有精粗形有淺深耳尋其精色視其儀象下至皂隸牧圉皆可想而得之也能知精神則窮理盡性聖人有以見天下之動而擬諸形容故能窮理盡性以至於命性之所盡九質之徵也陰陽相生數不過九故性情之變質亦同之然則平陂之質在於神神者質之主也故神平則質平神陂則質陂明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之勢在於䈥䈥者勢之用故䈥徑則勢勇䈥弱則勢怯彊弱之植在於骨骨者植之基故骨剛則植彊骨柔則植弱躁靜之決在於氣氣者決之地也氣盛決於躁氣沖決於靜矣慘懌之情在於色色者情之候也故色悴由情慘色悅由情懌衰正之形在於儀儀者形之表也故儀衰由形殆儀正由形肅態度之動在於容容者動之符也故邪動則容態正動則容度緩急之狀在於言言者心之狀也故心恕則言緩心褊則言急其為人也質素平淡中睿外朗䈥徑植固聲清色懌儀崇容直則九徵皆至則純粹之德也非至德大人其孰能與於此九徵有違違為乖戾也則偏雜之材也或聲清色懌而質不平淡或䈥徑植固而儀不崇直三度不同其德異稱偏材荷一至之名兼材居德儀之目兼德體中庸之度故偏至之材以材自名猶百工衆伎各有其名也兼材之人以德為目仁義禮智得其一目兼德之人更為美號道不可以一體說德不可以一方待育萬物而不為仁齊衆形而不為德凝然平淡與物無際誰知其名也是故兼德而至謂之中庸居中履常故謂之中庸中庸也者聖人之目也大仁不可親大義不可報無德而稱寄名於聖人也具體而微謂之德行德行也者大雅之稱也施仁以親物立義以利仁失道而成德抑亦其次也一至謂之偏材偏材小雅之質也徒仁而無義徒義而無仁未能兼濟各守一行是以名不及大雅也一徵謂之依似依似亂德之類也純訐似直而非直純宕似通而非通一至一違謂之間雜間雜無恆之人也善惡參渾心無定是無恆之操胡可擬議無恆依似皆風人末流其心孔艱者乃有教化之所不受也末流之質不可勝論是以略而不概也蕃徒成群豈可數哉體別第二稟氣陰陽性有剛柔拘抗文質體越各別體別第二夫中庸之德其質無名泛然不繫一貌人無得而稱焉故鹹而不鹻謂之醎耶無鹻可容公成百鹵也與鹹同淡而不𨣈謂之淡耶味復不𨣈質而不縵謂之質耶理不縵素文而不繢謂之文耶采不畫繢能威能懷能辨能訥居醎淡之和處質文之際是以望之儼然即之而文言滿天下無辭費變化無方以達為節應變適化期於通物是以抗者過之勵然抗奮於進趨之塗而拘者不逮屯然無為於拘抗之外夫拘抗違中故善有所章而理有所失養形至甚則虎食其外高門懸薄則病攻其內是故厲直剛毅材在矯正失在徼訐訐刺生於剛厲柔順安恕每在寬容失在少決多疑生於恕懦雄悍傑健任在膽烈失在多忌慢法生於桀悍精良畏慎善在恭謹失在多疑疑難生於畏慎彊楷堅徑用在楨幹失在專固專己生於堅徑論辨理繹能在釋結失在流宕傲宕生於機辨普博周洽弘在覆裕失在溷濁溷濁生於周普清介廉潔節在儉固失在拘局拘局生於廉潔休動磊落業在攀躋失在疏越疏越生於磊落沉靜機密精在玄微失在遲緩遲緩生於沉靜朴露徑盡質在中誠失在不微漏露生於徑盡多智韜情權在譎略失在依違隱違生於韜情及其進德之日不止揆中庸以戒其材之拘抗抗者自是以奮勵拘者自是以守局而指人之所短以益其失拘者愈拘抗者愈抗或負石沉軀或抱木燋死猶晉楚帶劍遞相詭反也自晉視楚則笑其在左自楚視晉則笑其在右左右雖殊各以其用而不達理者橫相誹謗拘抗相反皆不異此是故彊毅之人狠剛不和不戒其彊之搪突而以順為撓厲其抗以柔順為撓弱抗其搪突之心是故可以立法難與入微狠彊剛戾何機微之能入柔順之人緩心寬斷不戒其事之不攝而以抗為劌安其舒以猛抗為劌傷安其恕忍之心是故可與循常難與權疑緩心寡斷何疑事之能權雄悍之人氣奮勇決不戒其勇之毀跌而以順為恇竭其勢以順忍為恇怯而竭其毀跌之勢是故可與涉難難與居約奮悍毀跌何約之能居懼慎之人畏患多忌不戒其懦於為義而以勇為狎增其疑以勇戇為輕侮而增其疑畏之心是故可與保全難與立節畏患多忌何節義之能立凌楷之人秉意徑特不戒其情之固護而以辨為僞彊其專以辨博為浮虛而彊其專一之心是故可以持正難與附衆執意堅持何人衆之能附辨博之人論理贍給不戒其辭之泛濫而以楷為繫遂其流以楷正為繫礙而遂其流宕之心是故可與泛序難與立約辨博泛濫何質約之能立弘普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁以拘介為狷戾而廣其溷雜之心是故可以撫衆難與厲俗周洽溷雜何風俗之能厲狷介之人砭甫廉反清激濁不戒其道之隘狹而以普為穢益其拘以弘普為穢雜而益其拘局之心是故可與守節難以變通道狹津隘何通塗之能涉休動之人志慕超越不戒其意之大猥而以靜為滯果其鋭以沉靜為滯屈而增果鋭之心是故可以進趨難與持後志在超越何謙後之能持沉靜之人道思回復不戒其靜之遲後而以動為疏美其懦以躁動為粗疏而美其懦弱之心是故可與深慮難與捷速思慮回復何機速之能及朴露之人中疑實𥔿不戒其實之野直而以譎為誕露其誠以權譎為浮誕而露其誠信之心是故可與立信難與消息實𥔿野直何輕重之能量韜譎之人原度取容不戒其術之離正而以盡為愚貴其虛以款盡為愚直而貴其浮虛之心是故可與讚善難與矯違韜譎離正何違邪之能矯夫學所以成材也彊毅靜其抗柔順厲其懦恕所以推情也推己之情通物之性偏材之性不可移轉矣固守性分聞義不徙雖教之以學材成而隨之以失剛毅之性已成徼訐之心彌篤雖訓之以恕推情各從其心意之所非不肯是之於人信者逆信推己之信謂人皆信而詐者得容為僞也詐者逆詐推己之詐謂人皆詐則信者或受其疑也故學不入道恕不周物偏材之人各是己能何道之能入何物能周也此偏材之益失也材不能兼教之愈失是以宰物者用人之仁去其貪用人之智去其詐然後群材畢御而道周萬物也矣流業第三三材為源習者為流流漸失源其業各異流業第三蓋人流之業十有二焉性既不同染習又異枝流條別各有志業有清節家行為物範有法家立憲垂制有術家智慮無方有國體三材純備有器能三材而微有臧否分別是非有伎倆錯意工巧有智意能鍊衆疑有文章屬辭比事有儒學道藝深明有口辨應對給捷有雄傑膽略過人若夫德行高妙容止可法是謂清節之家延陵晏嬰是也建法立制彊國富人是謂法家管仲商鞅是也思通道化策謀奇妙是謂術家范蠡張良是也兼有三材三材皆備德與法術皆純備也其德足以厲風俗其法足以正天下其術足以謀廟勝是謂國體伊尹呂望是也兼有三材三材皆微不純備也其德足以率一國其法足以正鄉邑其術足以權事宜是謂器能子産西門豹是也兼有三材之別各有一流三材為源則習者為流也清節之流不能弘恕以清為理何能寬恕好尚譏訶分別是非己不寬恕則是非生是謂臧否子夏之徒是也法家之流不能創思遠圖法制於近思不及遠而能受一官之任錯意施巧務在功成故巧意生是謂伎倆張敞趙廣漢是也術家之流不能創制垂則以術求功故不垂則而能遭變用權權智有餘公正不足長於權者必短於正是謂智意陳平韓安國是也凡此八業皆以三材為本非德無以正法非法無以興術是以八業之建常以三材為本故雖波流分別皆為經事之材也耳目殊管其用同功群材雖異成務一致能屬文著述是謂文章司馬遷班固是也能傳聖人之業而不能幹事施政是謂儒學毛公貫公是也辨不入道而應對資給是謂口辨樂毅曹丘生是也膽力絶衆材略過人是謂驍雄白起韓信是也凡此十二材皆人臣之任也各抗其材不能兼備保守一官故為人臣之任也主德不預焉主德者聰明平淡總達衆材而不以事自任者也目不求視耳不參聽各司其官則衆材達衆材既達則人主垂拱無為而理是故主道立則十二材各得其任也上無為則下當任也清節之德師氏之任也掌以道德教道胄子法家之材司寇之任也掌以刑法禁制姦暴術家之材三孤之任也掌以廟謨佐公論正三材純備三公之任也位於三槐坐而論道三材而微冢宰之任也天官之卿總御百官臧否之材師氏之佐也分別是非以佐師氏智意之材冢宰之佐也師事制宜以佐天官伎倆之材司空之任也錯意施巧故掌冬官儒學之材安民之任也掌以德毅保安其人文章之材國史之任也憲章紀述垂之後代辨給之材行人之任也掌之應答送迎道路驍雄之材將帥之任也掌轄師旅討平不順是謂主道得而臣道序官不易方而太平用成太平之所以成由官人之不易方若使足操物手求行四體何由寧理道何由平若道不平淡與一材同用好譬大匠善規惟規之用則一材處權而衆材失任矣惟規之用則矩不得立其方繩不得經其直雖日運規矩無由成矣材理第四材既殊塗理亦異趣故講群材至理乃定材理第四夫建事立義莫不須理而定言前定則不惑事前定則不躓及其論難鮮能定之夫何故哉蓋理多品而人材異也事有萬端人情舛駁誰能定之夫理多品則難通人材異則情詭情詭難通則理失而事違也情詭理多何由而得夫理有四部道義事情各有部也明有四家明通四部各有其家情有九偏以情犯明得失有九流有七似似是而非其流有七說有三失辭勝理滯所失者三難有六構彊良競氣忿構有六通有八能聰思明達能通者八若夫天地氣化盈虛損益道之理也以道化人與時消息法制正事事之理也以法理人務在憲制禮教宜適義之理也以理教之進止得宜人情樞機情之理也觀物之情在於言語四理不同其於才也須明而章明待質而行是故質於理合合而有明明足見理理足成家道義與事情各有家是故質性平淡思心玄微容不躁擾其心詳密能通自然道理之家也以道為理故能通自然也質性警徹權略機捷容不遲鈍則其心機速能理煩速事理之家也以事為理故審於理煩也質性和平能論禮教容不失適則禮教得中辨其得失義理之家也以義為理故明於得失也質性機解推情原意容不妄動則原物得意能適其變情理之家也以情為理故能極物之變四家之明既異而有九偏之情以情犯明各有得失明出於真情動於性情勝明則蔽故雖得而必喪也剛略之人不能理微用意粗疏意不玄微故其論大體則弘博而高遠性剛則志遠歷纖理則宕往而疏越志遠故疏越抗厲之人不能回撓用意猛奮志不旋屈論法直則括處而公正性厲則理毅說變通則否戾而不入理毅則滯礙堅徑之人好攻其事實用意端確言不虛徐指機理則頴灼而徹盡性確則言盡涉大道則徑露而單持言切則義少辨給之人辭煩而意鋭用意疾急志不在退挫推人事則精識而窮理性鋭則窮理即大義則恢愕而不周理細故遺大浮沉之人不能沉思用意虛廓志不淵密序疏數則豁達而傲博性浮則志傲立事要則爁焱而不定志傲則理疏淺解之人不能深難用意淺脕思不深熟聽辨說則擬鍔而愈悅性淺則易悅審精理則掉轉而無根易悅故無根寬恕之人不能速捷用意徐緩思不速疾論仁義則弘詳而長雅性恕則理雅趨時務則遲緩而不及徐雅故遲緩溫柔之人力不休彊用意溫潤志不美悅味道理則順適而和暢性和則理順擬疑難則濡懦而不盡理順故依違好奇之人橫逸而求異用意奇特志不同物造權譎則倜儻而瓌壯性奇則尚麗案清道則詭常而恢迂奇逸故恢詭此所謂情有九偏各從其心之所可以為理心之所可以為理是非相蔽終無休已若乃性不精暢則流有七似有漫談陳說似若流行者浮漫流雅似若可行有理少多端似若博意者辭繁喻博似若弘廣有回說合意似若讚解者外佯稱善內實不知有處後持長從衆所安似能聽斷者實自無知如不言觀察衆談讚其所安有避難不應似若有餘而實不知者實不能知忘徉不應似有所知而不答者有慕通口解似悅而不懌者聞言即說有似於解者心中漫漫不能悟有因勝情失窮而稱妙辭已窮矣自以為妙而未盡跌則掎托理已跌矣而彊牽據實求兩解似理不可屈者辭窮理屈心樂兩解而言猶不止聽者謂之未屈凡此七似衆人之所惑也非明鏡焉能監之夫辨有理勝理至不可動有辭勝辭巧不可屈理勝者正白黑以廣論釋微妙而通之說事分明有如粉黛朗然區別辭不潰雜辭勝者破正理以求異求異則正失矣以白馬非白馬一朝而服千人及其至關禁錮直而後過也夫九偏之材有同有反有雜同則相解譬水流於水反則相非猶火滅於水雜則相恢亦不必同又不必異所以恢達故善接論者度所長而論之因其所能則其言易曉歷之不動則不說也彼意在狗馬俟他日傍無聽達則不難也凡相難講為達者聽不善接論者說之以雜反彼意在狗而說以馬彼意大同而說以小異說之以雜反則不入矣以方入圓理終不可善喻者以一言明數事辭附於理則言寡而事明不善喻者百言不明一意辭遠乎理雖汛濫多言己不自明況他人乎百言不明一意則不聽也自意不明誰聽之是說之三失也善難者務釋事本每得理而止住不善難者舍本而理末逐其言而接之舍本而理末則辭構矣不尋其本理而以煩辭相文善攻彊者下其盛鋭對家彊梁始氣必盛故善攻彊者避其初鼓也扶其本指以漸攻之三鼓氣勝衰則攻易不善攻彊者引其誤辭以挫其鋭意彊者意鋭辭或暫誤擊誤挫鋭理之難也挫其鋭意則氣構矣非徒群言交錯遂至動其聲色善躡失者指其所跌彼有跌失暫指不逼不善躡失者因屈而抵其性陵其屈跌而抵挫之因屈而抵其性則怨構矣非徒聲色而已怨恨逆結於心或常所思求久乃得之倉卒諭人人不速知則以為難諭已自久思而不恕人以為難諭則忿構矣非徒怨恨遂生忿爭夫盛難之時其誤難迫氣盛辭誤且當避之故善難者徵之使還氣折意還自相應接不善難者凌而激之雖欲顧藉其勢無由棄誤顧藉不聽其言其勢無由則妄構矣妄言非訾縱橫恣口凡人心有所思則耳且不能聽思心一至不聞雷霆是故並思俱說競相制止欲人之聽己止他人之言欲使聽己人亦以其方思之故不了己意則以為不解非不解也當己出言由彼方思故人不解人情莫不諱不解謂其不解則性諱怒諱不解則怒搆矣不顧道理是非於其凶怒忿肆凡此六搆變之所由興也然雖有變搆猶有所得造事立義當須理定故雖有變說小故終於理定功立若說而不難各陳所見則莫知所由矣人人競說若不難質則不知何者可用也由此論之談而定理者眇矣理多端人情異故發言盈庭莫肯執其咎必也聰能聽序登高能賦求物能名如顏回聽哭蒼舒量象思能造端子展謀侵晉乃得諸侯之盟明能見機臾駢覩目動即知秦師退辭能辨意伊籍答吳王曰一拜一起未足為勞捷能攝失郭淮答魏帝曰自知必免防風之誅守能待攻墨子謂楚人吾弟子已待之於宋攻能奪守毛遂進曰今日從為楚不為趙也楚王從而謝之奪能易豫以子之矛易子之盾則物主辭窮兼此八者然後乃能通於天下之理通於天下之理則能通人矣不能兼有八美適有一能所謂偏材之人則所達者偏而所有異目矣各以所通而立其名是故聰能聽序謂之名物之材思能造端謂之搆架之材明能見機謂之達識之材辭能辨意謂之贍給之材捷能攝失謂之權捷之材守能待攻謂之持論之材攻能奪守謂之推徹之材奪能易豫謂之貿說之材通材之人既兼此八材行之以道與通人言則同解而心喻同即相是是以心相喻與衆人言則察色而順性下有盛色避其所短雖明包衆理不以尚人恆懷謙下故處物上聰睿資給不以先人常懷退後故在物先善言出己理足則止通理則止不務煩辭鄙誤在人過而不迫見人過跌輒當歷避寫人之所懷扶人之所能扶贊人之所能則人人自任矣不以事類犯人之所婟胡故反與盲人言不諱眇瞎之類不以言例及己之所長己有武力不與虓虎之倫說直說變無所畏惡通材平釋信而後諫雖觸龍鱗物無害者采蟲聲之善音不以聲醜棄其善曲贊愚人之偶得不以人愚廢其嘉言奪與有宜去就不留方其盛氣折謝不吝不避鋭跌不惜屈撓方其勝難勝而不矜理自勝耳何所矜也心平志諭無適無莫付是非於道理不貪勝以求名期於得道而已矣是可與論經世而理物也曠然無懷委之至當是以世務自經萬物自理
