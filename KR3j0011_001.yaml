seq: 1
front:
  text: 人物志序夫聖賢之所美莫美乎聰明天以三光著其象人以聰明邵其度聰明之所貴莫貴乎知人聰於書計者六藝之一術明於人物者官材之總司知人誠智則衆材得其序而庶績之業興矣是以聖人著爻象則立君子小人之辭君子者小人之師小人者君子之資師資相成其來尚矣敘詩志則別風俗雅正之業九土殊風五方異俗是以聖人立其教不易其方制其政不改其俗制禮樂則考六藝祗庸之德雖不易其方常以詩禮為首雖不改其俗常以孝友為本躬南面則援俊逸輔相之材皆所以達衆善而成天功也繼天成物其任至重故求賢舉善常若不及天功既成則並受名譽忠臣竭力而效能明君得賢而高枕上下忠愛謗毀何從生哉是以堯以克明俊德為稱舜以登庸二八為功湯以拔有莘之賢為名文王以舉渭濱之叟為貴由此論之聖人興德孰不勞聰明於求人獲安逸於任使者哉采士飯牛秦穆所以霸西戎一則仲父齊桓所以成九合是故仲尼不試無所援升猶序門人以為四科泛論衆材以辨三等舉德行為四科之首敘生知為三等之上明德行者道義之門質志氣者材智之根也又歎中庸以殊聖人之德中庸之德其至矣乎人鮮久矣唯聖人能之也尚德以勸庶幾之論顏氏之子其殆庶幾乎三月不違仁乃窺德行之門若非志士仁人希邁之性日月至焉者豈能終之訓六蔽以戒偏材之失仁者愛物蔽在無斷信者露誠蔽在無隱此偏材之常失也思狂狷以通拘抗之材或進趨於道義或潔己而無為在上者兩順其所能則拘抗並用疾悾悾而無信以明為似之難保厚貌深情聖人難之聽其言而觀其所為則似託不得逃矣又曰察其所安觀其所由以知居止之行言必契始以要終行必覩初以求卒則中外之情粗可觀矣人物之察也如此其詳不詳察則官材失其序而庶政之業荒矣是以敢依聖訓志序人物庶以補綴遺忘惟博識君子裁覽其義焉
