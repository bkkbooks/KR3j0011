  - {type: variant, offset: 138, length: 0, content: '', SBCK: 方䋲不得經其􅀡雖目運䂓矩無由成矣材理第四材既殊􅂗理亦異趣故講羣材至理乃定夫建事立義莫不湏理而定言前定則不惑事前定則不躓及其論難鮮能定之夫何故哉葢理多品而人異也事有萬端人情舛駁誰能定之夫理多品則難通人材異則情詭情詭難通則理失而事違也情詭理多何由而得夫理有四部道義事情各有部也明有四家明通四部各有其家情有九偏以情犯明得失有九流有七似似是而非其流有七􅀃有三失辭勝理滯所失者三難有六構彊良競氣忿構有六通有八能聦思明逹能通者八􅀂夫天地氣化盈虛損益道之理也以道化人與時消息法制正事事之理也以法理人務在憲制禮}
