  - {type: variant, offset: 140, length: 0, content: '', krp: 同其於才也湏明而章明待質而行是故質於理合合而有明明足見理理足成家道義與事情各有家是故質性平淡思心玄㣲容不躁櫌其心詳宻能通自然道理之家也以道爲理故能通自然也質性警徹權畧機㨗容不遲鈍則其心機速能理煩速事理之家也以事爲理故審於理煩也質性和平能論禮教容不失適則禮教得中辯其得失義禮之家也以義爲禮故明於得失也質性機觧推情原意容不妄動則原物得意能適其變情理之家也以情爲理故能極物之變四家之明既異而有九偏之情以性犯明各有得失明出於真情動於性情勝明則蔽故雖得而必䘮也剛畧之人不能理㣲用意麄粗意不玄㣲故其論大體則弘博而髙遠性剛則志遠歷纎理則宕徃而䟽越志遠故䟽越抗厲之人不能廻撓用意猛奮志不旋屈論法直則括處而公正性厲則理毅說變通則否戾而不入理毅則滯礙堅勁之人好攻其事實用意端確言不虛徐指機理則頴灼而徹盡性確則言盡渉大道則徑露而單持言切則義少辯給之人辭煩而意銳用意疾急志不在退挫推人事則精識而窮理性銳則窮理即大義則恢愕而不周理細故遺大浮沉之人不能沉思用意虛廓志不淵宻序䟽數則豁逹而傲博性浮則志㣲立事要則爁炎而不定志傲則理䟽淺觧之人不能深難用意淺脕思不深熟聼辯說則擬鍔而愉恱性淺則}
  - {type: variant, offset: 141, length: 0, content: '', SBCK: 恱審精理則掉轉而無根易恱故無根寛恕之人不能速㨗用意徐緩思不速疾論仁義則弘詳而長雅性恕則理雅趨時務則遲緩而不及徐雅故遲緩温柔之人力不休彊用意温潤志不羙恱味道理則順適而和暢性和則理順擬疑難則濡愞而不盡理順故依違好竒之人横逸而求異用意竒特志不同物造權譎則倜儻而􅉞壯性竒則尚麗案清道則詭常而恢迂竒逸故恢詭此所謂性有九偏各從其心之所可以爲理心之所可以爲理是非相蔽終無休巳􅀂乃性不精暢則流有七似有漫談陳􅀃似有流行者浮漫流雅似􅀂可行有理少多端似􅀂􅀶意者辭繁喻愽似若弘廣有􅅆􅀃合意似􅀂讃解者外佯稱善内實不知有處後持長從衆所安似能聼斷者實自無知如不言觀察衆談讃其所安有避難不應似􅀂有餘而實不知者實不能知忘徉不應似有所知而不荅者有慕通口解似恱而不懌者聞言即􅀃有似於觪者心中漫漫不能悟有因勝情失窮而稱妙辭巳窮矣自以爲妙而未盡跌則掎蹠理巳跌矣而彊牽㨿實求兩解似理不可屈者辭窮理屈心樂兩解而言猶不止聼者謂之未屈凡此七似衆人之所惑也非明鏡焉能監之夫辯有理勝理至不可動有辭勝辭巧不可屈理勝者正白黑以廣論釋㣲妙而通之說事分明有如粉黛朗然區别辭不潰雜辭勝者破正理以求異求異則正失矣以白馬非白馬一朝而服于人及其至􅀜禁錮􅀡而後過也夫九偏之材有同有反有雜同則相解譬水流於水反則相非猶火滅於水雜則相恢亦不必同又不必異所以恢逹故善接論者度所長而論之因其所能則其言易曉歷之不動則不􅀃也意在杓馬彼俟他日􅅖無聽逹則不難也凡相難講爲逹者聼不善接論者􅀃之以雜反彼意在狗而􅀃以馬彼意大同而􅀃以小異􅀃之以雜反則不入矣以方入圓理終不可善喻者以一言明數事辭附於理則言寡而事明不善喻者百言不明一意辭遠乎理雖汎濫多言巳不自明况他人乎百言不明一意則不聼也自意不明誰聼之是􅀃之三失也善難者務釋事本每得理而止住不善難者舍本而理末逐其言而接之舍本而理末則辭構矣不尋其本理而以煩辭相文善攻彊者下其盛銳對家彊梁始氣必盛故善攻彊者避其􅀄鼔也扶其本指以漸攻之三鼔氣勝衰則攻易不善攻彊者引其誤辭以挫其銳意彊者意銳辭或暫誤擊誤挫銳理之難也挫其銳意則氣搆矣非徒羣言交錯遂至動其聲色善躡失者指其所跌彼有跌失暫指不逼不善躡失者因屈而抵其性陵其屈跌而抵挫之因屈而抵其性則怨構矣非徒聲色而巳怨恨逆結於心或常所思求乆乃得之倉卒諭人人不速知則以爲難諭巳自乆思而不恕人以爲難諭則忿構矣非徒怨恨遂生忿爭夫盛難之時其誤難迫氣盛辭誤且當避之故善難者徴之使還氣折意還自相應接不善難者凌而激之雖欲顧藉其􅀔無由棄誤顧藉不聼其言其􅀔無由則妄構矣妄言非訾縱横恣口凡人心有所思則耳且不能聽思心一至不聞雷霆是故並思俱􅀃競相制止欲人之聽巳止他人之言欲使聼巳人亦以}
