  - {type: variant, offset: 120, length: 1, content: 雅, SBCK: 之能厲狷介之人砭甫廉反清激濁不戒其道之隘狹而以普爲􅁾益其拘以弘普爲􅁾雜而益其拘􅈰之心是故可與守節難以變通道狹津隘何通􅂗之能渉休動之人志慕超越不戒其意之大猥而以静爲滯果其銳以沉静爲滯屈而增果銳之心是故可以進趨難與持後志在超越何謙後之能持沉静之人道思􅅆復不戒其靜之遲後而以動爲䟽羙其愞以躁動爲麄䟽而羙其愞弱之心是故可與深慮難與㨗速思慮􅅆復何機速之能及樸露之人中疑實不戒其實之野􅀡而以譎爲誕露其誠以權譎爲浮誕而露其誠信之心是故可與立信難與消息實野􅀡何輕重之能量韜譎之人原度取容不戒其術之離}
