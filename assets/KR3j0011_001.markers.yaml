  - {type: variant, offset: 3, length: 2, content: 序夫, SBCK: 卷上魏散􅀐常侍劉邵撰凉儒林祭酒劉昞注九徴一體别二流業三材理四九徴第一人物情性志氣不同徴神見貌形驗有九葢人物之本岀乎情性性質禀之自然情變由於染習是以觀人察物當尋其性質也情性之理甚㣲而玄非}
