  - {type: variant, offset: 110, length: 8, content: 來尚矣敘詩志則別, SBCK: 抗以柔順爲撓弱抗其搪突之心是故可以立法難與入㣲狠彊剛戾何機㣲之能入柔順之人緩心寛斷不戒其事之不攝而以抗爲劌安其舒以猛抗爲劌傷安其恕􅃘之心是故可與循常難與權疑緩心寡斷何疑事之能權雄悍之人氣奮勇决不戒其勇之毀跌而以順爲恇竭其􅀔以順􅃘爲恇怯而竭其毀跌之􅀔是故可與渉難難與居約奮悍毀跌何約之能居懼慎之人畏患多忌不戒其愞於爲義而以勇爲狎增其疑以勇戅爲輕侮而增其疑畏之心是故可與保全難與立節畏患多忌何節義之能立凌楷之人秉意勁特不戒其情之固護而以辨爲僞彊其專以辨􅀶爲浮虚而彊其專一之心是故可以持正難與附衆執意堅持何人衆之能附辨􅀶之人論理贍給不戒其辭之汎濫而以楷爲繫遂其流以楷正爲繋礙而遂其流宕之心是故可與汎序難與立約辨愽汎濫何質約之能立弘普之人意愛周洽不戒其交之溷雜而以介爲狷廣其濁以拘介爲狷戾而廣其溷雜之心是故可以撫衆難與厲俗周洽溷雜何}
  - {type: page-break, offset: 110, content: '', id: KR3j0011_SBCK_001-9a}
  - {type: page-break, offset: 110, content: '', id: KR3j0011_SBCK_001-9b}
  - {type: variant, offset: 110, length: 8, content: 來尚矣敘詩志則別, WYG: 抗以柔順為撓弱抗其搪突之心是故可以立法難與入㣲狠彊剛戾何機㣲之能入柔順之人緩心寛斷不戒其事之不攝而以抗為劌安其舒以猛抗為劌傷安其恕忍之心是故可與循常難與權疑緩心寡斷何疑事之能權雄悍之人氣奮勇决不戒其勇之毁跌而以順為恇竭其勢以順忍為恇怯而竭其毁跌之勢是故可與渉難難與居約奮悍毁跌何約之能居懼慎之人畏患多忌不戒其愞於為義而以勇為狎増其疑以勇戇為輕侮而増其疑畏之心是故可與保全難與立節畏患多忌何節義之能立凌楷之人秉意勁特不戒其情之固䕶而以辨為偽彊其専以辨博為浮虛而彊其専一之心是故可以持正難與附衆執意堅持何人衆之能附辨博之人論理贍給不戒其辭之汎濫而以楷為繫遂其流以楷正為繫礙而遂其流宕之心是故可與汎序難與立約辨博汎濫何質約之能立𢎞普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁以拘介為狷戾而廣其溷雜之心是故可與撫衆難與厲俗周洽溷雜何}
