  - {type: variant, offset: 94, length: 1, content: 小, SBCK: 過之勵然抗奮於進趨之􅂗而拘者不逮屯然無爲於拘抗之外夫拘抗違中故善有所章而理有所失養形至甚則虎食其外高門懸薄則病攻其内是故厲􅀡剛毅材在矯正失在激訐訐刺生於剛厲柔順安恕每在寛容失在少决多疑生於恕懦雄悍傑健任在膽烈失在多忌慢法生於桀悍精良畏慎善在恭謹失在多疑疑難生於畏慎彊楷堅勁用在楨幹失在專固專巳生於堅勁論辨理繹能在釋結失在流宕傲宕生於機辨普􅀶周給弘在覆􅁉失在溷濁溷濁生於周普清介廉潔節在儉固失在拘􅈰拘􅈰生於廉潔休動磊落業在攀躋失在䟽越䟽越生於磊落沉静機宻精在玄㣲失在遲緩遲緩生於沉静樸露徑盡質在中誠失在不㣲漏露生於徑盡多智韜情權在譎畧失在依違隱違生於韜情及其進徳之日不止揆中庸以戒其材之拘抗抗者自是以奮勵拘者自是以守􅈰而指}
