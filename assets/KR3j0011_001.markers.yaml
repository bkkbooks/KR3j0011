  - {type: variant, offset: 6, length: 1, content: 賢, SBCK: 人之察其孰能究之哉知無形狀故常人不能覩惟聖人目擊而照之凡有血氣者莫不含元一以爲質質不至則不能渉寒暑歷四時禀隂陽以立性性資於隂陽故剛柔之意别矣體五行而著形骨勁筋柔皆禀精於金木苟有形質猶可卽而求之由氣色外著故相者得其情素也凡人之質量中和最貴矣質白受采味甘受和中和者百行之根本人情之良田也中和之質必平淡無味惟淡也故五味得和焉􅀂苦則不能甘矣􅀂酸也則不能醎矣故能調成五材變化應節平淡無偏群材必御致用有宜通變無滯是故觀人察質必先察其平淡而後求其聦明譬之􅂹騄雖超逸絶羣􅀂氣性不和必有毀衡碎首决􅅐之禍也聦明者隂陽之精離目坎耳視聼}
  - {type: page-break, offset: 6, content: '', id: KR3j0011_SBCK_001-1b}
