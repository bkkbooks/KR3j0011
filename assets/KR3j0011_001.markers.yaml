  - {type: variant, offset: 84, length: 4, content: 立君子小, SBCK: 偏性生也是故骨植而柔者謂之弘毅弘毅也者仁之質也木則垂䕃爲仁之質質不弘毅不能成仁氣清而朗者謂之文理文理也者禮之本也火則照察爲禮之本本無文理不能成禮體端而實者謂之貞固貞固也者信之基也土必吐生爲信之基也基不貞固不能成信䈥勁而精者謂之勇敢勇敢也者義之决也金能㫁割爲義之决决不勇敢不能成義色平而暢者謂乎五質人情萬化不可勝極尋常竟源常在於五故其剛柔明暢貞固之徴著乎形容見乎聲色􅀤乎情味各如其象自然之理神動形色誠發於中徳輝外耀故心質亮􅀡其儀勁固心質休决其儀進猛心質平理其儀安閑夫儀動成容各有態度􅀡容之動矯矯行行休容之動業業蹌蹌徳容之動顒顒卬卬夫容之動作􅀤乎心氣心氣於内容見於外心氣之徴則聲變是也心不繫一聲和乃變夫氣合成聲聲應律吕清而亮者律和而平者吕有和平之聲有清暢之聲有囬衍之聲心氣不同故聲發亦異也夫聲暢於氣則實存貌色非氣無以成聲聲成則貌應故誠仁必有温柔之色誠勇必有矜奮之色誠智必有明逹之色聲既殊􅃹故色亦異狀夫色見於貌所謂徴神貌色徐疾爲神之徴驗徴神見貌則情􅀤於目目爲心候故應心而􅀤故仁目之精慤然以端心不傾􅀝則視不囬邪勇膽之精曄然以彊志不怯懦則視不衰悴然皆偏至之材以勝體爲質者也未能不厲而威不怒而嚴故勝質不精則其事不遂能勇而不能怯動必悔吝隨之是故􅀡而不柔則木木彊激訐失其正􅀡勁而不精則力􅀒鼎絶臏失其正勁固而不端則愚專巳自是䧟於愚戅氣而不清則越辭不清順􅀤越無成暢而不平則蕩好智無涯蕩然失絶是故中庸之質異於此􅀋勇而能怯仁而能决其體兩兼故爲衆材之主五常既備包以澹味既體鹹酸之量而以無味爲御五質内充五精外章五質澹凝淳耀外麗是以目彩五暉之光也心清目朗粲然自耀故曰物生有形形有神精不問賢愚皆受氣質之禀性隂陽但智有精粗形有淺深耳尋其精色視其儀象下至皁􅊢牧圉皆可想而得之也能知精神則窮理盡性聖人有以見天下之動而擬諸形容故能窮理盡性以至於命性之所盡九質之徴也隂陽相生數不過九故性情之變質亦同之然則平陂之質在於神神者質之主也故神平則質平神陂則質陂明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之􅀔在於䈥䈥者􅀔之用故䈥勁則􅀔勇䈥弱則􅀔怯彊弱之植在於骨骨者植之基故骨剛則植彊骨柔則植弱躁静之决在於氣氣者决之地也氣盛决於躁氣冲决於静矣􅃤懌之情在於色色者情之候也故色悴由情􅃤色恱由情懌衰正之形在於儀儀者形之表也故儀衰由形殆儀正由形肅態度之動在於容容者動之符也故衺動則容態正動則容度緩急之狀在於言言者心之狀也故心恕則言緩心􅄶則言急其爲人也質素平澹中叡外朗䈥勁植固聲清色懌儀正容􅀡則九徴皆至則純粹之徳也非至徳大人其孰能與於此九徴有違違爲乖戾也則偏雜之材也或聲清色懌而質不平淡或䈥勁植固而儀不崇􅀡三度不同其徳異稱偏材荷一至之名兼材居徳儀之目兼徳體中庸之度故偏至之材以材自名猶百工衆伎各有其名也兼材之人以徳爲目仁義禮智得其一目兼徳之人更爲羙號道不可以一體􅀃徳不可以一方待育物而不爲仁齊衆形而不爲徳凝然平淡與物無際誰知其名也是故兼徳而至謂之中庸居中􅂂常故謂之中庸中庸也者聖}
