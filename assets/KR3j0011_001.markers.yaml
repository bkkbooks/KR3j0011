  - {type: variant, offset: 132, length: 0, content: '', krp: 其法足以正天下其術足以謀廟勝是謂國體伊尹吕望是也兼有三材三材皆㣲不純備也其徳足以率一國其法足以正鄕邑其術足以權事宜是謂噐能子産西門豹是也兼有三材之别各有一流三材爲源則習者爲流也清節之流不能弘恕以清爲理何能寛恕好尚譏訶分别是非巳不寛恕則是非生是謂臧否子夏之徒是也法家之流不能創思遠圖法制於近思不及遠而能受一官之任錯意施巧務在功成故巧意生是謂伎倆張敞趙廣漢是也術家之流不能創制埀則以術求功故不埀則而能遭變用權權智有餘公正不足長於權者必短於正是謂智意陳平韓安國是也凡此八業皆以三材爲本非徳無以正法非法無以興術}
  - {type: variant, offset: 134, length: 0, content: '', SBCK: 八業之建常以三材爲本故雖波流分别皆爲輕事之材也耳目殊􅃹其用同功羣材雖異成務一致能屬文著述是謂文章司馬遷班固是也能傳}
  - {type: page-break, offset: 134, content: '', id: KR3j0011_SBCK_001-13a}
  - {type: variant, offset: 134, length: 0, content: '', WYG: 八業之建常以三材為本故雖波流分别皆為輕事之材也耳目殊官其用同功羣材雖異成務一致能属文著述是謂文章司馬遷班固是也能𫝊}
  - {type: page-break, offset: 134, content: '', id: KR3j0011_WYG_001-10b, image: WYG0848/WYG0848-0766d.png}
  - {type: variant, offset: 134, length: 0, content: '', krp: 八業之建常以三材爲本故雖波流分别皆爲輕事之材也耳目殊𬋩其用同功羣材雖異成務一致能屬文著述是謂文章司馬遷班固是也能傳}
  - {type: variant, offset: 136, length: 0, content: '', SBCK: 之業而不能幹事施政是謂儒學毛公貫公是也辯不入道而應對資給是謂口辯樂毅曹丘生是也膽力絶衆材畧過人是謂驍雄白起韓信是也凡此十二材皆人臣之任也各抗其材不能兼備保守一官故爲人臣之任也主徳不預焉主徳者聦明平淡總逹衆材而不以事自任者也目不求視耳不叅聼各司其官則衆材逹衆材既逹則人主埀拱無爲而理是故主道立則十二材各得其任也上無爲則下當任也清節之徳師氏之任也掌以道徳教道胄子法家之材司冦之任也掌以刑法禁制姦􅁀術家之材三􅀌之任也掌以廟謨佐公論正三材純備三公之任也位於三槐坐而論道三材而㣲冡宰之任也天官之卿總御百官臧否之材師氏之佐也分别是非以佐師氏智意之材冡宰之佐也師事制宜以佐天官伎俩之材司空之任也錯意施巧故掌冬官儒學之材安民之任也掌以徳毅保安其人文章之材國史之任也憲章紀述埀之後代辯給之材行人之任也掌之應荅送迎道路驍雄之材將帥之任也掌轄師旅討平不順是謂主道得而臣道序官不易方而太平用成太平之所以成由官人之不易方􅀂使足操物手求行四體何由寜理道何由平􅀂道不平淡與一材同用好譬大匠善䂓惟䂓之用則一材處權而衆材失任矣惟䂓之用則矩不得}
  - {type: page-break, offset: 136, content: '', id: KR3j0011_SBCK_001-13b}
  - {type: page-break, offset: 136, content: '', id: KR3j0011_SBCK_001-14a}
  - {type: variant, offset: 136, length: 0, content: '', WYG: 之業而不能幹事施政是謂儒學毛公貫公是也辯不入道而應對資給是謂口辯樂毅曹丘生是也膽力絶衆才畧過人是謂驍雄白起韓信是也凡此十二材皆人臣之任也各抗其材不能兼備保守一官故為人臣之任也主徳不預焉主徳者聰明平淡逹衆材而不以事自任者也目不求視耳不㕘聼各司其官則衆材逹衆材既逹則人主垂拱無為而理是故主道立則十二材各得其任也上無為則下當任也清節之徳師氏之任也掌以道徳教道胄子法家之材司冦之任也掌以刑法禁止姦暴術家之材三孤之任也掌以廟謨佐公論政三材純備三公之任也位於三槐坐而論道三材而㣲冡宰之任也天官之卿總御百官臧否之材師氏之佐也分别是非以佐師氏智意之材冡宰之佐也師事制宜以佐天官伎俩之材司空之任也錯意施巧故掌冬官儒學之材安民之任也掌以徳藝保安其人文章之材國史之任也憲章紀述垂之後代辯給之材行人之任也掌之應荅送迎道路驍雄之材將帥之任也掌轄師旅討平不順是謂主道得而臣道序官不易方而太平用成太平之所以成由官人之不易方若使足操物手求行四體何由寜理道何由平若道不平淡與一材同用好譬大匠善規惟規之用則一材處權而衆材失任矣惟規之用則矩不得}
