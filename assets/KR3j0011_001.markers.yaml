  - {type: variant, offset: 90, length: 0, content: '', SBCK: 目也大仁不可親大義不可報無徳而􅁛􅀉名於聖人也具體而㣲謂之徳行徳行也者大雅之稱也施仁以親物􅀡義以利仁失道而成徳抑亦其次也一至謂之偏材偏材小雅之質也徒仁而無義徒義而無仁未能兼濟各守一行是以名不及大雅也一徴謂之依似依似亂徳之􅀋也純訐似􅀡而非􅀡純宕似通而非通一至一違謂之間雜間雜無􅁪之人也善惡叅渾心無定是無􅁪之操胡可擬議無􅁪依似皆風人末流其心孔艱者乃有教化之所不受也末流之質不可勝論是以畧而不槩也蕃徒成羣豈可數哉體别第二禀氣隂陽性有剛柔拘抗文質體越各别夫中庸之徳其質無名汎然不繫一貌人無得而􅁛焉故鹹而不鹻謂之醎耶無鹻可容公成百鹵也與鹹同淡而不􅬭謂之淡耶味復不􅬭質而不縵謂之質耶理不縵素文而不繢謂之文耶采不􅀞繢能威能懐能辨能訥居鹹淡之和處質文之際是以望之儼然卽之而文言滿天下無}
