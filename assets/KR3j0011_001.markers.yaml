  - {type: punctuation, offset: 132, content: ，, id: KR3j0011_CHANT_001-bkkpn32}
  - {type: 'tls:seg', offset: 132, content: '', id: KR3j0011_CHANT_001-1a.25}
  - {type: variant, offset: 132, length: 0, content: '', SBCK: 其法足以正天下其術足以謀廟勝是謂國體伊尹吕望是也兼有三材三材皆㣲不純備也其徳足以率一國其法足以正鄕邑其術足以權事宜是謂噐能子産西門豹是也兼有三材之别各有一流三材爲源則習者爲流也清節之流不能弘恕以清爲理何能寛恕好尚譏訶分别是非巳不寛恕則是非生是謂臧否子夏之徒是也法家之流不能創思遠圖法制於近思不及遠而能受一官之任錯意施巧務在功成故巧意生是謂伎倆張敞趙廣漢是也術家之流不能創制埀則以術求功故不埀則而能遭變用權權智有餘公正不足長於權者必短於正是謂智意陳平韓安國是也凡此八業皆以三材爲本非徳無以正法非法無以興術}
  - {type: page-break, offset: 132, content: '', id: KR3j0011_SBCK_001-12b}
  - {type: variant, offset: 132, length: 0, content: '', WYG: 其法足以正天下其術足以謀廟勝是謂國體伊尹吕望是也兼有三材三材皆㣲不純備也其徳足以率一國其法足以正鄉邑其術足以權事宜是謂器能子産西門豹是也兼有三材之别各有一流三材為源則習者為流也清節之流不能𢎞恕以清為理何能寛恕好尚譏訶分别是非己不寛恕則是非生是謂臧否子夏之徒是也法家之流不能創思逺圖法制於近思不及逺而能受一官之任錯意施巧務在功成故巧意生是謂伎俩張敞趙廣漢是也術家之流不能創制垂則以術求功故不垂則而能遭變用權權智有餘公正不足長於權者必短於正是謂智意陳平韓安國是也凡此八業皆以三材為本非徳無以正法非法無以興術}
