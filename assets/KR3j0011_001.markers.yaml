  - {type: variant, offset: 124, length: 3, content: 九土殊, SBCK: 十有二焉性既不同染習又異枝流條别各有志業有清節家行爲物範有法家立憲垂制有術家智慮無方有國體三材純備有噐能三材而㣲有臧否分别是非有􅇊俩錯意工巧有智意能錬衆疑有文章屬辭比事有儒學道藝深明有口辨應對給㨗有雄傑膽畧過人􅀂夫徳行高妙容止可法是謂清節之家延陵晏嬰是也建法立制彊國富人是謂法家管仲商鞅是也思通道化䇿謀竒妙是謂術家范蠡張良是也兼有三材三材皆備徳與法術皆純備也其徳足以厲}
