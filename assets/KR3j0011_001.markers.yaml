  - {type: variant, offset: 140, length: 0, content: '', WYG: 同其於才也須明而章明待質而行是故質於理合合而有明明足見理理足成家道義與事情各有家是故質性平淡思心𤣥㣲容不躁擾其心詳宻能通自然道理之家也以道為理故能通自然也質性警徹權畧機㨗容不遲鈍則其心機速能理煩速事理之家也以事為理故審於理煩也質性和平能論禮教容不失適則禮教得中辯其得失義禮之家也以義為禮故明於得失也質性機觧推情原意容不妄動則原物得意能適其變情理之家也以情為理故能極物之變四家之明既異而有九偏之情以性犯明各有得失明出於真情動於性情勝明則蔽故雖得而必䘮也剛畧之人不能理㣲用意麄疎意不𤣥㣲故其論大體則𢎞愽而髙逺性剛則志逺歴纎理則宕徃而疏越志逺故䟽越抗厲之人不能廻撓用意猛奮志不旋屈論法直則括處而公正性厲則理毅説變通則否戾而不入理毅則滯礙堅勁之人好攻其事實用意端確言不虗徐指機理則穎灼而徹盡性確則言盡渉大道則徑露而單持言切則義少辯給之人辭煩而意鋭用意疾急志不在退挫推人事則精識而窮理性鋭則窮理即大義則恢愕而不周理細故遺大浮沉之人不能沉思用意虗廓志不淵宻序疏數則豁逹而傲愽性浮則志㣲立事要則爁炎而不定性傲則理疏淺觧之人不能深難用意淺近思不深熟聴辯說則擬鍔而愉悦性淺則}
