  - {type: variant, offset: 140, length: 0, content: '', SBCK: 同其於才也湏明而章明待質而行是故質於理合合而有明明足見理理足成家道義與事情各有家是故質性平淡思心玄㣲容不躁櫌其心詳宻能通自然道理之家也以道爲理故能通自然也質性警徹權畧機㨗容不遲鈍則其心機速能理煩速事理之家也以事爲理故審於理煩也質性和平能論禮教容不失適則禮教得中辯其得失義禮之家也以義爲禮故明於得失也質性機觧推情原意容不妄動則原物得意能適其變情理之家也以情爲理故能極物之變四家之明既異而有九偏之情以性犯明各有得失明出於真情動於性情勝明則蔽故雖得而必䘮也剛畧之人不能理㣲用意麄粗意不玄㣲故其論大體則弘􅀶而髙遠性剛則志遠歷纎理則宕徃而䟽越志遠故䟽越抗厲之人不能􅅆撓用意猛奮志不旋屈論法􅀡則括處而公正性厲則理毅􅀃變通則否戾而不入理毅則滯礙堅勁之人好攻其事實用意端確言不虛徐指機理則頴灼而徹盡性確則言盡渉大道則徑露而單持言切則義少辯給之人辭煩而意銳用意疾急志不在退挫推人事則精識而窮理性銳則窮理即大義則恢愕而不周理細故遺大浮沉之人不能沉思用意虛廓志不淵宻序䟽數則豁逹而傲􅀶性浮則志㣲立事要則爁炎而不定志傲則理䟽淺觧之人不能深難用意淺脕思不深熟聼辯􅀃則擬鍔而愉恱性淺則}
