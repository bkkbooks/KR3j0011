  - {type: variant, offset: 120, length: 1, content: 雅, krp: 之能厲狷介之人砭甫廉反清激濁不戒其道之隘狹而以普爲穢益其拘以弘普爲穢雜而益其拘局之心是故可與守節難以變通道狹津隘何通塗之能渉休動之人志慕超越不戒其意之大猥而以静爲滯果其銳以沉静爲滯屈而增果銳之心是故可以進趨難與持後志在超越何謙後之能持沉静之人道思廻復不戒其靜之遲後而以動爲䟽羙其愞以躁動爲麄䟽而羙其愞弱之心是故可與深慮難與㨗速思慮廻復何機速之能及樸露之人中疑實不戒其實之野直而以譎爲誕露其誠以權譎爲浮誕而露其誠信之心是故可與立信難與消息實野直何輕重之能量韜譎之人原度取容不戒其術之離}
  - {type: variant, offset: 122, length: 0, content: '', SBCK: 而以盡爲愚貴其虛以欵盡爲愚􅀡而貴其浮虛之心是故可與讃善難與矯違韜譎離正何違邪之能矯夫學所以成材也彊毅静其抗柔順厲其愞恕所以推情也推巳之情通物之性偏材之性不可移轉矣固守性分聞義不徙雖教之以學材成而隨之以失剛毅之性巳成激訐之心彌篤雖訓之以恕推情各從其心意之所非不肯是之於人信者逆信推巳之信謂人皆信而詐者得容爲僞也詐者逆詐推巳之詐謂人皆詐則信者或受其疑也故學不入道恕不周物偏材之人各是巳能何道之能入何物能周也此偏材之益失也材不能兼教之愈失是以宰物者用人之仁去其貪用人之智去其詐然後羣材畢御而道周萬物也矣流業第三三材爲源習者爲流流漸失源其業各異葢人流}
  - {type: page-break, offset: 122, content: '', id: KR3j0011_SBCK_001-11a}
