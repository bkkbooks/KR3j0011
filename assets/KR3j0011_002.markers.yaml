  - {type: variant, offset: 2699, length: 747, content: 益其失拘者愈拘抗者愈抗或負石沉軀或抱木燋死猶晉楚帶劍遞相詭反也自晉視楚則笑其在左自楚視晉則笑其在右左右雖殊各以其用而不達理者橫相誹謗拘抗相反皆不異此是故彊毅之人狠剛不和不戒其彊之搪突而以順為撓厲其抗以柔順為撓弱抗其搪突之心是故可以立法難與入微狠彊剛戾何機微之能入柔順之人緩心寬斷不戒其事之不攝而以抗為劌安其舒以猛抗為劌傷安其恕忍之心是故可與循常難與權疑緩心寡斷何疑事之能權雄悍之人氣奮勇決不戒其勇之毀跌而以順為恇竭其勢以順忍為恇怯而竭其毀跌之勢是故可與涉難難與居約奮悍毀跌何約之能居懼慎之人畏患多忌不戒其懦於為義而以勇為狎增其疑以勇戇為輕侮而增其疑畏之心是故可與保全難與立節畏患多忌何節義之能立凌楷之人秉意勁特不戒其情之固護而以辨為偽彊其專以辨愽為浮虛而彊其專一之心是故可以持正難與附眾執意堅持何人眾之能附辨愽之人論理贍給不戒其辭之汎濫而以楷為繫遂其流以楷正為繫礙而遂其流宕之心是故可與汎序難與立約辨愽汎濫何質約之能立弘普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁以拘介為狷戾而廣其溷雜之心是故可以撫眾難與厲俗周洽溷雜何風俗之能厲狷介之人砭甫廉反清激濁不戒其道之隘狹而以普為穢益其拘以弘普為穢雜而益其拘局之心是故可與守節難以變通道狹津隘何通塗之能涉休動之人志慕超越不戒其意之大猥而以靜為滯果其銳以沉靜為滯屈而增果銳之心是故可以進趨難與持後志在超越何謙後之能持沉靜之人道思廻復不戒其靜之遲後而以動為疏美其懦以躁動為麤疏而美其懦弱之心是故可與深慮難與捷速思慮廻復何機速之能及樸露之人中疑實𥔿不戒其實之野直而以譎為誕露其誠以權譎為浮誕而露其誠信之心是故可與立信難與消息實𥔿野直何輕重之能量韜譎之人原度取容不戒其術之離正而以盡為愚貴其虛以款盡為愚直而貴其浮虛之心是故可與讚善難與矯違韜譎離正何違邪之能矯, WYG: 知所長}
