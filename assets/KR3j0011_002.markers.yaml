  - {type: variant, offset: 4326, length: 692, content: 十二材各得其任也上無為則下當任也清節之德師氏之任也掌以道德教道冑子法家之材司寇之任也掌以刑法禁制姦暴術家之材三孤之任也掌以廟謨佐公論正三材純備三公之任也位於三槐坐而論道三材而微冢宰之任也天官之卿總御百官臧否之材師氏之佐也分別是非以佐師氏智意之材冢宰之佐也師事制宜以佐天官伎倆之材司空之任也錯意施巧故掌冬官儒學之材安民之任也掌以德毅保安其人文章之材國史之任也憲章紀述垂之後代辯給之材行人之任也掌之應荅送迎道路驍雄之材將帥之任也掌轄師旅討平不順是謂主道得而臣道序官不易方而太平用成太平之所以成由官人之不易方若使足操物手求行四體何由寧理道何由平若道不平淡與一材同用好譬大匠善規惟規之用則一材處權而眾材失任矣惟規之用則矩不得立其方繩不得經其直雖日運規矩無由成矣材理第四材既殊塗理亦異趣故講群材至理乃定材理第四夫建事立義莫不須理而定言前定則不惑事前定則不躓及其論難鮮能定之夫何故哉蓋理多品而人材異也事有萬端人情舛駁誰能定之夫理多品則難通人材異則情詭情詭難通則理失而事違也情詭理多何由而得夫理有四部道義事情各有部也明有四家明通四部各有其家情有九偏以情犯明得失有九流有七似似是而非其流有七說有三失辭勝理滯所失者三難有六構彊良競氣忿構有六通有八能聰思明達能通者八若夫天地氣化盈虛損益道之理也以道化人與時消息法制正事事之理也以法理人務在憲制禮教宜適義之理也以理教之進止得宜人情樞機情之理也觀物之情在於言語四理不同其於才也須明而章明待質而行是故質於理合合而有明明足見理理足成家道義與事情各有家是故質性平淡思心玄微容不躁擾其心詳密能通自然道理之家也以道為理故能通自然也質性警徹權略機捷容不遲鈍則其心機速能理, WYG: ''}
