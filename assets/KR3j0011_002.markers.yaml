  - {type: variant, offset: 4248, length: 2, content: 各抗, SBCK: 故英可以爲相制勝于近雄可以爲將􅀭威于逺􅀂一人之身兼有英雄則能長世高祖項羽是也然英之分以多於雄而英不可以少也英以致智智能役雄何可少也英分少則智者去之故項羽氣力葢世明能合變膽烈無前濟江焚糧而不能聽采竒異有一范增不用是以陳平之徒皆亡歸高祖英分多故群雄服之英材歸之兩得}
  - {type: page-break, offset: 4248, content: '', id: KR3j0011_SBCK_002-14a}
  - {type: variant, offset: 4251, length: 0, content: '', SBCK: 用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄}
  - {type: punctuation, offset: 4252, content: ，, id: KR3j0011_CHANT_002-bkkpn945}
  - {type: 'tls:seg', offset: 4252, content: '', id: KR3j0011_CHANT_002-12a.96}
  - {type: variant, offset: 4253, length: 0, content: '', SBCK: 服也内無主於中外物何由入徒雄而不英則智者不歸徃也無名以接之智者何由徃故雄}
  - {type: page-break, offset: 4253, content: '', id: KR3j0011_SBCK_002-14b}
  - {type: variant, offset: 4254, length: 0, content: '', SBCK: 得雄不能得英兕虎自成群也英能得英不能得雄鸞鳳自相親也故一人之身}
  - {type: variant, offset: 4255, length: 3, content: 備保守, SBCK: 有英雄乃能役英與雄能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九群材異品志各異歸觀其通否所格者八八觀者}
  - {type: punctuation, offset: 4256, content: ，, id: KR3j0011_CHANT_002-bkkpn946}
  - {type: 'tls:seg', offset: 4256, content: '', id: KR3j0011_CHANT_002-12a.97}
  - {type: variant, offset: 4259, length: 1, content: 官, SBCK: 曰觀其奪救以明間雜或慈欲濟恤而恡奪某人或救濟廣厚而乞醯爲惠二曰觀其感變以審常度觀其愠怍則常度可審三曰觀其志質以知其名徴質相應覩色知名四曰觀其所由以辨依似依訐似􅀡倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知所長訐刺雖短而長於爲􅀡八曰觀其聦明以知所逹雖體衆材而材不聦明事事蔽塞其何能逹何謂觀其奪救以明間雜夫質有至有違剛質無欲所以爲至貪情或勝所以爲違􅀂至勝違則惡情奪正􅀂然而不然以欲勝剛以此似剛而不剛}
  - {type: page-break, offset: 4259, content: '', id: KR3j0011_SBCK_002-15a}
  - {type: page-break, offset: 4259, content: '', id: KR3j0011_SBCK_002-15b}
  - {type: punctuation, offset: 4260, content: ，, id: KR3j0011_CHANT_002-bkkpn947}
  - {type: 'tls:seg', offset: 4260, content: '', id: KR3j0011_CHANT_002-12a.98}
  - {type: variant, offset: 4261, length: 1, content: 為, SBCK: 仁岀於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者􅀂夫見可憐則流涕慈心發於中將分與則恡嗇是慈而不仁者爲仁者必濟恤覩危急則惻隱仁情動於内將赴救則畏患是仁而不恤者爲恤者必赴危處虚義則色厲精厲見於貌顧利慾則内荏是厲而不剛者爲剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇怯損於仁厲而不剛者則慾奪之也利慾害於剛故曰􅄌不能勝恡無必其能仁也愛則不施何於仁之爲能仁不能勝懼無必其能恤也畏懦不果何恤之能行厲不能勝慾無必其能剛也情存利慾何剛之能成是故不仁之質勝則􅇊力爲害噐仁質既弱而有􅇊力此害巳之噐也貪悖之性勝則彊猛爲禍梯廉質既􅀒而性強猛此禍巳之梯也亦有善情救惡不至爲害惡物宜翦而除純善之}
  - {type: page-break, offset: 4261, content: '', id: KR3j0011_SBCK_002-16a}
  - {type: page-break, offset: 4261, content: '', id: KR3j0011_SBCK_002-16b}
  - {type: variant, offset: 4263, length: 1, content: 臣, SBCK: 憐而救}
  - {type: variant, offset: 4265, length: 1, content: 任, SBCK: 此稠厚之人非大害}
