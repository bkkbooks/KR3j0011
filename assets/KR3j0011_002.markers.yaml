  - {type: variant, offset: 6587, length: 227, content: 由矣人人競說若不難質則不知何者可用也由此論之談而定理者眇矣理多端人情異故發言盈庭莫肯執其咎必也聰能聽序登高能賦求物能名如顏回聽哭蒼舒量象思能造端子展謀侵晉乃得諸侯之盟明能見機臾駢覩目動即知秦師退辭能辯意伊籍荅吳王曰一拜一起未足為勞捷能攝失郭淮荅魏帝曰自知必免防風之誅守能待攻墨子謂楚人吾弟子已待之於宋攻能奪守毛遂進曰今日從為楚不為趙也楚王從而謝之奪能易予以子之矛易子之盾則物主辭窮兼此八者然後乃能通於天下之理通於天下之理則能通人矣不能兼有八美適有一能所謂, SBCK: 長夫}
