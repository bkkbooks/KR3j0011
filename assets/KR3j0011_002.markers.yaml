  - {type: variant, offset: 4283, length: 0, content: '', SBCK: 之性二至以上則至質相􅀤而令名生矣二至質氣之謂也質􅀡氣清則善名生矣是故骨􅀡氣清則休名生焉骨氣相應名是以羙氣清力勁則烈名生焉氣既清矣力勁則烈勁智精理則能名生焉智既勁矣精理則能稱智􅀡彊慤則任名生焉􅀡而又羙是以見任集于端質則令徳濟焉質徴端和善徳乃成加之學則文理灼焉圭玉有質瑩則成文是故觀其所至之多少而異名之所生可知也尋其質氣覽其清濁雖有多少之異異狀之名斷可知之何謂觀其所由以辨依似夫純訐性違不能公正質氣俱訐何正之有依訐似􅀡以訐訐善以􅀡之訐計及良善純宕似流不能通道質氣俱宕何道能通依宕似通行傲過節似通之宕容傲無節故曰􅀡者亦訐訐者亦訐其訐則同其所以爲訐則異􅀡人之訐訐惡憚非純訐爲訐訐善刺是通者亦宕宕者亦宕其宕則同其所以爲宕則異通人之宕簡而逹道純宕傲僻以自恣然則何以别之􅀡而能温者徳也温和爲􅀡所以爲徳􅀡而好訐者偏也性􅀡過訐所以爲偏訐}
  - {type: page-break, offset: 4283, content: '', id: KR3j0011_SBCK_002-18b}
  - {type: page-break, offset: 4283, content: '', id: KR3j0011_SBCK_002-19a}
  - {type: variant, offset: 4285, length: 0, content: '', SBCK: 􅀡者依也純訐似􅀡所}
  - {type: variant, offset: 4286, length: 3, content: 事自任, SBCK: 爲依道而能節}
  - {type: variant, offset: 4290, length: 0, content: '', SBCK: 通}
