  - {type: variant, offset: 6504, length: 1, content: 諱, SBCK: 欲遂其志志之所欲欲遂巳成故烈士樂奮力之功遭難而力士奮善士樂督政之訓政脩而善士用能士樂治亂之事治亂而求賢能術士樂計䇿之謀廣筭而求其䇿辨士樂陵訊之辭賔賛而求辨給貪者樂貨財之積貨財積則貪者容其求幸者樂權􅀔之尤權􅀔之尤則幸者竊其柄苟賛其志則莫}
