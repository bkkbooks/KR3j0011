  - {type: variant, offset: 4277, length: 0, content: '', SBCK: 雖疾惡無害也如殺無道以就有道疾惡雖甚無大非也救濟過厚雖取人不貪也取人之物以有救濟雖譏在乞醯非大貪也是故觀其奪救而明間雜之情可得知也或畏恡奪慈仁或救過濟其分而}
  - {type: punctuation, offset: 4279, content: ，, id: KR3j0011_CHANT_002-bkkpn951}
  - {type: 'tls:seg', offset: 4279, content: '', id: KR3j0011_CHANT_002-13a.4}
  - {type: variant, offset: 4279, length: 3, content: 總達眾, SBCK: 之主順而恕何謂觀其感變以審常度夫人厚貌深情將欲求之必觀其辭㫖察其應賛視發言之㫖趣觀應和之當否夫觀其辭㫖猶聽音之善醜音唱而善醜别察其應賛猶視智之能否也聲和而能否别故觀辭察應足以互相别識彼唱此和是非相舉然則論顯􅀭正白也辭顯唱正是曰明白不善言應玄也黙而識之是曰玄也經緯玄白通也明辨是非可謂通理移易無正雜也理不一㨿言意渾雜先識未然聖也追思玄事叡也見事過人明也以明爲晦智也心雖明之常􅀂不足㣲忽必粗白粗赤憤憤在面及其動作葢並言辭色既􅀤揚言亦從之是故其言甚懌而精色不從者中有違也心恨而言強和色貌終不相從其言有違而精色可信者辭不敏也言不自盡故辭雖違而色貌可信言未􅀤而怒色先見者意憤溢也憤怒填􅎍者未言而色貌巳作言將􅀤而怒氣送之者彊所不然也欲強行不然之事故怒氣助言凡此之􅀋徴見於外不可􅍕違心懽而怒容意恨而和貌雖欲違之精色不從心動貌從感愕以明雖變可知情雖在内感愕發外千形萬貌粗可知矣是故觀其感變而常度之情可知觀人辭色而知其心物有常度然後審矣何謂觀其至質以知其名凡偏}
  - {type: page-break, offset: 4279, content: '', id: KR3j0011_SBCK_002-17a}
