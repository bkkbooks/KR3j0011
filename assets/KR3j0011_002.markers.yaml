  - {type: variant, offset: 96, length: 0, content: '', krp: 彊明不繼世故法不常用故功大而不終是以商君車裂吳起攴觧術家之業出於聦思待於謀得而章斷於未行人無信者功成事效而後乃彰也其道先㣲而後著精而且玄計謀㣲妙其始至精終始合符是以道著其未逹也爲衆人之所不識謀在功前衆何由識其用也爲明主之所珎暗主昧然豈能貴之其功足以運籌通變變以求通故能成其功其退也藏於隱㣲計出㣲宻是以不露其爲業也竒而希用主計神竒用之者希也故或沈㣲而不章世希能用道何由章智意之業本于原度其道順而不忤將順時宜何忤之有故其未逹也爲衆人之所容矣庶事不逆善者來親巳逹也爲寵愛之所嘉與衆同和内外羙之其功足以讃明計慮媚順於時言計是信也其敝也知進而不退不見忌害是以慕進也或離正以自全用心多媚故違於正其爲業也諝而難持韜情諝智非雅正之倫也故或先利而後害知進忘退取悔之道臧否之業本乎是非其道廉而且砭清而混雜砭去纎芥故其未逹也爲衆人之所識清潔不汙在幽而明巳逹也爲衆人之所稱業常明白出則受譽其功足以變察是非理清道潔是非不亂其敝也爲詆訶之所怨詆訶之徒不樂聞過其爲業也峭而不𥙿峭察於物何能寛𥙿故或先得而後離衆清亮爲時所稱理峭爲衆所憚伎倆之業本于事能其道辨而且速伎計如神是以速辨其未逹也爲衆人之所異伎能出衆故雖㣲而顯巳逹也爲官司之所任遂事成功政之所務其功足以理煩紏邪釋煩理邪亦須伎倆其敝也民勞而下困上不端而下困其爲業也細而不㤗故爲治之末也道不平弘其能太乎接識第七推巳接物俱識同體兼能之士乃逹羣材夫人𥘉甚難知貌厚情深難得知也而士無衆寡皆自以爲知人故以巳觀人則以爲可知也巳尚清節則}
  - {type: variant, offset: 97, length: 0, content: '', SBCK: 清節者皆巳之所知觀人之察人則以爲不識也夫何哉由巳之所尚在於清節人之所好在於利欲曲􅀡不同於他便謂人不識物也是故能識同體之善性長思謀則善䇿畧之士而或失異量之羙遵法者雖羙乃思謀之所不取何以論其然夫清節之人以正􅀡爲度故其歷衆材也能識性行之常度在正􅀡故恱}
  - {type: variant, offset: 97, length: 0, content: '', WYG: 清節者皆己之所知觀人之察人則以為不識也夫何哉由己之所尚在於清節人之所好在於利欲曲直不同於他便謂人不識物也是故能識同體之善性長思謀則善策畧之士而或失異量之羙遵法者雖美乃思謀之所不取何以論其然夫清節之人以正直為度故其歴衆材也能識性行之常度在正直故悦}
  - {type: variant, offset: 97, length: 0, content: '', krp: 清節者皆巳之所知觀人之察人則以爲不識也夫何哉由巳之所尚在於清節人之所好在於利欲曲直不同於他便謂人不識物也是故能識同體之善性長思謀則善䇿畧之士而或失異量之羙遵法者雖羙乃思謀之所不取何以論其然夫清節之人以正直爲度故其歷衆材也能識性行之常度在正直故恱}
  - {type: variant, offset: 98, length: 2, content: 血氣, SBCK: 􅁪之人而或疑法術之詭謂守正足以致治何以法術爲也法制之人以分數爲度故能識較方􅀡之量度在法分故恱方􅀡之人而不貴變化之術謂法分足以濟業何以術謀爲也術謀之人以思謨爲度故能成䇿畧之竒度在思謀故貴䇿畧之人而不識遵法之良謂思謨足以化民何以法制爲也器能之人以辨護爲度故能識方畧之規度在辨護故恱方計之人而不知制度之原謂方計足以立功何以制度爲也智意之人以原意爲度故能識韜諝之權度在原意故恱韜諝之人而不貴法教之常謂原意足以爲正何以法理爲也伎倆之人以邀功爲度故能識進趣之功度在邀功故恱功能之人而不通道徳之化謂伎能足以成事何以道徳爲也臧否之人以伺察爲度故能識訶砭之明度在伺察故悅譴訶之人而不暢倜儻之異謂譴訶乃成教何以寛弘爲也言語之人以辨析爲度故能識捷給之惠度在剖析故恱敏給之人而不知含章之羙謂辨論事乃理何以含章爲也是以互相非駮莫肯相是人皆自以爲是誰肯道人之是取同體也則接論而相得性能苟同則雖胡越接響而情通取異體也雖歷乆而不知性能苟異則雖比肩歷年而逾踈矣凡此之􅀋皆謂一流之材也故同體則親異體則踈􅀂二至巳上亦隨其所兼以及異數法家兼術故能以術輔法故一流之人能識一流之善以法治}
