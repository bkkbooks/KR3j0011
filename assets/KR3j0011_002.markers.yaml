  - {type: variant, offset: 725, length: 240, content: 之基也土必吐生為信之基基不貞固不能成信䈥勁而精者謂之勇敢勇敢也者義之決也金能斷割為義之決決不勇敢不能成義色平而暢者謂之通微通微也者智之原也水流疏達為智之原原不通微不能成智五質恒性故謂之五常矣五物天地之常氣五德人物之常行五常之別列為五德是故溫直而擾毅木之德也溫而不直則懦擾而不毅則剉剛塞而弘毅金之德也剛而不塞則決弘而不毅則缺愿恭而理敬水之德也愿而不恭則悖理而不敬則亂寬栗而柔立土之德也寬而不栗則慢柔而不立則散簡暢而明砭火之德也簡而不暢則滯明而不砭則翳雖體變無窮猶依乎五質人情萬化不可, SBCK: 雄膽}
