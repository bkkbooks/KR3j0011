  - {type: variant, offset: 5970, length: 1274, content: 彼意在狗馬俟他日傍無聽達則不難也凡相難講為達者聽不善接論者說之以雜反彼意在狗而說以馬彼意大同而說以小異說之以雜反則不入矣以方入圓理終不可善喻者以一言明數事辭附於理則言寡而事明不善喻者百言不明一意辭遠乎理雖汛濫多言己不自明況他人乎百言不明一意則不聽也自意不明誰聽之是說之三失也善難者務釋事本每得理而止住不善難者舍本而理末逐其言而接之舍本而理末則辭構矣不尋其本理而以煩辭相文善攻彊者下其盛銳對家彊梁始氣必盛故善攻彊者避其初鼓也扶其本指以漸攻之三鼓氣勝衰則攻易不善攻彊者引其誤辭以挫其銳意彊者意銳辭或暫誤擊誤挫銳理之難也挫其銳意則氣構矣非徒群言交錯遂至動其聲色善躡失者指其所跌彼有跌失暫指不逼不善躡失者因屈而抵其性陵其屈跌而抵挫之因屈而抵其性則怨構矣非徒聲色而已怨恨逆結於心或常所思求久乃得之倉卒諭人人不速知則以為難諭已自久思而不恕人以為難諭則忿構矣非徒怨恨遂生忿爭夫盛難之時其誤難迫氣盛辭誤且當避之故善難者徵之使還氣折意還自相應接不善難者凌而激之雖欲顧藉其勢無由棄誤顧藉不聽其言其勢無由則妄構矣妄言非訾縱橫恣口凡人心有所思則耳且不能聽思心一至不聞雷霆是故並思俱說競相制止欲人之聽己止他人之言欲使聽己人亦以其方思之故不了己意則以為不解非不解也當己出言由彼方思故人不解人情莫不諱不解謂其不解則性諱怒諱不解則怒搆矣不顧道理是非於其兇怒忿肆凡此六搆變之所由興也然雖有變搆猶有所得造事立義當須理定故雖有變說小故終於理定功立若說而不難各陳所見則莫知所由矣人人競說若不難質則不知何者可用也由此論之談而定理者眇矣理多端人情異故發言盈庭莫肯執其咎必也聰能聽序登高能賦求物能名如顏回聽哭蒼舒量象思能造端子展謀侵晉乃得諸侯之盟明能見機臾駢覩目動即知秦師退辭能辯意伊籍荅吳王曰一拜一起未足為勞捷能攝失郭淮荅魏帝曰自知必免防風之誅守能待攻墨子謂楚人吾弟子已待之於宋攻能奪守毛遂進曰今日從為楚不為趙也楚王從而謝之奪能易予以子之矛易子之盾則物主辭窮兼此八者然後乃能通於天下之理通於天下之理則能通人矣不能兼有八美適有一能所謂偏材之人則所達者偏而所有異目矣各以所通而立其名是故聰能聽序謂之名物之材思能造端謂之搆架之材明能見機謂之達識之材辭能辯意謂之贍給之材捷能攝失謂之權捷之材守能待攻謂之持論之材攻能奪守謂之推徹之材奪能易予謂之貿說之材通材之人既兼此八材行之以道與通人言則同解而心喻同即相是是以心相喻與眾人言則察色而順性下有盛色避其所短雖明包眾理不以尚人恒懷謙下故處物上聰叡資給不以先人常懷退後故在物先善言出己理足則止通理則止不務煩辭鄙誤在人過而不迫見人過跌輒當歷避寫人之所懷扶人之所能扶贊人之所能則人人自任矣不以事類犯人之所婟胡故反與盲人言不諱眇瞎之類不以言例及己之所長己有武力不與虓虎之倫說直說變無所畏惡通材平釋信而後諫雖觸龍鱗物無害者采蟲聲之善音不以聲醜棄其善曲贊愚人之偶得不以人愚廢其嘉言奪與有宜去就不留方其盛氣折謝不恡不避銳跌不惜屈撓方其勝難勝而不矜理自勝耳何所矜也心平志諭無適無莫付是非於道理不貪勝以求名期於得道而已矣是可與論經世而理物也曠然無懷委之至當是以世務自經萬物自理, krp: ''}
