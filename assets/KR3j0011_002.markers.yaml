  - {type: variant, offset: 96, length: 0, content: '', SBCK: 彊明不繼世故法不常用故功大而不終是以商君車裂吳起攴觧術家之業出於聦思待於謀得而章斷於未行人無信者功成事效而後乃彰也其道先㣲而後著精而且玄計謀㣲妙其始至精終始合符是以道著其未逹也爲衆人之所不識謀在功前衆何由識其用也爲明主之所珎暗主昧然豈能貴之其功足以運籌通變變以求通故能成其功其退也藏於隱㣲計出㣲宻是以不露其爲業也竒而希用主計神竒用之者希也故或沈㣲而不章世希能用道何由章智意之業本于原度其道順而不忤將順時宜何忤之有故其未逹也爲衆人之所容矣庶事不逆善者來親巳逹也爲寵愛之所嘉與衆同和内外羙之其功足以讃明計慮媚順於時言計是信也其敝也知進而不退不見忌害是以慕進也或離正以自全用心多媚故違於正其爲業也諝而難持韜情諝智非雅正之倫也故或先利而後害知進忘退取悔之道臧否之業本乎是非其道廉而且砭清而混雜砭去纎芥故其未逹也爲衆人之所識清潔不汙在幽而明巳逹也爲衆人之所稱業常明白出則受譽其功足以變察是非理清道潔是非不亂其敝也爲詆訶之所怨詆訶之徒不樂聞過其爲業也峭而不􅁉峭察於物何能寛􅁉故或先得而後離衆清亮爲時所稱理峭爲衆所憚􅇊倆之業本于事能其道辨而且速􅇊計如神是以速辨其未逹也爲衆人之所異伎能出衆故雖㣲而顯巳逹也爲官司之所任遂事成功政之所務其功足以理煩紏邪釋煩理邪亦須伎倆其敝也民勞而下困上不端而下困其爲業也細而不㤗故爲治之末也道不平弘其能太乎接識第七推巳接物俱識同體兼能之士乃逹羣材夫人􅀄甚難知貌厚情深難得知也而士無衆寡皆自以爲知人故以巳觀人則以爲可知也巳尚清節則}
