  - {type: variant, offset: 4267, length: 2, content: 主德, SBCK: 愛惠分篤雖傲狎}
  - {type: variant, offset: 4270, length: 6, content: 預焉主德者聰, SBCK: 離平生結交情厚分深雖原壤夷俟而不相棄無大過也助善著}
