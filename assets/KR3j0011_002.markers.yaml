  - {type: variant, offset: 103, length: 2, content: 含元, SBCK: 過法二流之人能識二流之羙體法術者法術兼行盡有諸流則亦能兼逹衆材體通八流則八材當位物無不理故兼材之人與國體同謂八材之人始進陳言冡宰之官察其所以欲觀其一隅則終朝足以識之將究其詳則三日而後足何謂三日而後足夫國體之人兼有三材故談不三日不足以盡之}
