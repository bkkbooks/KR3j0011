  - {type: 'tls:seg', offset: 2177, content: '', id: KR3j0011_CHANT_002-6a.129}
  - {type: variant, offset: 2179, length: 4, content: 擬議無恒, WYG: 知也雖其不盡得其實然察其所}
  - {type: variant, offset: 2179, length: 8, content: 擬議無恒依似皆風, krp: 得希矣何謂觀其情機以辨恕惑夫}
