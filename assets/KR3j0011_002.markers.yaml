  - {type: variant, offset: 21, length: 4, content: 九九徵第, WYG: 能大而不能小猶函牛之鼎不可以烹雞愚以為此非名也夫人材猶器大小異或者以大鼎不能烹雞喻大材不能治小失其名也夫能之為言已定之稱先有定質而後能名生焉豈有能大而不能小乎凡所謂能大而不能小其語出於性有寛急寛者𢎞裕急者急切性有寛急故宜有大小寛𢎞宜治大急切宜治小寛𢎞之人宜為郡國使下得施其功而總成其事急切則煩碎事不成急小之人宜理百里使事辦於己𢎞裕則網漏庶事荒矣然則郡之與縣異體之大小者也明能治大郡則能治小郡能治大縣亦能治小縣以實理寛急論辨之則當言大小異宜不當言能大不能小也若能大而不能小仲尼豈不為季氏臣若夫雞之與牛亦異體之小大也鼎能烹牛亦能烹雞銚能烹雞不能烹犢故鼎亦宜有大小若以烹犢則豈不能烹雞乎但有宜與不宜豈有能與不能故能治大郡則亦能治小郡矣推此論之人材各有所宜非獨大小之謂也文者理百官武者治軍旅夫人材不同能各有異有自任之能脩己㓗身總御百官有立法使人從之之能法懸人懼無敢犯也有消息辨䕶之能智意辨䕶周旋得節有徳教師人之能道術深明動為物教有行事使人譴讓之能云為得理義和於時有司察紏摘之能督察是非無不區别有權奇之能務以奇計成事立功有威猛之能猛毅昭著振威敵國夫能出於材材不同量材能既殊任政亦異是故自任之能清節之材也故在朝也則冡宰之任為國則矯直之政其身正故掌天官而總百揆立法之能治家之材也故在朝也則司宼之任為國則公正之政法無私故掌秋官而詰姦暴計策之能術家之材也故在朝也則三孤之任為國則變化之政計慮明故輔三槐而助論道人事之能智意之材也故在朝也則冡宰之佐為國則諧合之政智意審故佐天官而諧内外行事之能譴讓之材也故在朝也則司寇之佐為國則督責之政辨衆事故佐秋官而督傲慢權竒之能伎倆之材也故在朝也則司空之任為國則藝事之政伎倆巧故任冬官而成藝事司察之能臧否之材也故在朝也則師氏之佐為國則刻削之政是非章故佐師氏而察善否威猛之能豪傑之材也故在朝也則将帥之任為國則嚴厲之政體果毅故總六師而振威武凡偏材之人皆}
