  - {type: variant, offset: 111, length: 0, content: '', SBCK: 疑在上者兼明八材然後乃能盡其所進用而無疑矣然則何以知其兼偏而與之言乎察言之時何以識其偏材何以識其兼材也其爲人也務以流數杼人之所長而爲之名目如是兼也每因事􅀋杼盡人之所能爲之名目言不容口如陳以羙欲人稱之巳之有善因事自􅀃又欲令人言常稱巳不欲知人之所有如是者偏也人之有善耳不樂聞人􅁛之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深􅀃淺益深益異淺者意近故聞深理而心逾衒是以商君􅀃帝王之道不入則以彊兵之義示之異則相返反則相非聞深則心衒焉得而相是是以李兌塞而不聽蘇秦之􅀃是故多陳處􅀡則以爲見美以其多方疑似見羙也静聽不言則以爲虚空待時來語疑其無實抗爲髙談則爲不遜辭護理髙疑其凌巳遜讓不盡則以爲淺陋卑言寡氣疑其淺薄言稱一善則以爲不􅀶未敢多陳疑其陋狹歷􅀤衆竒則以爲多端偏舉事􅀋則欲以釋之復以爲多端先意而言則以爲分羙言合其意疑分巳羙因失難之則以爲不喻欲􅀘其失反不喻也􅀃以對反則以爲較已欲反其事而明言乃疑其較也􅀶以異雜則以爲無要控盡所懐謂之無要論以同體然後乃恱弟兄忿肆爲陳管蔡之事則欣暢而和恱於是乎有親愛之情稱舉之譽苟言之同非徒親愛而巳乃}
