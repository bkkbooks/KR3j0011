  - {type: variant, offset: 1285, length: 2958, content: 以勝體為質者也未能不厲而威不怒而嚴故勝質不精則其事不遂能勇而不能怯動必悔吝隨之是故直而不柔則木木彊徼訐失其正直勁而不精則力負鼎絕臏失其正勁固而不端則愚專己自是陷於愚戇氣而不清則越辭不清順發越無成暢而不平則蕩好智無涯蕩然失絕是故中庸之質異於此類勇而能怯仁而能決其體兩兼故為眾材之主五常既備包以澹味既體鹹酸之量而以無味為御五質內充五精外章五質澹凝淳耀外麗是以目彩五暉之光也心清目朗粲然自耀故曰物生有形形有神精不問賢愚皆受氣質之稟性陰陽但智有精粗形有淺深耳尋其精色視其儀象下至皁隸牧圉皆可想而得之也能知精神則窮理盡性聖人有以見天下之動而擬諸形容故能窮理盡性以至於命性之所盡九質之徵也陰陽相生數不過九故性情之變質亦同之然則平陂之質在於神神者質之主也故神平則質平神陂則質陂明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之勢在於䈥䈥者勢之用故䈥勁則勢勇䈥弱則勢怯彊弱之植在於骨骨者植之基故骨剛則植彊骨柔則植弱躁靜之決在於氣氣者決之地也氣盛決於躁氣沖決於靜矣慘懌之情在於色色者情之候也故色悴由情慘色悅由情懌衰正之形在於儀儀者形之表也故儀衰由形殆儀正由形肅態度之動在於容容者動之符也故衺動則容態正動則容度緩急之狀在於言言者心之狀也故心恕則言緩心褊則言急其為人也質素平澹中叡外朗䈥勁植固聲清色懌儀崇容直則九徵皆至則純粹之德也非至德大人其孰能與於此九徵有違違為乖戾也則偏雜之材也或聲清色懌而質不平淡或䈥勁植固而儀不崇直三度不同其德異稱偏材荷一至之名兼材居德儀之目兼德體中庸之度故偏至之材以材自名猶百工眾伎各有其名也兼材之人以德為目仁義禮智得其一目兼德之人更為美號道不可以一體說德不可以一方待育萬物而不為仁齊眾形而不為德凝然平淡與物無際誰知其名也是故兼德而至謂之中庸居中履常故謂之中庸中庸也者聖人之目也大仁不可親大義不可報無德而稱寄名於聖人也具體而微謂之德行德行也者大雅之稱也施仁以親物立義以利仁失道而成德抑亦其次也一至謂之偏材偏材小雅之質也徒仁而無義徒義而無仁未能兼濟各守一行是以名不及大雅也一徵謂之依似依似亂德之類也純訐似直而非直純宕似通而非通一至一違謂之間雜間雜無恒之人也善惡參渾心無定是無恒之操胡可擬議無恒依似皆風人末流其心孔艱者乃有教化之所不受也末流之質不可勝論是以略而不概也蕃徒成群豈可數哉體別第二稟氣陰陽性有剛柔拘抗文質體越各別體別第二夫中庸之德其質無名汎然不繫一貌人無得而稱焉故鹹而不鹻謂之醎耶無鹻可容公成百鹵也與鹹同淡而不𨣈謂之淡耶味復不𨣈質而不縵謂之質耶理不縵素文而不繢謂之文耶采不畫繢能威能懷能辨能訥居醎淡之和處質文之際是以望之儼然即之而文言滿天下無辭費變化無方以達為節應變適化期於通物是以抗者過之勵然抗奮於進趨之塗而拘者不逮屯然無為於拘抗之外夫拘抗違中故善有所章而理有所失養形至甚則虎食其外高門懸薄則病攻其內是故厲直剛毅材在矯正失在徼訐訐刺生於剛厲柔順安恕每在寬容失在少決多疑生於恕懦雄悍傑健任在膽烈失在多忌慢法生於桀悍精良畏慎善在恭謹失在多疑疑難生於畏慎彊楷堅勁用在楨幹失在專固專己生於堅勁論辨理繹能在釋結失在流宕傲宕生於機辨普愽周洽弘在覆裕失在溷濁溷濁生於周普清介廉潔節在儉固失在拘局拘局生於廉潔休動磊落業在攀躋失在䟽越疏越生於磊落沉靜機密精在玄微失在遲緩遲緩生於沉靜樸露徑盡質在中誠失在不微漏露生於徑盡多智韜情權在譎略失在依違隱違生於韜情及其進德之日不止揆中庸以戒其材之拘抗抗者自是以奮勵拘者自是以守局而指人之所短以益其失拘者愈拘抗者愈抗或負石沉軀或抱木燋死猶晉楚帶劍遞相詭反也自晉視楚則笑其在左自楚視晉則笑其在右左右雖殊各以其用而不達理者橫相誹謗拘抗相反皆不異此是故彊毅之人狠剛不和不戒其彊之搪突而以順為撓厲其抗以柔順為撓弱抗其搪突之心是故可以立法難與入微狠彊剛戾何機微之能入柔順之人緩心寬斷不戒其事之不攝而以抗為劌安其舒以猛抗為劌傷安其恕忍之心是故可與循常難與權疑緩心寡斷何疑事之能權雄悍之人氣奮勇決不戒其勇之毀跌而以順為恇竭其勢以順忍為恇怯而竭其毀跌之勢是故可與涉難難與居約奮悍毀跌何約之能居懼慎之人畏患多忌不戒其懦於為義而以勇為狎增其疑以勇戇為輕侮而增其疑畏之心是故可與保全難與立節畏患多忌何節義之能立凌楷之人秉意勁特不戒其情之固護而以辨為偽彊其專以辨愽為浮虛而彊其專一之心是故可以持正難與附眾執意堅持何人眾之能附辨愽之人論理贍給不戒其辭之汎濫而以楷為繫遂其流以楷正為繫礙而遂其流宕之心是故可與汎序難與立約辨愽汎濫何質約之能立弘普之人意愛周洽不戒其交之溷雜而以介為狷廣其濁以拘介為狷戾而廣其溷雜之心是故可以撫眾難與厲俗周洽溷雜何風俗之能厲狷介之人砭甫廉反清激濁不戒其道之隘狹而以普為穢益其拘以弘普為穢雜而益其拘局之心是故可與守節難以變通道狹津隘何通塗之能涉休動之人志慕超越不戒其意之大猥而以靜為滯果其銳以沉靜為滯屈而增果銳之心是故可以進趨難與持後志在超越何謙後之能持沉靜之人道思廻復不戒其靜之遲後而以動為疏美其懦以躁動為麤疏而美其懦弱之心是故可與深慮難與捷速思慮廻復何機速之能及樸露之人中疑實𥔿不戒其實之野直而以譎為誕露其誠以權譎為浮誕而露其誠信之心是故可與立信難與消息實𥔿野直何輕重之能量韜譎之人原度取容不戒其術之離正而以盡為愚貴其虛以款盡為愚直而貴其浮虛之心是故可與讚善難與矯違韜譎離正何違邪之能矯夫學所以成材也彊毅靜其抗柔順厲其懦恕所以推情也推己之情通物之性偏材之性不可移轉矣固守性分聞義不徙雖教之以學材成而隨之以失剛毅之性已成徼訐之心彌篤雖訓之以恕推情各從其心意之所非不肯是之於人信者逆信推己之信謂人皆信而詐者得容為偽也詐者逆詐推己之詐謂人皆詐則信者或受其疑也故學不入道恕不周物偏材之人各是己能何道之能入何物能周也此偏材之益失也材不能兼教之愈失是以宰物者用人之仁去其貪用人之智去其詐然後群材畢御而道周萬物也矣流業第三三材為源習者為流流漸失源其業各異流業第三蓋人流之業十有二焉性既不同染習又異枝流條別各有志業有清節家行為物範有法家立憲垂制有術家智慮無方有國體三材純備有器能三材而微有臧否分別是非有伎倆錯意工巧有智意能鍊眾疑有文章屬辭比事有儒學道藝深明有口辨應對給捷有雄傑膽略過人若夫德行高妙容止可法是謂清節之家延陵晏嬰是也建法立制彊國富人是謂法家管仲商鞅是也思通道化策謀奇妙是謂術家范蠡張良是也兼有三材三材皆備德與法術皆純備也其德足以厲風俗其法足以正天下其術足以謀廟勝是謂國體伊尹呂望是也兼有三材三材皆微不純備也其德足以率一國其法足以正鄉邑其術足以權事宜是謂器能子產西門豹是也兼有三材之別各有一流三材為源則習者為流也清節之流不能弘恕以清為理何能寬恕好尚譏訶分別是非己不寬恕則是非生是謂臧否子夏之徒是也法家之流不能創思遠圖法制於近思不及遠而能受一官之任錯意施巧務在功成故巧意生是謂伎倆張敞趙廣漢是也術家之流不能創制垂則以術求功故不垂則而能遭變用權權智有餘公正不足長於權者必短於正是謂智意陳平韓安國是也凡此八業皆以三材為本非德無以正法非法無以興術是以八業之建常以三材為本故雖波流分別皆為經事之材也耳目殊管其用同功群材雖異成務一致能屬文著述是謂文章司馬遷班固是也能傳聖人之業而不能幹事施政是謂儒學毛公貫公是也辯不入道而應對資給是謂口辯樂毅曹丘生是也膽力絕眾材略過人是謂驍雄白起韓信是也凡此十二材皆, SBCK: ''}
