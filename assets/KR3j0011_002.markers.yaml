  - {type: variant, offset: 111, length: 0, content: '', krp: 疑在上者兼明八材然後乃能盡其所進用而無疑矣然則何以知其兼偏而與之言乎察言之時何以識其偏材何以識其兼材也其爲人也務以流數杼人之所長而爲之名目如是兼也每因事類杼盡人之所能爲之名目言不容口如陳以羙欲人稱之巳之有善因事自說又欲令人言常稱巳不欲知人之所有如是者偏也人之有善耳不樂聞人稱之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深說淺益深益異淺者意近故聞深理而心逾衒是以商君說帝王之道不入則以彊兵之義示之異則相返反則相非聞深則心衒焉得而相是是以李兌塞而不聽蘇秦之說是故多陳處直則以爲見美以其多方疑似見羙也静聽不言則以爲虚空待時來語疑其無實抗爲髙談則爲不遜辭護理髙疑其凌巳遜讓不盡則以爲淺陋卑言寡氣疑其淺薄言稱一善則以爲不博未敢多陳疑其陋狹歷發衆竒則以爲多端偏舉事類則欲以釋之復以爲多端先意而言則以爲分羙言合其意疑分巳羙因失難之則以爲不喻欲𥙷其失反不喻也說以對反則以爲較已欲反其事而明言乃疑其較也博以異雜則以爲無要控盡所懐謂之無要論以同體然後乃恱弟兄忿肆爲陳管蔡之事則欣暢而和恱於是乎有親愛之情稱舉之譽苟言之同非徒親愛而巳乃}
  - {type: variant, offset: 112, length: 0, content: '', SBCK: 譽而舉之此偏材之常失意常婟護欲人同巳巳不必得何由暫得英雄第八自非平淡能各有名英爲文昌雄爲武稱夫草之精秀者爲英獸之特群者爲雄物尚有之况於人乎故人之文武茂異取名於此文以英爲名武以雄爲號是故聰明秀岀謂之英膽力過人謂之雄此其大體之别名也􅀂校其分數則牙則須英得雄分然後成章雄得英分然後成剛各以二分取彼一分然後乃成膽者雄之分智者英之分英有聦明須膽而後成䧺有膽力須知而後立何以論其然夫聦明者英之分也不得雄之膽則􅀃不行智而無膽不能正言膽力者雄之分也不得英之智則事不立勇而無謀不能立事是故英以其聦謀始以其明見機智以謀事之始明以見事之機待雄之膽行之不决}
  - {type: page-break, offset: 112, content: '', id: KR3j0011_SBCK_002-12b}
  - {type: variant, offset: 112, length: 0, content: '', WYG: 譽而舉之此偏材之常失意常婟䕶欲人同己巳不必得何由常得英雄第八自非平淡能各有名英為文昌雄為武稱夫草之精秀者為英獸之特群者為雄物尚有之况於人乎故人之文武茂異取名於此文以英為名武以雄為號是故聰明秀出謂之英膽力過人謂之雄此其大體之别名也若校其分數則㸦相須英得雄分然後成章雄得英分然後成剛各以二分取彼一分然後乃成膽者雄之分智者英之分英有聰明須膽而後成雄有膽力須知而後立何以論其然夫聰明者英之分也不得雄之膽則説不行智而無膽不能正言膽力者雄之分也不得英之智則事不立勇而無謀不能立事是故英以其聰謀始以其明見機智以謀事之始明以見事之機待雄之膽行之不决}
