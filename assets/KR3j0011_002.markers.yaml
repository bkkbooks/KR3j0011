  - {type: variant, offset: 68, length: 1, content: 聖, SBCK: 禮實也公刻之政宜於紏姦刻削不深姦亂不止以之治􅁁則失衆衆民憚法易迯叛矣威猛之政宜於討亂亂民桀逆非威不服以之治善則􅍊政猛民殘濫良善矣􅇊倆之政宜於治富以國彊民以使以之治貧則勞而下困易貨改鑄民失業矣故量能授官不可不審也凡此之能皆偏材之人也故或能言而不能行或能行而不能言智勝則能言材勝則能行至於國體之人能言能行故爲衆材之雋也人君之能異於此平淡無爲以任衆能故臣以自任爲能竭力致功以取爵位君以用人爲能任賢使能國家自理臣以能言爲能各言其能而受其官君以能聽爲能聽言觀行而授其官臣以能行爲能必行其所言君以能賞罰爲能必當其功過也所能不同君無爲而臣有事故能君衆材也􅀂君以有爲代大匠斵則衆能失巧功不成矣利害第六建法陳術以利國家及其弊也害歸於巳葢人業之流各有利害流漸失源故利害生夫節清之業著于儀容􅀤於徳行心清意正則徳容外著未用而章其道順而有化徳輝昭著故不試而效效理於人故物無不化故其未逹也爲衆}
