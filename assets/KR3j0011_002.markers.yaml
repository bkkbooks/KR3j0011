  - {type: variant, offset: 1426, length: 285, content: 既備包以澹味既體鹹酸之量而以無味為御五質內充五精外章五質澹凝淳耀外麗是以目彩五暉之光也心清目朗粲然自耀故曰物生有形形有神精不問賢愚皆受氣質之稟性陰陽但智有精粗形有淺深耳尋其精色視其儀象下至皁隸牧圉皆可想而得之也能知精神則窮理盡性聖人有以見天下之動而擬諸形容故能窮理盡性以至於命性之所盡九質之徵也陰陽相生數不過九故性情之變質亦同之然則平陂之質在於神神者質之主也故神平則質平神陂則質陂明暗之實在於精精者實之本故精惠則實明精濁則實暗勇怯之勢在於䈥䈥者勢之用故䈥勁則勢勇䈥弱則勢怯彊弱之植在於骨骨者植之基故骨剛則植彊骨柔則植弱躁靜之決在於氣氣者決之地也氣盛決於躁氣沖決於靜矣慘懌, WYG: 度}
