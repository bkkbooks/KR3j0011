  - {type: variant, offset: 2368, length: 0, content: '', WYG: 徳之則也以虗為道寂寞無為道之倫也禮以敬為本禮由隂作肅然清净樂以愛為主樂由陽来歡然親愛然則人情之質有愛敬之誠方在哺乳愛敬生矣則與道徳同體動獲人心而道無不通也體道脩徳故物順理通然愛不可少於敬少於敬則亷節者歸之亷人好敬是以歸之而衆人不與衆人樂愛愛少是以不與愛多於敬則雖亷節者不悦而愛接者死之亷人寡常人衆衆人樂愛致其死則事成業濟是故愛之為道不可少矣何則敬之為道也嚴而相離其勢難久動必肅容過之不及逆旅之人不及温和而歸也愛之為道也情親意厚深而感物煦嫗篤宻感物甚深是以翳桑之人倒戈報徳是故觀其愛敬之誠而通塞之理可得而知也篤於慈愛則温和而上下之情通務在禮敬則嚴肅而外内之情塞然必愛敬相須不可一時而無然行其二義者常當務令愛多敬少然後肅穆之風可得希矣何謂觀其情機以辨恕惑夫人之情有六機抒其所欲則喜為有力者譽烏獲其心莫不忻焉不抒其所能則怨為辨給者稱三緘其心莫不忿然以自伐厯之則惡抗己所能以厯衆人衆人所惡以謙損下之則悦卑損下人人皆喜悦犯其所乏則婟人皆悦己所長惡己所短故稱其所短則婟戾忿肆以惡犯婟則妬自伐其能人所惡也稱人之短人所婟也今伐其所能犯人所婟則妬害生也此人性之六機也夫人情莫不欲遂其志志之所欲欲遂已成故烈士樂奮力之功遭難而力士奮善士樂督政之訓政脩而善士用能士樂治亂之事治亂而求賢能術士樂計策之謀廣筭而求其策辨士樂陵訊之辭賔賛而求辨給貪者樂貨財之積貨財積則貪者容其求幸者樂權勢之尤權勢之尤則幸者竊其柄茍賛其士心則莫不欣然是所謂杼其所欲則喜也所欲之心杼盡復何怨乎若不杼其所能則不獲其志不獲其志則戚憂己才之不展是故功力不建則烈士奮奮憤不能盡其材也徳行不訓則正人哀哀不得行其化政亂不治則能者歎歎不得用其能敵未能弭則術人思思不得運其竒貨財不積則貪者憂憂無所收其利權勢不尤則幸者悲悲不得弄其權是所謂不抒其能則怨也所能不抒其能悦乎人情莫不欲處前故惡人之自伐皆欲居物先故惡人之自伐也自伐皆欲勝之類也是故自伐其善則莫不惡也惡其有勝己之心是所謂自伐厯之則惡也是以逹者終不自伐人情皆欲求勝故悦人之謙謙所以下之下有推與之意是故人無賢愚接之以謙則無不色懌不問能否皆欲勝人是所謂以謙下之則悦也是以君子終日謙謙人情皆欲掩其所短見其所長稱其所長則悦稱其所短則愠是故人駮其所短似若物冒之情之憤悶有若覆冒是所謂駮其所乏則婟也覆冒純塞其心婟戾人情陵上者也見人勝己皆欲陵之陵犯其所惡雖見憎未害也雖惡我自伐未甚疾害也若以長駮短是所謂以惡犯婟則妬惡生矣以己之長較人之短而取其害是}
