  - {type: variant, offset: 1317, length: 0, content: '', WYG: 聴采竒異有一范増不用是以陳平之徒皆亡歸髙祖英分多故群雄服之英材歸之兩得其用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄材不服也内無主於中外物何由入徒雄而不英則智者不歸徃也無明以接之智者何由徃故雄能得雄不能得英兕虎自成羣也英能得英不能得雄鸞鳯自相親也故一人之身兼有英雄乃能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九羣材異品志各異歸觀其通否所格者八八觀者一曰觀其奪救以明間雜或慈欲濟恤而恡奪其仁或救濟廣厚而乞醯為惠二曰觀其感變以審常度觀其愠怍則常度可審三曰觀其志質以知其名徴質相應覩色知名四曰觀其所由以辨依似依訐似直倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知其長訐刺雖短而長於為直八曰觀其聰明以知所達雖體衆材而材不聰明事事蔽塞其何能逹何謂觀其奪救以明間雜夫質有至有違剛質無欲所以為至貪情或勝所以為違若至勝違則惡情奪正若然而不然以欲勝剛以此似剛而不剛故仁出於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者若夫見可憐則流涕慈心發於中将分與則恡嗇是慈而不仁者為仁者必濟恤覩危急則惻隠仁情動於内将赴救則畏患是仁而不恤者為恤者必赴危處虗義則色厲精厲見於貌顧利慾則内荏是厲而不剛者為剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇}
