  - {type: variant, offset: 1317, length: 0, content: '', krp: 聽采竒異有一范增不用是以陳平之徒皆亡歸高祖英分多故群雄服之英材歸之兩得其用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄材不服也内無主於中外物何由入徒雄而不英則智者不歸徃也無名以接之智者何由徃故雄能得雄不能得英兕虎自成群也英能得英不能得雄鸞鳳自相親也故一人之身兼有英雄乃能役英與雄能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九群材異品志各異歸觀其通否所格者八八觀者一曰觀其奪救以明間雜或慈欲濟恤而恡奪某人或救濟廣厚而乞醯爲惠二曰觀其感變以審常度觀其愠怍則常度可審三曰觀其志質以知其名徴質相應覩色知名四曰觀其所由以辨依似依訐似直倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知所長訐刺雖短而長於爲直八曰觀其聦明以知所逹雖體衆材而材不聦明事事蔽塞其何能逹何謂觀其奪救以明間雜夫質有至有違剛質無欲所以爲至貪情或勝所以爲違若至勝違則惡情奪正若然而不然以欲勝剛以此似剛而不剛故仁岀於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者若夫見可憐則流涕慈心發於中將分與則恡嗇是慈而不仁者爲仁者必濟恤覩危急則惻隱仁情動於内將赴救則畏患是仁而不恤者爲恤者必赴危處虚義則色厲精厲見於貌顧利慾則内荏是厲而不剛者爲剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇}
  - {type: punctuation, offset: 1318, content: ，, id: KR3j0011_CHANT_002-bkkpn329}
  - {type: 'tls:seg', offset: 1318, content: '', id: KR3j0011_CHANT_002-5a.56}
  - {type: variant, offset: 1318, length: 0, content: '', WYG: 損於仁厲而不剛者則慾奪之也利慾害於剛故曰慈不能勝恡無必其能仁也愛而不施予何仁之能為仁不能勝懼無必其能恤也畏懦不果何恤之能行厲不能勝慾無必其能剛也情存利慾何剛之能成是故不仁之質勝則伎力為害器仁質既弱而有伎力此害己之噐也貪之性勝則彊猛為禍梯亷質既負而性强猛此禍己之梯也亦有善情救惡不至為害惡物宜剪而除純善之人憐而救之此稠厚之人非大害也愛恵分篤雖傲狎不離平生結交情厚分深雖原壤夷俟而不相棄無大過也助善著明雖疾惡無害也如殺無道以就有道疾惡雖甚無大非也救濟過厚雖取人不貪也取人之物以有救濟雖譏在乞醯非大貪也是故觀其奪救而明間雜之情可得知也或畏恡奪慈仁或救過濟其分而平淡之主順而恕何謂觀其感變以審常度夫人厚貌深情将欲求之必觀其辭㫖察其應賛視發言之㫖趣觀應和之當否夫觀其辭㫖猶聴音之善醜音唱而善醜别察其應賛猶視知之能否也聲和而能否别故觀辭察應足以互相别識彼唱此和是非相舉然則論顯揚正白也辭顯唱正是曰明白不善言應𤣥也黙而識之是曰𤣥也經緯𤣥白通也明辨是非可謂通理移易無正雜也理不一據言意混雜先識未然聖也追思𤣥事叡也見事過人明也以明為晦智也心雖明之常若不足㣲忽必識妙也理雖至㣲而能察之羙妙不昧踈也心致昭然是曰踈朗測之益深實也心有實智探之愈精猶泉滋中出測之益深也假合炫耀虗也道聴塗説久而無實猶池水無源洩而虗竭自見其羙不足也智不贍足恐人不知以自伐不伐其能有餘也不畏不知故曰凡事不度必有其故色貌失實必有憂喜之故憂患之色乏而且荒憂患在心故形色荒疾疢之色亂而垢雜黄黒色雜理多塵垢喜色愉然以懌愠色厲然以揚妬惑之色冒昧無常粗白粗赤憤憤在面及其}
