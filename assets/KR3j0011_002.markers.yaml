  - {type: variant, offset: 111, length: 0, content: '', WYG: 容口如陳己羙欲人稱之己之有善因事自説又欲令人言常稱己不欲人之有如是者偏也人之有善耳不樂聞人稱之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深説淺益深益異淺者意近故聞深理而心逾衒是以商君説帝王之道不入則以彊兵之義示之異則相返反則相非聞深則相衒焉得而相是是以李兑塞耳而不聴蘇秦之説是故多陳處直則以為見羙以其多方疑似見羙也静聽不言則以為虗空待時来語疑其無實抗為髙談則為不遜辭䕶理髙疑其凌己遜讓不盡則以為淺陋卑言寡氣疑其淺薄言稱一善則以為不博未敢多陳疑其陋狭歴發衆竒則以為多端徧舉事類則欲以釋之復以為多端先意而言則以為分羙言合其意疑分己羙因失難之則以為不喻欲補其失反不喻也説以對反則以為較己欲反其事而明言乃疑其較也博以異雜則以為無要控盡所懐謂之無要論以同體然後乃悦弟兄忿肆為陳管蔡之事則欣暢而和悦於是乎有親愛之情稱舉之譽茍言之同非徒親愛而已乃}
