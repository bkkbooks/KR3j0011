  - {type: variant, offset: 5551, length: 349, content: 謂情有九偏各從其心之所可以為理心之所可以為理是非相蔽終無休已若乃性不精暢則流有七似有漫談陳說似若流行者浮漫流雅似若可行有理少多端似若愽意者辭繁喻愽似若弘廣有廻說合意似若讚解者外佯稱善內實不知有處後持長從眾所安似能聽斷者實自無知如不言觀察眾談讚其所安有避難不應似若有餘而實不知者實不能知忘徉不應似有所知而不荅者有慕通口解似悅而不懌者聞言即說有似於解者心中漫漫不能悟有因勝情失窮而稱妙辭已窮矣自以為妙而未盡跌則掎摭理已跌矣而彊牽據實求兩解似理不可屈者辭窮理屈心樂兩解而言猶不止聽者謂之未屈凡此七似眾人之所惑也非明鏡焉能監之夫辯有理勝理至不可動有辭勝辭巧不可屈理勝者正白黑以廣論釋微妙而通之說事分明有如粉黛朗然區別辭不潰雜辭勝者破正理以求異求異則正失矣以白馬非白馬一朝而服千人及其至關禁錮直而後過也夫九偏, WYG: 逹}
