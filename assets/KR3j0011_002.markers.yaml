  - {type: variant, offset: 2140, length: 0, content: '', WYG: 所以為依道}
  - {type: variant, offset: 2140, length: 0, content: '', krp: 所以爲依道而能節者通也以道自節所以爲通通而時過者偏也性通時過所以爲偏宕而不節者依也純宕自通所以爲依偏之與依志同質違所謂似是}
  - {type: variant, offset: 2141, length: 2, content: 非直, WYG: 能節者通也以道自節所以為通通而時過者偏也性通時過所以為偏宕而不節者依也}
  - {type: variant, offset: 2142, length: 0, content: '', krp: 也質同通}
  - {type: punctuation, offset: 2143, content: ，, id: KR3j0011_CHANT_002-bkkpn498}
  - {type: 'tls:seg', offset: 2143, content: '', id: KR3j0011_CHANT_002-6a.122}
  - {type: variant, offset: 2143, length: 2, content: 純宕, krp: 或偏或依是故輕諾}
  - {type: variant, offset: 2146, length: 1, content: 通, krp: 烈而寡信不量巳力輕許死人臨難畏怯不能殉命多易似能而無效不顧材能日謂能辦受事猖獗作無效驗進銳似精而去速精躁之人不能乆任訶者似察而事煩譴訶之人每多煩亂訐施似惠而無成當時似給終無所成面從似忠而退違阿順目前却則自是此似是}
  - {type: variant, offset: 2147, length: 0, content: '', WYG: 所以為依偏之與依志同質違所謂似是}
  - {type: variant, offset: 2149, length: 0, content: '', WYG: 也質同}
  - {type: variant, offset: 2149, length: 0, content: '', krp: 者也紫色亂朱聖人惡之亦有似非而是者事同於非其功實則是大權似姦而有功伊去太甲以成其功大智似愚而内明終日不違内實分别博愛似虚而實厚汎愛無私似虚而實正言似訐而情忠譬帝桀紂至誠忠愛夫察似明非御情之反欲察似類審則是非御取人情反覆明之有似理訟其實難别也故聖人參訊廣訪與衆共之非天下之至精其孰能得其實若其實可得何憂乎驩兠何迁乎有苗是以昧旦晨興揚明仄陋語之三槐詢之九棘故聽言信貌或失其真言訥貌惡仲尼失之子羽詭情御反或失其賢疑非人情公孫失之卜式賢否之察實在所依雖其難知即當尋其所依而察之是故觀其所依而似之誠方在哺乳愛敬生矣則與道徳同體動獲人心而道無不}
  - {type: punctuation, offset: 2150, content: 。, id: KR3j0011_CHANT_002-bkkpn499}
  - {type: 'tls:seg', offset: 2150, content: '', id: KR3j0011_CHANT_002-6a.123}
  - {type: variant, offset: 2150, length: 4, content: 一至一違, WYG: 直或偏或依是故輕諾似烈而寡信不量己力輕許死人臨難畏怯不能殉命多易似能而無効不顧材能自}
  - {type: variant, offset: 2150, length: 5, content: 一至一違謂, krp: 也體道脩徳故物順理通然愛不可少於敬少於敬則廉節者歸}
  - {type: variant, offset: 2155, length: 5, content: 之間雜間雜, WYG: 能辦受事猖獗作}
  - {type: variant, offset: 2156, length: 6, content: 間雜間雜無恒, krp: 廉人好敬是以歸之而衆人不與衆人樂愛愛少是以不與愛多於敬則雖廉節者不恱而愛接者死之廉人寡常人衆衆人樂愛致其死則事成業濟是故愛之爲道不可少矣何則敬之爲道也嚴而相離其勢難乆動必肅容過之不乆逆旅}
  - {type: punctuation, offset: 2158, content: ，, id: KR3j0011_CHANT_002-bkkpn500}
  - {type: 'tls:seg', offset: 2158, content: '', id: KR3j0011_CHANT_002-6a.124}
  - {type: punctuation, offset: 2160, content: ，, id: KR3j0011_CHANT_002-bkkpn501}
  - {type: 'tls:seg', offset: 2160, content: '', id: KR3j0011_CHANT_002-6a.125}
  - {type: variant, offset: 2161, length: 1, content: 恒, WYG: 效驗進鋭似精而去速情躁}
  - {type: substitution, offset: 2161, original: 恒, replacement: 恆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20663}}
  - {type: variant, offset: 2164, length: 0, content: '', WYG: 不能久任訶者似察而事煩譴訶之人毎多煩亂訐施似恵而無成當時似給終無所成面從似忠而退違阿順目前却則自是此似是而非者}
  - {type: page-break, offset: 2164, content: '', id: KR3j0011_WYG_002-15b, image: WYG0848/WYG0848-0777d.png}
  - {type: variant, offset: 2164, length: 0, content: '', krp: 不及温和而歸}
  - {type: punctuation, offset: 2165, content: 。, id: KR3j0011_CHANT_002-bkkpn502}
  - {type: 'tls:seg', offset: 2165, content: '', id: KR3j0011_CHANT_002-6a.126}
  - {type: variant, offset: 2165, length: 1, content: 善, WYG: 紫色亂朱聖人}
  - {type: variant, offset: 2165, length: 5, content: 善惡參渾心, krp: 愛之爲道也情親意厚深而感物煦渝篤宻感物深感是以翳桑之人倒戈報徳是故觀其愛敬之誠而通塞之理可得而知也篤於慈愛則温和而上下之情通務在禮敬則嚴肅而外内之情塞然必愛敬相須不可一時而}
  - {type: variant, offset: 2167, length: 0, content: '', WYG: 之亦有似非而是者事同於非其功實則是大權似姦而有功伊去太甲以成其功大智似愚而内明終日不違内實分别博愛似虗而實厚汎愛無私似虗而實正言似訐而情忠譬帝桀紂至誠忠愛夫察似明非御情之反欲察似類審則是非御取人情反覆明之有似理訟其實難别也故聖人}
  - {type: variant, offset: 2168, length: 4, content: 渾心無定, WYG: 訊廣訪與衆共之非天下之至精其孰能得其實若其實可得何憂乎驩􅀢何遷乎有苗}
  - {type: punctuation, offset: 2169, content: ，, id: KR3j0011_CHANT_002-bkkpn503}
  - {type: 'tls:seg', offset: 2169, content: '', id: KR3j0011_CHANT_002-6a.127}
  - {type: variant, offset: 2171, length: 4, content: 定是無恒, krp: 然行其二義者常當務令愛多敬少然後肅穆}
  - {type: punctuation, offset: 2173, content: 。, id: KR3j0011_CHANT_002-bkkpn504}
  - {type: 'tls:seg', offset: 2173, content: '', id: KR3j0011_CHANT_002-6a.128}
  - {type: variant, offset: 2173, length: 2, content: 無恒, WYG: 以昧旦晨興揚明側陋語}
  - {type: substitution, offset: 2174, original: 恒, replacement: 恆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20663}}
  - {type: variant, offset: 2176, length: 2, content: 操胡, WYG: 三槐詢之九棘故聴言信貌或失其真言訥貌惡仲尼失之子羽詭情御反或失其賢疑非人情公孫失之卜式賢否之察實在所依雖其難知即當尋其所依而察之是故觀其所依而似類之質}
  - {type: page-break, offset: 2176, content: '', id: KR3j0011_WYG_002-16a, image: WYG0848/WYG0848-0778a.png}
  - {type: variant, offset: 2176, length: 2, content: 操胡, krp: 風}
