  - {type: variant, offset: 6519, length: 2, content: 怒搆, SBCK: 戚憂巳才之不展是故功力不建則烈士奮奮憤不能盡其材也徳行不訓則正人哀哀哀不得行其化政亂不治則能者歎歎歎不得用其能敵能未弭則術人思思思不得運其竒貨財不積則貪者憂憂憂無所收其利權􅀔不尤則幸者悲悲不得弄其權是所謂不杼其能則怨也所怨不杼其能恱也人情莫不欲處前故惡人之自伐皆欲居物先故惡人之自伐也自伐皆欲勝之􅀋也是故自伐其善則莫不惡也惡其有勝巳之心是所謂自伐歷之則惡也是以逹者終不自伐人情皆欲求勝故恱人之謙謙所以下之下有推與之意是故人無賢愚接之以謙則無不色懌不問能否皆欲勝人是所謂以謙下之則恱也是以君子終日謙謙人情皆欲掩其所短見其所長稱其所長則恱稱其所短則愠是故人駮其所短似􅀂物冐之情之憤悶有􅀂覆冐是所謂駮其所乏則婟也覆冐純塞其心婟戾人情陵上者也見人勝巳皆欲陵之陵犯其所惡雖見憎未害也雖惡我自伐未甚疾害也􅀂以長駮短是所謂以惡犯婟則妬惡生}
