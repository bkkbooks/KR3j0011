  - {type: variant, offset: 6644, length: 547, content: 能名如顏回聽哭蒼舒量象思能造端子展謀侵晉乃得諸侯之盟明能見機臾駢覩目動即知秦師退辭能辯意伊籍荅吳王曰一拜一起未足為勞捷能攝失郭淮荅魏帝曰自知必免防風之誅守能待攻墨子謂楚人吾弟子已待之於宋攻能奪守毛遂進曰今日從為楚不為趙也楚王從而謝之奪能易予以子之矛易子之盾則物主辭窮兼此八者然後乃能通於天下之理通於天下之理則能通人矣不能兼有八美適有一能所謂偏材之人則所達者偏而所有異目矣各以所通而立其名是故聰能聽序謂之名物之材思能造端謂之搆架之材明能見機謂之達識之材辭能辯意謂之贍給之材捷能攝失謂之權捷之材守能待攻謂之持論之材攻能奪守謂之推徹之材奪能易予謂之貿說之材通材之人既兼此八材行之以道與通人言則同解而心喻同即相是是以心相喻與眾人言則察色而順性下有盛色避其所短雖明包眾理不以尚人恒懷謙下故處物上聰叡資給不以先人常懷退後故在物先善言出己理足則止通理則止不務煩辭鄙誤在人過而不迫見人過跌輒當歷避寫人之所懷扶人之所能扶贊人之所能則人人自任矣不以事類犯人之所婟胡故反與盲人言不諱眇瞎之類不以言例及己之所長己有武力不與虓虎之倫說直說變無所畏惡通材平釋信而後諫雖觸龍鱗物無害者采蟲聲之善音不以聲醜棄其善曲贊愚人之偶得不以人愚廢其嘉言奪與有宜去就不留方其盛氣折謝不恡不避銳跌不惜屈撓方其勝難勝而不矜理自勝耳何所矜也心平, WYG: ''}
