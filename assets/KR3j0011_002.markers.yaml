  - {type: variant, offset: 64, length: 1, content: 微, SBCK: 於督促民不便也䇿術之政宜於治難權畧無方觧釋患難以之治平則無竒術數煩衆民不安矣矯抗之政宜於治侈矯枉過正以厲侈靡以之治弊則殘俗弊治嚴則民殘矣諧和之政宜於治新國新禮殺苟合}
