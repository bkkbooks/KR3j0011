  - {type: variant, offset: 5019, length: 267, content: 速事理之家也以事為理故審於理煩也質性和平能論禮教容不失適則禮教得中辯其得失義理之家也以義為理故明於得失也質性機解推情原意容不妄動則原物得意能適其變情理之家也以情為理故能極物之變四家之明既異而有九偏之情以情犯明各有得失明出於真情動於性情勝明則蔽故雖得而必喪也剛略之人不能理微用意麤疎意不玄微故其論大體則弘愽而高遠性剛則志遠歷纖理則宕往而疏越志遠故䟽越抗厲之人不能廻撓用意猛奮志不旋屈論法直則括處而公正性厲則理毅說變通則否戾而不入理毅則滯礙堅勁之人好攻其事實用意端確言不虛徐指機理則頴灼而徹盡性確則言盡涉大道則徑露而單持言切則義少辯給之人, WYG: ''}
