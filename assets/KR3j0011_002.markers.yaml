  - {type: variant, offset: 2185, length: 2, content: 皆風, WYG: 則其體氣粗可幾矣何謂觀其愛敬以知通塞盖}
  - {type: variant, offset: 2188, length: 11, content: 末流其心孔艱者乃有教化, WYG: 道}
  - {type: variant, offset: 2188, length: 2, content: 末流, krp: 之情有六機杼其所欲則喜爲有力者譽烏獲}
  - {type: punctuation, offset: 2190, content: 。, id: KR3j0011_CHANT_002-bkkpn509}
  - {type: 'tls:seg', offset: 2190, content: '', id: KR3j0011_CHANT_002-6a.132}
  - {type: variant, offset: 2192, length: 2, content: 孔艱, krp: 莫不忻焉不杼其所能則怨爲辨給}
  - {type: punctuation, offset: 2195, content: ，, id: KR3j0011_CHANT_002-bkkpn510}
  - {type: 'tls:seg', offset: 2195, content: '', id: KR3j0011_CHANT_002-6a.133}
  - {type: variant, offset: 2195, length: 4, content: 乃有教化, krp: 稱三緘其心莫不忿然以自伐歷之則惡抗巳所能以歷衆人衆人所惡以謙損下之則恱卑損下人人皆喜恱犯其所乏則婟人皆恱巳所長惡巳所短故稱其所短則婟戾忿肆以惡犯婟則妬自伐其能人所惡也稱人之短人所婟也今伐其所能犯人所婟則妬害生也此人性之六機也夫人情莫不欲遂其志志}
  - {type: variant, offset: 2200, length: 6, content: 所不受也末流, WYG: 極莫過愛敬愛生於父子敬立於君臣是故孝經以愛為至徳起父子}
  - {type: variant, offset: 2201, length: 0, content: '', krp: 欲欲遂巳成故烈士樂奮力之功遭難而力士奮善士樂督政之訓政脩而善士用能士樂治亂之事治亂而求賢能術士樂計䇿之謀廣筭而求其䇿辨士樂陵訊之辭賔賛而求辨給貪者樂貨財之積貨財積則貪者容其求幸者樂權勢之尤權勢之尤則幸者竊其柄苟賛其志則莫}
  - {type: variant, offset: 2202, length: 1, content: 受, krp: 欣然是所謂杼其所欲則喜}
  - {type: punctuation, offset: 2204, content: 。, id: KR3j0011_CHANT_002-bkkpn511}
  - {type: 'tls:seg', offset: 2204, content: '', id: KR3j0011_CHANT_002-6a.134}
  - {type: variant, offset: 2204, length: 1, content: 末, krp: 所}
  - {type: variant, offset: 2205, length: 1, content: 流, krp: 欲}
  - {type: variant, offset: 2207, length: 6, content: 質不可勝論是, WYG: 親故為至徳}
  - {type: variant, offset: 2207, length: 1, content: 質, krp: 心杼盡復何怨乎若}
  - {type: punctuation, offset: 2208, content: ，, id: KR3j0011_CHANT_002-bkkpn512}
  - {type: 'tls:seg', offset: 2208, content: '', id: KR3j0011_CHANT_002-6a.135}
  - {type: variant, offset: 2209, length: 1, content: 可, krp: 杼其所能則不獲其志不獲其志則戚憂巳才之不展是故功力不建則烈士奮奮憤不能盡其材也徳行不訓則正人哀哀哀不得行其化政亂不治則能者歎歎歎不得用其能敵能未弭則術人思思思不得運其竒貨財不積則貪者憂憂憂無所收其利權勢不尤則幸者悲悲不得弄其權是所謂不杼其能則怨也所怨不杼其能恱也人情莫不欲處前故惡人之自伐皆欲居物先故惡人之自伐也自伐皆欲}
  - {type: variant, offset: 2211, length: 1, content: 論, krp: 之類也是故自伐其善則莫不惡也惡其有勝巳之心是所謂自伐歷之則惡也}
  - {type: punctuation, offset: 2212, content: ，, id: KR3j0011_CHANT_002-bkkpn513}
  - {type: 'tls:seg', offset: 2212, content: '', id: KR3j0011_CHANT_002-6a.136}
  - {type: variant, offset: 2214, length: 18, content: 略而不概也蕃徒成群豈可數哉體別第二稟, WYG: 敬為要道終君臣之義故為道之要易以感為徳}
  - {type: variant, offset: 2214, length: 1, content: 略, krp: 逹者終不自伐人情皆欲求勝故恱人之謙謙所以下之下有推與之意是故人無賢愚接之以謙則無不色懌不問能否皆欲勝人是所謂以謙下之則恱也是以君子終日謙謙人情皆欲掩其所短見其所長稱其所長則恱稱其所短則愠是故人駮其所短似若物冐之情之憤悶有若覆冐是所謂駮其所乏則婟也覆冐純塞其心婟戾人情陵上者也見人勝巳皆欲陵之陵犯其所惡雖見憎未害也雖惡我自伐未甚疾害也若以長駮短是所謂以惡犯婟則妬惡生矣以巳之長駮人之短而取其害是以逹者不爲之也凡此六機其歸皆欲處上物之自大人人皆爾是以君子接物犯}
  - {type: variant, offset: 2217, length: 1, content: 概, krp: 校知物情好勝雖或以小犯巳終不校拒}
  - {type: punctuation, offset: 2219, content: 。, id: KR3j0011_CHANT_002-bkkpn514}
  - {type: 'tls:seg', offset: 2219, content: '', id: KR3j0011_CHANT_002-6a.137}
  - {type: variant, offset: 2219, length: 7, content: 蕃徒成群豈可數, krp: 不校則無不敬下所以避其害也務行謙敬誰害之}
