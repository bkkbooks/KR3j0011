  - {type: variant, offset: 21, length: 4, content: 九九徵第, SBCK: 能大而不能小猶凾牛之鼎不可以烹雞愚以爲此非名也夫人材猶噐大小異或者以大鼎不能烹雞喻大材不能治小失其名也夫能之爲言巳定之稱先有定質而後能名生焉豈有能大而不能小乎凡所謂能大而不能小其語出於性有寛急寛者弘􅁉急者急切性有寛急故宜有大小寛弘宜治大急切宜治小寛弘之人宜爲郡國使下得施其功而總成其事急切則煩碎事不成急小之人宜理百里使事辦於巳弘􅁉則網漏庶事荒矣然則郡之與縣異體之大小者也明能治大郡則能治小郡能治大縣亦能治小縣以實理寛急論辨之則當言大小異宜不當言能大不能小也􅀂能大而不能小仲尼豈不爲季氏臣􅀂夫雞之與牛亦異體之小大也鼎能烹牛亦能烹雞銚能烹雞亦能烹犢故鼎亦宜有大小􅀂以烹犢則豈不能烹雞乎但有宜與不宜豈有能與不能故能治大郡則亦能治小郡矣推此論之人材各有所宜非獨大小之謂也文者理百官武者治軍旅夫人材不同能各有異有自任之能脩巳潔身總禦百官有立法使人從之之能法懸人懼無敢犯也有消息辨護之能智意辨護周旋得節有徳教師人之能道術深明動爲物教有行事使人譴讓之能云爲得理義和於時有司察紏摘之能督察是非無不區别有權竒之能務以竒計成事立功有威猛之能猛毅昭著振威敵國夫能岀於材材不同量材能既殊任政亦異是故自任之能清節之材也故在朝也則冡宰之任爲國則矯􅀡之政其身正故掌天官而總百揆立法之能治家之材也故在朝也則司冦之任爲國則公正之政法無私故掌秋官而詰姦􅁀計䇿之能術家之材也故在朝也則三孤之任爲國則變化之政計慮明故輔三槐而助論道人事之能智意之材也故在朝也則冡宰之佐爲國則諧合之政智意審故佐天官而諧内外行事之能譴讓之材也故在朝也則司冦之任爲國則督責之政辨衆事故佐秋官而督傲慢權竒之能􅇊俩之材也故在朝也則司空之任爲國則藝事之政􅇊能巧故任冬官而成藝事司察之能臧否之材也故在朝也則師氏之佐爲國則刻削之政是非章故佐師氏而察善否威猛之能豪傑之材也故在朝也則將帥之任爲國則嚴厲之政體果毅故總六師而振威武凡偏材之人皆}
