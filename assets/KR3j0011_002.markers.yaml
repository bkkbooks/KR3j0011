  - {type: 'tls:seg', offset: 2181, content: '', id: KR3j0011_CHANT_002-6a.130}
  - {type: substitution, offset: 2182, original: 恒, replacement: 恆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20663}}
  - {type: punctuation, offset: 2183, content: 、, id: KR3j0011_CHANT_002-bkkpn507}
