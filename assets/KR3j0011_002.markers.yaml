  - {type: variant, offset: 4291, length: 61, content: 目不求視耳不參聽各司其官則眾材達眾材既達則人主垂拱無為而理是故主道立則十二材各得其任也上無為則下當任也清節之德師氏之任也掌, SBCK: ''}
