  - {type: variant, offset: 816, length: 1, content: 飴, WYG: 俱為力人則力小者慕大力大者提小故其相譽常失其實也及其名敵則尠能相下若俱能負鼎則争勝之心生故不能相下是故直者性奮好人行直於人見人正直則心好之而不能受人之訐刺己之非則訐而不受盡者情露好人行盡於人見人穎露則心好之而不能納人之徑說己徑盡則違之不納務名者樂人之進趨過人見人乗人則悦其進趨而不能出陵己之後人陵於己則忿而不服是故性同而材傾則相援而相頼也並有旅力則大能奨小性同而勢均則相競而相害也恐彼勝己則妬善之心生此又同體之變也故或助直而毁直人直過於己直則非毁之心生或與明而毁明人明過於己明則妬害之心動而衆人之察不辨其律理是嫌於體同也體同尚然况異體乎夫人所處異勢勢有申壓富貴遂逹勢之申也身處富貴物不能屈是}
