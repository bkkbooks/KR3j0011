  - {type: variant, offset: 7801, length: 396, content: 退下鄙劣志在陵上是以平淡之主御之以正訓貪者之所憂戒幸者之所悲然後物不自伐下不陵上賢否當位治道有序何謂觀其所短以知所長夫偏材之人皆有所短智不能周也故直之失也訐刺訐傷於義故其父攘羊其子證之剛之失也厲剛切傷於理故諫君不從承之以劍和之失也懦懦弱不及道故宮之奇為人懦不能強諫介之失也拘拘愚不達事尾生守信死於橋下夫直者不訐無以成其直既悅其直不可非其訐用人之直恕其訐也訐也者直之徵也非訐不能為直剛者不厲無以濟其剛既悅其剛不可非其厲用人之剛恕其厲也厲也者剛之徵也非厲不能為剛和者不懦無以保其和既悅其和不可非其懦用人之和恕其懦也懦也者和之徵也非懦不能為和介者不拘無以守其介既悅其介不可非其拘用人之介恕其拘也拘也者介之徵也非拘不能為介然有短者未必能長也純訐之人未能正直有長者必以短為徵純和之人徵必懦弱是故觀其徵之所短而其材之所長可知也欲用其剛必采之於厲何謂觀其聰明以知所達夫仁者德之基也載德而行義者德之節也制德之, SBCK: 彼固}
