  - {type: variant, offset: 8257, length: 5, content: 待燭火火日, SBCK: 則禍成而不救矣㳙㳙不息遂成江河水漏覆舟胡可救哉是故陳餘以張耳之變卒受離身之害思復須臾之忿忘終身之惡是以身㓕而嗣絶也彭寵以朱浮之郄終有覆亡之禍恨督責之小故違終始之大計是以宗夷而族覆也禍福之機可不慎哉二女爭桑吳楚之難作季郈闘雞魯國之釁作可不畏歟可不畏歟是故君子之求勝也以推讓爲利銳推讓}
