  - {type: variant, offset: 480, length: 326, content: 奇計成事立功有威猛之能猛毅昭著振威敵國夫能出於材材不同量材能既殊任政亦異是故自任之能清節之材也故在朝也則冢宰之任為國則矯直之政其身正故掌天官而總百揆立法之能法家之材也故在朝也則司寇之任為國則公正之政法無私故掌秋官而詰姦暴計策之能術家之材也故在朝也則三孤之任為國則變化之政計慮明故輔三槐而助論道人事之能智意之材也故在朝也則冢宰之佐為國則諧合之政智意審故佐天官而諧內外行事之能譴讓之材也故在朝也則司寇之佐為國則督責之政辦眾事故佐秋官而督傲慢權奇之能伎倆之材也故在朝也則司空之任為國則藝事之政伎倆巧故任冬官而成藝事司察之能臧否之材也故在朝也則師氏之佐為國則刻削之政是非章故佐師氏察善否威猛之能豪傑之材也故在朝也則將帥之任為國則嚴厲之政體果毅故總六師而振威武凡, SBCK: ''}
