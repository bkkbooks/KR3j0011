  - {type: variant, offset: 814, length: 101, content: 美譬飴以甘為名酒以苦為實故長於辦一官弓工楺材而有餘力而短於為一國兼掌陶冶器不成矣何者夫一官之任以一味恊五味鹽人調鹽醯人調醯則五味成矣譬梓人治材土官治墻則廈屋成一國之政以無味和五味水以無味故五味得其和猶君, SBCK: 同}
  - {type: variant, offset: 814, length: 1, content: 美, WYG: 同體能明己是以親而譽之憎惡對反而毁之與己體反是以惡而踈之序異雜而不尚也不與己同不與己異則雖不憎亦不尚之推而論之無他故焉夫譽同體毁對反所以證彼非而著己是也由與己同體故證彼非而著己是也至於異雜之人於彼無益於己無害則序而不尚不以彼為是不以己為非都無損益何所尚之是故同體之人常患於過譽}
