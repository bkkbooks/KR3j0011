  - {type: variant, offset: 6434, length: 0, content: '', SBCK: 各自立度以相觀采以巳所能歷觀衆才或相其形容以貌狀取人或候其動作以進趨取人或揆其終始以􅀤正取人或揆其儗象以㫖意取人或推其細㣲以情理取人或恐其過誤以簡恕取人或循其所言以辭㫖取人或稽其行事以功効取人八者遊雜各以意之所可爲准是以雜而無紀故其得者少所失者多但取其同於巳而失其異於巳巳不必兼故失者多是故必有草創信形之誤或色貌取人而行違又有居止變化之謬或身在江海心存魏闕故其接遇觀人也隨行信名失其中情是以聖人}
