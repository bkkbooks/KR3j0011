  - {type: variant, offset: 28, length: 113, content: 人材有能大而不能小猶函牛之鼎不可以烹雞愚以為此非名也夫人材猶器大小異或者以大鼎不能烹雞喻大材不能治小失其名也夫能之為言已定之稱先有定質而後能名生焉豈有能大而不能小乎凡所謂能大而不能小其語出於性有寬急寬者弘裕急者急切性有寬急故宜, WYG: 度心}
