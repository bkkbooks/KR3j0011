  - {type: variant, offset: 2889, length: 3313, content: 同體則親異體則踈若二至已上亦隨其所兼以及異數法家兼術故能以術輔法故一流之人能識一流之善以法治者所以舉不過法二流之人能識二流之美體法術者法術兼行盡有諸流則亦能兼達眾材體通八流則八材當位物無不理故兼材之人與國體同謂八材之人始進陳言冢宰之官察其所以欲觀其一隅則終朝足以識之將究其詳則三日而後足何謂三日而後足夫國體之人兼有三材故談不三日不足以盡之一以論道德二以論法制三以論策術然後乃能竭其所長而舉之不疑在上者兼明八材然後乃能盡其所進用而無疑矣然則何以知其兼偏而與之言乎察言之時何以識其偏材何以識其兼材也其為人也務以流數杼人之所長而為之名目如是兼也每因事類杼盡人之所能為之名目言不容口如陳以美欲人稱之己之有善因事自說又欲令人言常稱已不欲知人之所有如是者偏也人之有善耳不樂聞人稱之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深說淺益深益異淺者意近故聞深理而心逾衒是以商君說帝王之道不入則以彊兵之義示之異則相反反則相非聞深則心衒焉得而相是是以李兌塞耳而不聽蘇秦之說是故多陳處直則以為見美以其多方疑似見美也靜聽不言則以為虛空待時來語疑其無實抗為高談則以為不遜辭護理高疑其凌已遜讓不盡則以為淺陋卑言寡氣疑其淺薄言稱一善則以為不愽未敢多陳疑其陋狹歷發眾奇則以為多端據四庫全書本卷中頁改徧舉事類則欲以釋之復以為多端先意而言則以為分美言合其意疑分已美因失難之則以為不喻欲補其失反不喻也說以對反則以為較己欲反其事而明言乃疑其較也愽以異雜則以為無要控盡所懷謂之無要論以同體然後乃悅弟兄忿肆為陳管蔡之事則欣暢而和悅於是乎有親愛之情稱舉之譽苟言之同非徒親愛而已乃至譽而舉之此偏材之常失意常婟護欲人同己己不必得何由暫得英雄第八自非平淡能各有名英為文昌雄為武稱英雄第八夫草之精秀者為英獸之特群者為雄物尚有之況於人乎故人之文武茂異取名於此文以英為名武以雄為號是故聰明秀出謂之英膽力過人謂之雄此其大體之別名也若校其分數則㸦相須英得雄分然後成章雄得英分然後成剛各以二分取彼一分然後乃成膽者雄之分智者英之分英有聰明須膽而後成雄有膽力須知而後立何以論其然夫聰明者英之分也不得雄之膽則說不行智而無膽不能正言膽力者雄之分也不得英之智則事不立勇而無謀不能立事是故英以其聰謀始以其明見機智以謀事之始明以見事之機待雄之膽行之不決則不能行雄以其力服眾以其勇排難非力眾不服非勇難不排待英之智成之智以制宜巧乃可成然後乃能各濟其所長也譬金待水而成利功物得水然後成養功若聰能謀始而明不見機乃可以坐論而不可以處事智能坐論而明不見機何事務之能處聰能謀始明能見機而勇不能行可以循常而不可以慮變明能循常勇不能行何應變之能為若力能過人而勇不能行可以為力人未可以為先登雖絕群膽雄不決何先鋒之能為力能過人勇能行之而智不能斷事可以為先登未足以為將帥力能先登臨事無謀何將帥之能為必聰能謀始明能見機膽能決之然後乃可以為英張良是也氣力過人勇能行之智足斷事然後乃可以為雄韓信是也體分不同以多為目故英雄異名張良英智多韓信雄膽勝然皆偏至之材人臣之任也故英可以為相制勝于近雄可以為將揚威于遠若一人之身兼有英雄則能長世高祖項羽是也然英之分以多於雄而英不可以少也英以致智智能役雄何可少也英分少則智者去之故項羽氣力蓋世明能合變膽烈無前濟江焚糧而不能聽采奇異有一范增不用是以陳平之徒皆亡歸高祖英分多故群雄服之英材歸之兩得其用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄材不服也內無主於中外物何由入徒雄而不英則智者不歸往也無名以接之智者何由往故雄能得雄不能得英兕虎自成群也英能得英不能得雄鸞鳳自相親也故一人之身兼有英雄乃能役英與雄能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九群材異品志各異歸觀其通否所格者八八觀第九八觀者一曰觀其奪救以明間雜或慈欲濟恤而恡奪其仁或救濟廣厚而乞醯為惠二曰觀其感變以審常度觀其慍怍則常度可審三曰觀其至質以知其名徵質相應覩色知名四曰觀其所由以辨依似依訐似直倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知所長訐刺雖短而長於為直八曰觀其聰明以知所達雖體眾材而材不聰明事事蔽塞其何能達何謂觀其奪救以明間雜夫質有至有違剛質無欲所以為至貪情或勝所以為違若至勝違則惡情奪正若然而不然以欲勝剛以此似剛而不剛故仁出於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者若夫見可憐則流涕慈心發於中將分與則恡嗇是慈而不仁者為仁者必濟恤覩危急則惻隱仁情動於內將赴救則畏患是仁而不恤者為恤者必赴危處虛義則色厲精厲見於貌顧利慾則內荏是厲而不剛者為剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇怯損於仁厲而不剛者則慾奪之也利慾害於剛故曰慈不能勝恡無必其能仁也愛則不施何仁之能為仁不能勝懼無必其能恤也畏懦不果何恤之能行厲不能勝慾無必其能剛也情存利慾何剛之能成是故不仁之質勝則伎力為害器仁質既弱而有伎力此害己之器也貪悖之性勝則彊猛為禍梯廉質既負而性強猛此禍己之梯也亦有善情救惡不至為害惡物宜翦而除純善之人憐而救之此稠厚之人非大害也愛惠分篤雖傲狎不離平生結交情厚分深雖原壤夷俟而不相棄無大過也助善著明雖疾惡無害也如殺無道以就有道疾惡雖甚無大非也救濟過厚雖取人不貪也取人之物以有救濟雖譏在乞醯非大貪也是故觀其奪救而間雜之情可得知也或畏恡奪慈仁或救濟過其分而平淡之主順而恕何謂觀其感變以審常度夫人厚貌深情將欲求之必觀其辭旨察其應贊視發言之旨趣觀應和之當否夫觀其辭旨猶聽音之善醜音唱而善醜別察其應贊猶視智之能否也聲和而能否別故觀辭察應足以互相別識彼唱此和是非相舉然則論顯揚正白也辭顯唱正是曰明白不善言應玄也默而識之是曰玄也經緯玄白通也明辨是非可謂通理移易無正雜也理不一據言意渾雜先識未然聖也追思玄事叡也見事過人明也以明為晦智也心雖明之常若不足微忽必識妙也理雖至微而能察之美妙不昧踈也心致昭然是曰踈朗測之益深實也心有實智探之愈精猶泉滋中出測之益深也假合炫燿虛也道聽塗說久而無實猶池水無源洩而虛竭自見其美不足也智不贍足恐人不知以自伐不伐其能有餘也不畏不知故曰凡事不度必有其故色貌失實必有憂喜之故憂患之色乏而且荒憂患在心故形色荒疾疢之色亂而垢理黃黑色雜理多塵垢喜色愉然以懌慍色厲然以揚妬惑之色冒昧無常粗白粗赤憤憤在面及其動作蓋竝言辭色既發揚言亦從之是故其言甚懌而精色不從者中有違也心恨而言強和色貌終不相從其言有違而精色可信者辭不敏也言不自盡故辭雖違而色貌可信言未發而怒色先見者意憤溢也憤怒填胸者未言而色貌已作言已發而怒氣送之者彊所不然也欲強行不然之事故怒氣助言凡此之類徵見於外不可奄違心懽而怒容意恨而和貌雖欲違之精色不從心動貌從感愕以明雖變可知情雖在內感愕發外千形萬貌粗可知矣是故觀其感變而常度之情可知觀人辭色而知其心物有常度然後審矣何謂觀其至質以知其名凡偏材之性二至以上則至質相發而令名生矣二至質氣之謂也質直氣清則善名生矣是故骨直氣清則休名生焉骨氣相應名是以美氣清力勁則烈名生焉氣既清矣力勁則烈勁智精理則能名生焉智既勁矣精理則能稱智直彊愨則任名生焉直而又美是以見任集于端質則令德濟焉質徵端和善德乃成加之學則文理灼焉圭玉有質瑩則成文是故觀其所至之多少而異名之所生可知也尋其質氣覽其清濁雖有多少之異異狀之名斷可知之何謂觀其所由以辨依似夫純訐性違不能公正質氣俱訐何正之有依訐似直以訐訐善以直之訐訐及良善純宕似流不能通道質氣俱宕何道能通依宕似通行傲過節似通之宕容傲無節故曰直者亦訐訐者亦訐其訐則同其所以為訐則異直人之訐訐惡憚非純訐為訐訐善刺是通者亦宕宕者亦宕其宕則同其所以為宕則異通人之宕簡而達道純宕傲僻以自恣然則何以別之直而能溫者德也溫和為直所以為德直而好訐者偏也性直過訐所以為偏訐而不直者依也純訐似直所以為依道而能節者通也以道自節所以為通通而時過者偏也性通時過所以為偏宕而不節者依也純宕似通所以為依偏之與依志同質違所謂似是而非也質同通直或偏或依是故輕諾似烈而寡信不量己力輕許死人臨難畏怯不能殉命多易似能而無效不顧材能自謂能辦受事猖獗作無效驗進銳似精而去速情躁之, SBCK: 衆}
