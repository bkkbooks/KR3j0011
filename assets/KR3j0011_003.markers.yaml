  - {type: variant, offset: 7781, length: 0, content: '', SBCK: 際㑹亦不致毀害必依託於事􅎖成端末凡相毀謗必因事􅀋而飾成之其於聽者雖不盡信猶半以爲然也由言有端角故信之者半巳之校報亦又如之復當報謗爲生翅尾終其所歸亦各有半信著於遠近也俱有形狀不知其實是以近逺之聽皆半信於此半信於彼然則交氣疾爭者爲易口而自毀也巳􅀃人之瑕人亦􅀃巳之􅁾雖詈人自取其詈也並辭競􅀃者爲貸手以自毆辭忿則力爭巳既毆人人亦毆巳此其爲借乎以自毆爲惑繆豈不甚哉借手自毆借口自詈非惑如何然原其所由豈有躬自厚責以致變訟者乎巳能自責人亦自責兩不言競變訟何由生哉皆由内恕不足外望不巳所以争者由内不能恕巳自責而外望於人不巳也或怨彼輕我或疾彼勝巳}
