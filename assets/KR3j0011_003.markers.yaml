  - {type: variant, offset: 7725, length: 1, content: 欲, SBCK: 不能相奪小人競進智不相過並驅爭險更相蹈籍兩頓俱折而爲後者所趨中道而斃後者乘之譬􅇠殛犬疲而田父收其功由是論之爭讓之途其别明矣君子尚讓故渉萬里而途清小人好爭足未動而路塞然好勝之人猶謂不然貪則好勝雖聞徳讓之風意猶昧然乃云古人讓以得今人讓以失心之所是起而爭之以在前爲速銳以處後爲畱滯故行坐汲汲不睱脂車以下衆爲卑屈以躡等爲異傑苟矜起等不羞􅀒乘以讓敵爲􅅆辱以陵上爲高厲故趙穿不顧元帥􅇾子以偏師䧟是故抗奮遂徃不能自反也譬虎狼食生物遂有殺}
