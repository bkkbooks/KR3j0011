  - {type: variant, offset: 7773, length: 0, content: '', WYG: 然也由言有端角故信之者半己之校報亦又如之復當報謗為生翅尾終其所歸亦各有半信著於逺近也俱有形状不知其實是以近逺之聴皆半信於此半信於彼然則交氣疾争者為易口而自毁也己説人之瑕人亦説己之穢雖詈人自取其詈也並辭競説者為貸手以自毆辭忿則力争己既毆人人亦毆己此其為借手以自毆為惑繆豈不甚哉借手自毆借口自詈非惑如何然原其所由豈有躬自厚責以致變訟者乎己能自責人亦自責兩不言競變訟何由生哉皆由内恕不足外望不已所以争者由内不能恕己自責而外望於人不已也或}
