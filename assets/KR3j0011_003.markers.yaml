  - {type: variant, offset: 1239, length: 3, content: 或能言, WYG: 逹有勞謙之稱窮有著明之節材出於衆其進則裒多益寡勞謙濟世退則履道坦坦幽人貞吉中材之人則随世損益守常之智申壓在時故勢來則益勢去則損是故藉富貴則貨財充於内施恵周於外貲財有餘恣意周濟見贍者求可稱而譽之感其恩紀匡救其惡是以朱建受金而為食其畫計見援者闡小美而大之感其引援将順其羙是以曹邱見接為季布揚名雖無異材猶行成而名立夫富與貴可不欣哉乃至無善而行成無智而名立是以富貴妻嫂恭况他人乎處貧賤則欲施而無財欲援而無勢有慈心而無以拯識竒材}
