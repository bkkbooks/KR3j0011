  - {type: variant, offset: 6434, length: 0, content: '', krp: 各自立度以相觀采以巳所能歷觀衆才或相其形容以貌狀取人或候其動作以進趨取人或揆其終始以發正取人或揆其儗象以㫖意取人或推其細㣲以情理取人或恐其過誤以簡恕取人或循其所言以辭㫖取人或稽其行事以功効取人八者遊雜各以意之所可爲准是以雜而無紀故其得者少所失者多但取其同於巳而失其異於巳巳不必兼故失者多是故必有草創信形之誤或色貌取人而行違又有居止變化之謬或身在江海心存魏闕故其接遇觀人也隨行信名失其中情是以聖人}
  - {type: variant, offset: 6436, length: 3, content: 信貌或, SBCK: 觀行如有所譽必有所試故淺美􅀭露則以爲有異智淺易見狀似異羙深明沉漠則以爲空虛智深内明狀似無實分别妙理則以爲離婁研精至理狀似離婁口傳甲乙則以爲義理強指物􅀋狀似有理好􅀃是非則以爲臧否妄􅀃是非似明善否講日成名則以爲人物强議賢愚似明人物平道政事則以爲國體妄論時事似識國體猶聽有聲之􅀋名隨其音七者不能明物皆隨行而爲之名猶聽猫音而謂之猫聽雀音而謂之雀不知二蟲竟謂何名也世之疑惑皆此􅀋也是以魯國儒服者衆人皆謂之儒立而問之一人而己夫名非實用之不效南箕不可以簸􅀭北斗不可挹酒漿故曰名猶口進而實從事退衆覩形而名之故用而不驗也中情之人名不副實用之有效真智在中衆不能見故無外名而有内實故名由衆退而實從事章效立則名章此草創之常}
