  - {type: variant, offset: 8249, length: 0, content: '', SBCK: 乎是故君子知屈之可以爲伸故含辱而不辭韓信屈於跨下之辱知卑讓之可以勝敵故下之而不疑展喜犒齊師之謂也及其終極乃轉禍而爲福晋文避楚三舍而有城濮之勲屈讐而爲友相如下廉頗而爲刎頸之交使怨讐不延於後嗣而羙名宣於無窮子孫荷其榮䕃竹帛紀其高義君子之道豈不􅁉乎􅀂偏急好爭則身危當年何後來之能福且君子能受纎㣲之小嫌故無變闘之大訟大訟起於纎芥故君子愼其小小人不能􅃘小忿之故終有赫赫之敗辱小人以小惡爲無傷而不去故罪大不可觧惡積不可救怨在㣲而下之}
  - {type: page-break, offset: 8249, content: '', id: KR3j0011_SBCK_003-19b}
  - {type: variant, offset: 8249, length: 0, content: '', WYG: 乎是故君子知屈之可以為伸故含辱而不辭韓信屈於跨下之辱知卑讓之可以勝敵故下之而不疑展喜犒齊師之謂也及其終極乃轉禍而為福晉文避楚三舍而有城濮之勲屈讐而為友相如下亷頗而為刎頸之交使怨讐不延於後嗣而羙名宣於無窮子孫荷其榮䕃竹帛紀其髙義君子之道豈不裕乎若偏急好争則身危當年何後来之能福且君子能受纎㣲之小嫌故無變鬪之大訟大訟起於纎芥故君子慎其小小人不能忍小忿之故終有赫赫之敗辱小人以小惡為無傷而不去故罪大不可觧惡積不可救怨在㣲而下之}
  - {type: page-break, offset: 8249, content: '', id: KR3j0011_WYG_003-14b, image: WYG0848/WYG0848-0787d.png}
