  - {type: variant, offset: 2072, length: 735, content: 清潔不汙在幽而明已達也為眾人之所稱業常明白出則受譽其功足以變察是非理清道潔是非不亂其敝也為詆訶之所怨詆訶之徒不樂聞過其為業也峭而不裕峭察於物何能寬裕故或先得而後離眾清亮為時所稱理峭為眾所憚伎倆之業本于事能其道辨而且速伎計如神是以速辨其未達也為眾人之所異伎能出眾故雖微而顯已達也為官司之所任遂事成功政之所務其功足以理煩紏邪釋煩理邪亦須伎倆其敝也民勞而下困上多端而下困其為業也細而不泰故為治之末也道不平弘其能太乎接識第七推己接物俱識同體兼能之士乃達群材接識第七夫人初甚難知貌厚情深難得知也而士無眾寡皆自以為知人故以己觀人則以為可知也己尚清節則凡清節者皆己之所知觀人之察人則以為不識也夫何哉由己之所尚在於清節人之所好在於利欲曲直不同於他便謂人不識物也是故能識同體之善性長思謀則善策略之士而或失異量之美遵法者雖美乃思謀之所不取何以論其然夫清節之人以正直為度故其歷眾材也能識性行之常度在正直故悅有恒之人而或疑法術之詭謂守正足以致治何以法術為也法制之人以分數為度故能識方直之量度在法分故悅方直之人而不貴變化之術謂法分足以濟業何以術謀為也術謀之人以思謨為度故能識策略之奇度在思謀故貴策略之人而不識遵法之良謂思謨足以化民何以法制為也器能之人以辨護為度故能識方略之規度在辨護故悅方計之人而不知制度之原謂方計足以立功何以制度為也智意之人以原意為度故能識韜諝之權度在原意故悅韜諝之人而不貴法教之常謂原意足以為正何以法理為也伎倆之人以邀功為度故能識進趣之功度在邀功故悅功能之人而不通道德之化謂伎能足以成事何以道德為也臧否之人以伺察為度故能識訶砭之明度在伺察故悅譴訶之人而不暢倜儻之異謂譴訶乃成教何以寬弘為也言語之人以辨析為度故能識捷給之惠度在剖析故悅敏給之人而不知含章之美謂辨論乃事理何以含章為, SBCK: ''}
