body:
  text: 卷中材能第五材能大小其準不同量力而授所任乃濟材能第五或曰人材有能大而不能小猶函牛之鼎不可以烹雞愚以為此非名也夫人材猶器大小異或者以大鼎不能烹雞喻大材不能治小失其名也夫能之為言已定之稱先有定質而後能名生焉豈有能大而不能小乎凡所謂能大而不能小其語出於性有寬急寬者弘裕急者急切性有寬急故宜有大小寬弘宜治大急切宜治小寬弘之人宜為郡國使下得施其功而總成其事急切則煩碎事不成急小之人宜理百里使事辦於己弘裕則網漏庶事荒矣然則郡之與縣異體之大小者也明能治大郡則能治小郡能治大縣亦能治小縣以實理寬急論辨之則當言大小異宜不當言能大不能小也若能大而不能小仲尼豈不為季氏臣若夫雞之與牛亦異體之小大也鼎能烹牛亦能烹雞銚能烹雞不能烹犢故鼎亦宜有大小若以烹犢則豈不能烹雞乎但有宜與不宜豈有能與不能故能治大郡則亦能治小郡矣推此論之人材各有所宜非獨大小之謂也文者理百官武者治軍旅夫人材不同能各有異有自任之能脩己潔身總御百官有立法使人從之之能法懸人懼無敢犯也有消息辨護之能智意辨護周旋得節有德教師人之能道術深明動為物教有行事使人譴讓之能云為得理義和於時有司察紏摘之能督察是非無不區別有權奇之能務以奇計成事立功有威猛之能猛毅昭著振威敵國夫能出於材材不同量材能既殊任政亦異是故自任之能清節之材也故在朝也則冢宰之任為國則矯直之政其身正故掌天官而總百揆立法之能法家之材也故在朝也則司寇之任為國則公正之政法無私故掌秋官而詰姦暴計策之能術家之材也故在朝也則三孤之任為國則變化之政計慮明故輔三槐而助論道人事之能智意之材也故在朝也則冢宰之佐為國則諧合之政智意審故佐天官而諧內外行事之能譴讓之材也故在朝也則司寇之佐為國則督責之政辦眾事故佐秋官而督傲慢權奇之能伎倆之材也故在朝也則司空之任為國則藝事之政伎倆巧故任冬官而成藝事司察之能臧否之材也故在朝也則師氏之佐為國則刻削之政是非章故佐師氏察善否威猛之能豪傑之材也故在朝也則將帥之任為國則嚴厲之政體果毅故總六師而振威武凡偏材之人皆一味之美譬飴以甘為名酒以苦為實故長於辦一官弓工楺材而有餘力而短於為一國兼掌陶冶器不成矣何者夫一官之任以一味恊五味鹽人調鹽醯人調醯則五味成矣譬梓人治材土官治墻則廈屋成一國之政以無味和五味水以無味故五味得其和猶君體平淡則百官施其用又國有俗化民有劇易五方不同風俗各異土有剛柔民有劇易而人材不同故政有得失以簡治易則得治煩則失是以王化之政宜於統大易簡而天下之理得矣以之治小則迂網踈而吞舟之姦漏辨護之政宜於治煩事皆辨護煩亂乃理以之治易則無易甚於督促民不便也策術之政宜於治難權略無方解釋患難以之治平則無奇術數煩眾民不安矣矯抗之政宜於治侈矯枉過正以厲侈靡以之治弊則殘俗弊治嚴則民殘矣諧和之政宜於治新國新禮殺苟合而已以之治舊則虛苟合之教非禮實也公刻之政宜於紏姦刻削不深姦亂不止以之治邊則失眾眾民憚法易逃叛矣威猛之政宜於討亂亂民桀逆非威不服以之治善則暴政猛民殘濫良善矣伎倆之政宜於治富以國彊民以使以之治貧則勞而富饒下困易貨改鑄民失業矣故量能授官不可不審也凡此之能皆偏材之人也故或能言而不能行或能行而不能言智勝則能言材勝則能行至於國體之人能言能行故為眾材之雋也人君之能異於此平淡無為以任眾能故臣以自任為能竭力致功以取爵位君以用人為能任賢使能國家自理臣以能言為能各言其能而受其官君以能聽為能聽言觀行而授其官臣以能行為能必行其所言君以能賞罰為能必當其功過也所能不同君無為而臣有事故能君眾材也若君以有為代大匠斲則眾能失巧功不成矣利害第六建法陳術以利國家及其弊也害歸於己利害第六蓋人業之流各有利害流漸失源故利害生夫清節之業著于儀容發於德行心清意正則德容外著未用而章其道順而有化德輝昭著故不試而效效理於人故物無不化故其未達也為眾人之所進理順則眾人樂進之既達也為上下之所敬德和理順誰能慢之其功足以激濁揚清師範僚友其為業也無弊而常顯非徒不弊存而有顯故為世之所貴德信有常人不能賤法家之業本于制度待乎成功而效法以禁姦姦止乃效其道前苦而後治嚴而為眾初布威嚴是以勞苦終以道化是以民治故其未達也為眾人之所忌姦黨樂亂忌法者眾已試也為上下之所憚憲防肅然內外振悚其功足以立法成治民不為非治道乃成其弊也為群枉之所讎法行寵貴終受其害其為業也有敝而不常用明君乃能用之彊明不繼世故法不常用故功大而不終是以商君車裂吳起支解術家之業出於聰思待於謀得而章斷於未行人無信者功成事效而後乃彰也其道先微而後著精而且玄計謀微妙其始至精終始合符是以道著其未達也為眾人之所不識謀在功前眾何由識其用也為明主之所珍暗主昧然豈能貴之其功足以運籌通變變以求通故能成其功其退也藏於隱微計出微密是以不露其為業也奇而希用主計神奇用之者希也故或沈微而不章世希能用道何由章智意之業本于原度其道順而不忤將順時宜何忤之有故其未達也為眾人之所容矣庶事不逆善者來親已達也為寵愛之所嘉與眾同和內外美之其功足以讚明計慮媚順於時言計是信也其敝也知進而不退不見忌害是以慕進也或離正以自全用心多媚故違於正其為業也諝而難持韜情諝智非雅正之倫也故或先利而後害知進忘退取悔之道臧否之業本乎是非其道廉而且砭清而不雜貶去纖芥故其未達也為眾人之所識清潔不汙在幽而明已達也為眾人之所稱業常明白出則受譽其功足以變察是非理清道潔是非不亂其敝也為詆訶之所怨詆訶之徒不樂聞過其為業也峭而不裕峭察於物何能寬裕故或先得而後離眾清亮為時所稱理峭為眾所憚伎倆之業本于事能其道辨而且速伎計如神是以速辨其未達也為眾人之所異伎能出眾故雖微而顯已達也為官司之所任遂事成功政之所務其功足以理煩紏邪釋煩理邪亦須伎倆其敝也民勞而下困上多端而下困其為業也細而不泰故為治之末也道不平弘其能太乎接識第七推己接物俱識同體兼能之士乃達群材接識第七夫人初甚難知貌厚情深難得知也而士無眾寡皆自以為知人故以己觀人則以為可知也己尚清節則凡清節者皆己之所知觀人之察人則以為不識也夫何哉由己之所尚在於清節人之所好在於利欲曲直不同於他便謂人不識物也是故能識同體之善性長思謀則善策略之士而或失異量之美遵法者雖美乃思謀之所不取何以論其然夫清節之人以正直為度故其歷眾材也能識性行之常度在正直故悅有恒之人而或疑法術之詭謂守正足以致治何以法術為也法制之人以分數為度故能識方直之量度在法分故悅方直之人而不貴變化之術謂法分足以濟業何以術謀為也術謀之人以思謨為度故能識策略之奇度在思謀故貴策略之人而不識遵法之良謂思謨足以化民何以法制為也器能之人以辨護為度故能識方略之規度在辨護故悅方計之人而不知制度之原謂方計足以立功何以制度為也智意之人以原意為度故能識韜諝之權度在原意故悅韜諝之人而不貴法教之常謂原意足以為正何以法理為也伎倆之人以邀功為度故能識進趣之功度在邀功故悅功能之人而不通道德之化謂伎能足以成事何以道德為也臧否之人以伺察為度故能識訶砭之明度在伺察故悅譴訶之人而不暢倜儻之異謂譴訶乃成教何以寬弘為也言語之人以辨析為度故能識捷給之惠度在剖析故悅敏給之人而不知含章之美謂辨論乃事理何以含章為也是以互相非駮莫肯相是人皆自以為是誰肯道人之是取同體也則接詥而相得性能苟同則雖胡越接響而情通取異體也雖歷久而不知性能苟異則雖比肩歷年而逾踈矣凡此之類皆謂一流之材也故同體則親異體則踈若二至已上亦隨其所兼以及異數法家兼術故能以術輔法故一流之人能識一流之善以法治者所以舉不過法二流之人能識二流之美體法術者法術兼行盡有諸流則亦能兼達眾材體通八流則八材當位物無不理故兼材之人與國體同謂八材之人始進陳言冢宰之官察其所以欲觀其一隅則終朝足以識之將究其詳則三日而後足何謂三日而後足夫國體之人兼有三材故談不三日不足以盡之一以論道德二以論法制三以論策術然後乃能竭其所長而舉之不疑在上者兼明八材然後乃能盡其所進用而無疑矣然則何以知其兼偏而與之言乎察言之時何以識其偏材何以識其兼材也其為人也務以流數杼人之所長而為之名目如是兼也每因事類杼盡人之所能為之名目言不容口如陳以美欲人稱之己之有善因事自說又欲令人言常稱已不欲知人之所有如是者偏也人之有善耳不樂聞人稱之口不和也不欲知人則言無不疑聞法則疑其刻削聞術則疑其詭詐是故以深說淺益深益異淺者意近故聞深理而心逾衒是以商君說帝王之道不入則以彊兵之義示之異則相反反則相非聞深則心衒焉得而相是是以李兌塞耳而不聽蘇秦之說是故多陳處直則以為見美以其多方疑似見美也靜聽不言則以為虛空待時來語疑其無實抗為高談則以為不遜辭護理高疑其凌已遜讓不盡則以為淺陋卑言寡氣疑其淺薄言稱一善則以為不愽未敢多陳疑其陋狹歷發眾奇則以為多端據四庫全書本卷中頁改徧舉事類則欲以釋之復以為多端先意而言則以為分美言合其意疑分已美因失難之則以為不喻欲補其失反不喻也說以對反則以為較己欲反其事而明言乃疑其較也愽以異雜則以為無要控盡所懷謂之無要論以同體然後乃悅弟兄忿肆為陳管蔡之事則欣暢而和悅於是乎有親愛之情稱舉之譽苟言之同非徒親愛而已乃至譽而舉之此偏材之常失意常婟護欲人同己己不必得何由暫得英雄第八自非平淡能各有名英為文昌雄為武稱英雄第八夫草之精秀者為英獸之特群者為雄物尚有之況於人乎故人之文武茂異取名於此文以英為名武以雄為號是故聰明秀出謂之英膽力過人謂之雄此其大體之別名也若校其分數則㸦相須英得雄分然後成章雄得英分然後成剛各以二分取彼一分然後乃成膽者雄之分智者英之分英有聰明須膽而後成雄有膽力須知而後立何以論其然夫聰明者英之分也不得雄之膽則說不行智而無膽不能正言膽力者雄之分也不得英之智則事不立勇而無謀不能立事是故英以其聰謀始以其明見機智以謀事之始明以見事之機待雄之膽行之不決則不能行雄以其力服眾以其勇排難非力眾不服非勇難不排待英之智成之智以制宜巧乃可成然後乃能各濟其所長也譬金待水而成利功物得水然後成養功若聰能謀始而明不見機乃可以坐論而不可以處事智能坐論而明不見機何事務之能處聰能謀始明能見機而勇不能行可以循常而不可以慮變明能循常勇不能行何應變之能為若力能過人而勇不能行可以為力人未可以為先登雖絕群膽雄不決何先鋒之能為力能過人勇能行之而智不能斷事可以為先登未足以為將帥力能先登臨事無謀何將帥之能為必聰能謀始明能見機膽能決之然後乃可以為英張良是也氣力過人勇能行之智足斷事然後乃可以為雄韓信是也體分不同以多為目故英雄異名張良英智多韓信雄膽勝然皆偏至之材人臣之任也故英可以為相制勝于近雄可以為將揚威于遠若一人之身兼有英雄則能長世高祖項羽是也然英之分以多於雄而英不可以少也英以致智智能役雄何可少也英分少則智者去之故項羽氣力蓋世明能合變膽烈無前濟江焚糧而不能聽采奇異有一范增不用是以陳平之徒皆亡歸高祖英分多故群雄服之英材歸之兩得其用雄既服矣英又歸之故能吞秦破楚宅有天下然則英雄多少能自勝之數也勝在於身則能勝物徒英而不雄則雄材不服也內無主於中外物何由入徒雄而不英則智者不歸往也無名以接之智者何由往故雄能得雄不能得英兕虎自成群也英能得英不能得雄鸞鳳自相親也故一人之身兼有英雄乃能役英與雄能役英與雄故能成大業也武以服之文以綏之則業隆當年福流後世八觀第九群材異品志各異歸觀其通否所格者八八觀第九八觀者一曰觀其奪救以明間雜或慈欲濟恤而恡奪其仁或救濟廣厚而乞醯為惠二曰觀其感變以審常度觀其慍怍則常度可審三曰觀其至質以知其名徵質相應覩色知名四曰觀其所由以辨依似依訐似直倉卒難明察其所安昭然可辨五曰觀其愛敬以知通塞純愛則物親而情通純敬則理踈而情塞六曰觀其情機以辨恕惑得其所欲則恕違其所欲則惑七曰觀其所短以知所長訐刺雖短而長於為直八曰觀其聰明以知所達雖體眾材而材不聰明事事蔽塞其何能達何謂觀其奪救以明間雜夫質有至有違剛質無欲所以為至貪情或勝所以為違若至勝違則惡情奪正若然而不然以欲勝剛以此似剛而不剛故仁出於慈有慈而不仁者仁必有恤有仁而不恤者厲必有剛有厲而不剛者若夫見可憐則流涕慈心發於中將分與則恡嗇是慈而不仁者為仁者必濟恤覩危急則惻隱仁情動於內將赴救則畏患是仁而不恤者為恤者必赴危處虛義則色厲精厲見於貌顧利慾則內荏是厲而不剛者為剛者必無慾然則慈而不仁者則恡奪之也愛財傷於慈仁而不恤者則懼奪之也恇怯損於仁厲而不剛者則慾奪之也利慾害於剛故曰慈不能勝恡無必其能仁也愛則不施何仁之能為仁不能勝懼無必其能恤也畏懦不果何恤之能行厲不能勝慾無必其能剛也情存利慾何剛之能成是故不仁之質勝則伎力為害器仁質既弱而有伎力此害己之器也貪悖之性勝則彊猛為禍梯廉質既負而性強猛此禍己之梯也亦有善情救惡不至為害惡物宜翦而除純善之人憐而救之此稠厚之人非大害也愛惠分篤雖傲狎不離平生結交情厚分深雖原壤夷俟而不相棄無大過也助善著明雖疾惡無害也如殺無道以就有道疾惡雖甚無大非也救濟過厚雖取人不貪也取人之物以有救濟雖譏在乞醯非大貪也是故觀其奪救而間雜之情可得知也或畏恡奪慈仁或救濟過其分而平淡之主順而恕何謂觀其感變以審常度夫人厚貌深情將欲求之必觀其辭旨察其應贊視發言之旨趣觀應和之當否夫觀其辭旨猶聽音之善醜音唱而善醜別察其應贊猶視智之能否也聲和而能否別故觀辭察應足以互相別識彼唱此和是非相舉然則論顯揚正白也辭顯唱正是曰明白不善言應玄也默而識之是曰玄也經緯玄白通也明辨是非可謂通理移易無正雜也理不一據言意渾雜先識未然聖也追思玄事叡也見事過人明也以明為晦智也心雖明之常若不足微忽必識妙也理雖至微而能察之美妙不昧踈也心致昭然是曰踈朗測之益深實也心有實智探之愈精猶泉滋中出測之益深也假合炫燿虛也道聽塗說久而無實猶池水無源洩而虛竭自見其美不足也智不贍足恐人不知以自伐不伐其能有餘也不畏不知故曰凡事不度必有其故色貌失實必有憂喜之故憂患之色乏而且荒憂患在心故形色荒疾疢之色亂而垢理黃黑色雜理多塵垢喜色愉然以懌慍色厲然以揚妬惑之色冒昧無常粗白粗赤憤憤在面及其動作蓋竝言辭色既發揚言亦從之是故其言甚懌而精色不從者中有違也心恨而言強和色貌終不相從其言有違而精色可信者辭不敏也言不自盡故辭雖違而色貌可信言未發而怒色先見者意憤溢也憤怒填胸者未言而色貌已作言已發而怒氣送之者彊所不然也欲強行不然之事故怒氣助言凡此之類徵見於外不可奄違心懽而怒容意恨而和貌雖欲違之精色不從心動貌從感愕以明雖變可知情雖在內感愕發外千形萬貌粗可知矣是故觀其感變而常度之情可知觀人辭色而知其心物有常度然後審矣何謂觀其至質以知其名凡偏材之性二至以上則至質相發而令名生矣二至質氣之謂也質直氣清則善名生矣是故骨直氣清則休名生焉骨氣相應名是以美氣清力勁則烈名生焉氣既清矣力勁則烈勁智精理則能名生焉智既勁矣精理則能稱智直彊愨則任名生焉直而又美是以見任集于端質則令德濟焉質徵端和善德乃成加之學則文理灼焉圭玉有質瑩則成文是故觀其所至之多少而異名之所生可知也尋其質氣覽其清濁雖有多少之異異狀之名斷可知之何謂觀其所由以辨依似夫純訐性違不能公正質氣俱訐何正之有依訐似直以訐訐善以直之訐訐及良善純宕似流不能通道質氣俱宕何道能通依宕似通行傲過節似通之宕容傲無節故曰直者亦訐訐者亦訐其訐則同其所以為訐則異直人之訐訐惡憚非純訐為訐訐善刺是通者亦宕宕者亦宕其宕則同其所以為宕則異通人之宕簡而達道純宕傲僻以自恣然則何以別之直而能溫者德也溫和為直所以為德直而好訐者偏也性直過訐所以為偏訐而不直者依也純訐似直所以為依道而能節者通也以道自節所以為通通而時過者偏也性通時過所以為偏宕而不節者依也純宕似通所以為依偏之與依志同質違所謂似是而非也質同通直或偏或依是故輕諾似烈而寡信不量己力輕許死人臨難畏怯不能殉命多易似能而無效不顧材能自謂能辦受事猖獗作無效驗進銳似精而去速情躁之人不能久任訶者似察而事煩譴訶之人每多煩亂訐施似惠而無成當時似給終無所成面從似忠而退違阿順目前卻則自是此似是而非者也紫色亂朱聖人惡之亦有似非而是者事同於非其功實則是大權似姦而有功伊去太甲以成其功大智似愚而內明終日不違內實分別博愛似虛而實厚汎愛無私似虛而實正言似訐而情忠譬帝桀紂至誠忠愛夫察似明非御情之反欲察似類審則是非御取人情反覆明之有似理訟其實難別也故聖人參訊廣訪與眾共之非天下之至精其孰能得其實若其實可得何憂乎驩兜何遷乎有苗是以昧旦晨興揚明仄陋語之三槐詢之九棘故聽言信貌或失其真言訥貌惡仲尼失之子羽詭情御反或失其賢疑非人情公孫失之卜式賢否之察實在所依雖其難知即當尋其所依而察之是故觀其所依而似類之質可知也雖其不盡得其實然察其所依似則其體氣粗可幾矣何謂觀其愛敬以知通塞蓋人道之極莫過愛敬愛生於父子敬立於君臣是故孝經以愛為至德起父子之親故為至德以敬為要道終君臣之義故為道之要易以感為德氣通生物人得之以利養以謙為道尊卑殊別道之次序老子以無為德施化無方德之則也以虛為道寂寞無為道之倫也禮以敬為本禮由陰作肅然清淨樂以愛為主樂由陽來歡然親愛然則人情之質有愛敬之誠方在哺乳愛敬生矣則與道德同體動獲人心而道無不通也體道脩德故物順理通然愛不可少於敬少於敬則廉節者歸之廉人好敬是以歸之而眾人不與眾人樂愛愛少是以不與愛多於敬則雖廉節者不悅而愛接者死之廉人寡常人眾眾人樂愛致其死則事成業濟是故愛之為道不可少矣何則敬之為道也嚴而相離其勢難久動必肅容過之不久逆旅之人不及溫和而歸也愛之為道也情親意厚深而感物煦渝篤密感物深感甚深是以翳桑之人倒戈報德是故觀其愛敬之誠而通塞之理可得而知也篤於慈愛則溫和而上下之情通務在禮敬則嚴肅而外內之情塞然必愛敬相須不可一時而無然行其二義者常當務令愛多敬少然後肅穆之風可得希矣何謂觀其情機以辨恕惑夫人之情有六機杼其所欲則喜為有力者譽烏獲其心莫不忻焉不杼其所能則怨為辨給者稱三緘其心莫不忿然以自伐歷之則惡抗己所能以歷眾人眾人所惡以謙損下之則悅卑損下人人皆喜悅犯其所乏則婟人皆悅己所長惡己所短故稱其所短則婟戾忿肆以惡犯婟則妬自伐其能人所惡也稱人之短人所婟也今伐其所能犯人所婟則妬害生也此人情之六機也夫人情莫不欲遂其志志之所欲欲遂已成故烈士樂奮力之功遭難而力士奮善士樂督政之訓政脩而善士用能士樂治亂之事治亂而求賢能術士樂計策之謀廣筭而求其策辨士樂陵訊之辭賓贊而求辨給貪者樂貨財之積貨財積則貪者容其求幸者樂權勢之尤權勢之尤則幸者竊其柄苟贊其志則莫不欣然是所謂杼其所欲則喜也所欲之心杼盡復何怨乎若不杼其所能則不獲其志不獲其志則戚憂己才之不展是故功力不建則烈士奮奮憤不能盡其材也德行不訓則正人哀哀哀不得行其化政亂不治則能者歎歎歎不得用其能敵能未弭則術人思思思不得運其奇貨財不積則貪者憂憂憂無所收其利權勢不尤則幸者悲悲悲不得弄其權是所謂不杼其能則怨也所怨不杼其能悅也人情莫不欲處前故惡人之自伐皆欲居物先故惡人之自伐也自伐皆欲勝之類也是故自伐其善則莫不惡也惡其有勝己之心是所謂自伐歷之則惡也是以達者終不自伐人情皆欲求勝故悅人之謙謙所以下之下有推與之意是故人無賢愚接之以謙則無不色懌不問能否皆欲勝人是所謂以謙下之則悅也是以君子終日謙謙人情皆欲掩其所短見其所長稱其所長則悅稱其所短則慍是故人駮其所短似若物冒之情之憤悶有若覆冒是所謂駮其所乏則婟也覆冒純塞其心婟戾人情陵上者也見人勝己皆欲陵之陵犯其所惡雖見憎未害也雖惡我自伐未甚疾害也若以長駮短是所謂以惡犯婟則妬也以己之長駮人之短而取其害是以達者不為之也凡此六機其歸皆欲處上物之自大人人皆爾是以君子接物犯而不校知物情好勝雖或以小犯己終不校拒也不校則無不敬下所以避其害也務行謙敬誰害之哉小人則不然既不見機不達妬害之機而欲人之順己謂欲人無違己以佯愛敬為見異孔光逡巡董賢欣喜以偶邀會為輕謂非本心忿其輕己苟犯其機則深以為怨小人易悅而難事是故觀其情機而賢鄙之志可得而知也賢明志在退下鄙劣志在陵上是以平淡之主御之以正訓貪者之所憂戒幸者之所悲然後物不自伐下不陵上賢否當位治道有序何謂觀其所短以知所長夫偏材之人皆有所短智不能周也故直之失也訐刺訐傷於義故其父攘羊其子證之剛之失也厲剛切傷於理故諫君不從承之以劍和之失也懦懦弱不及道故宮之奇為人懦不能強諫介之失也拘拘愚不達事尾生守信死於橋下夫直者不訐無以成其直既悅其直不可非其訐用人之直恕其訐也訐也者直之徵也非訐不能為直剛者不厲無以濟其剛既悅其剛不可非其厲用人之剛恕其厲也厲也者剛之徵也非厲不能為剛和者不懦無以保其和既悅其和不可非其懦用人之和恕其懦也懦也者和之徵也非懦不能為和介者不拘無以守其介既悅其介不可非其拘用人之介恕其拘也拘也者介之徵也非拘不能為介然有短者未必能長也純訐之人未能正直有長者必以短為徵純和之人徵必懦弱是故觀其徵之所短而其材之所長可知也欲用其剛必采之於厲何謂觀其聰明以知所達夫仁者德之基也載德而行義者德之節也制德之所宜也禮者德之文也禮德之文理也信者德之固也固德之所執也智者德之帥也非智不成德夫智出於明明達乃成智明之於人猶晝之待白日夜之待燭火火日所以照晝夜智達所以明物理其明益盛者所見及遠火日愈明所照愈遠智達彌明理通彌深及遠之明難聖人猶有不及是故守業勤學未必及材生知者上學能者次材藝精巧未必及理因習成巧淺於至理理義辨給未必及智理成事業昧於玄智智能經事未必及道役智經務去道遠矣道思玄遠然後乃周道無不載故無不周是謂學不及材材不及理理不及智智不及道道智玄微故四變而後及道也者回復變通理不繫一故變通之是故別而論之各自獨行則仁為勝仁者濟物之資明者見物而已合而俱用則明為將仁者待明其功乃成故以明將仁則無不懷威以使之仁以恤之以明將義則無不勝示以斷割之宜以明將理則無不通理若明練萬事乃達然則苟無聰明無以能遂暗者昧時何能成務成遂故好聲而實不克則恢恢迂遠於實好辯而理不至則煩辭煩而無正理好法而思不深則刻刻過於理好術而計不足則偽詭誣詐也是故鈞材而好學明者為師比力而爭智者為雄等德而齊達者稱聖聖之為稱明智之極名也是以動而為天下法言而為萬世範居上位而不亢在下位而不悶是以觀其聰明而所達之材可知也
